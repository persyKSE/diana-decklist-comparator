name: Deploy site

on:
  push:
    branches: [main]
  # Data-update commits are pushed with GITHUB_TOKEN, which doesn't fire
  # `push` workflows — so also redeploy whenever the update workflow finishes.
  workflow_run:
    workflows: ["Update deck data"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Canonical host: Cloudflare Pages (diana-decklist-comparator.pages.dev),
  # which also runs the /api/submissions community-deck endpoint. Needs the
  # CLOUDFLARE_API_TOKEN (Cloudflare Pages — Edit) and CLOUDFLARE_ACCOUNT_ID
  # repo secrets; until they exist this job is skipped and GitHub Pages
  # below keeps serving the full site, so there is never a dead cutover.
  deploy-cloudflare:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # workflow_run events point at a pre-push sha; always deploy latest
      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: ./deploy_cloudflare.sh

  # GitHub Pages: serves the full site only until the Cloudflare secrets
  # exist; from then on it serves redirect.html, which forwards visitors
  # (and their saved decks/match logs, via the #m= fragment hand-off) to
  # the canonical host.
  deploy-github:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - id: pick
        name: Serve redirect once Cloudflare is wired, full site until then
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            mkdir gh-site
            cp redirect.html gh-site/index.html
            cp redirect.html gh-site/404.html
            echo "path=gh-site" >> "$GITHUB_OUTPUT"
          else
            echo "path=." >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.pick.outputs.path }}
      - id: deployment
        uses: actions/deploy-pages@v4
