name: Update deck data

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install cloudscraper beautifulsoup4
      - name: Refresh card catalogue
        run: python import_cards.py
      - name: Fetch decklists
        run: python fetch_decks.py
      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No data changes this week."
          else
            git commit -m "Weekly data update ($(date -u +%F))"
            git push
          fi
