name: Update deck data

on:
  schedule:
    # Two runs instead of one Monday-morning pass: a single weekly cron meant
    # a weekend event published Saturday night could sit unscraped for most
    # of a week. Sunday catches Friday/Saturday events fast; Tuesday catches
    # whatever a Monday-published event needed a day to settle. Both runs are
    # cheap — discover_decks/fetch_meta_decks/fetch_ladder_decks all skip
    # already-known URLs, so a no-op week costs one HTTP call to the sitemap.
    - cron: "0 22 * * 0"  # Sunday 22:00 UTC
    - cron: "0 6 * * 2"   # Tuesday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install cloudscraper beautifulsoup4
      - name: Refresh card catalogue
        run: python import_cards.py
      - name: Fetch decklists
        run: python fetch_decks.py
      - name: Fetch tournament results (field size + day1/day2 conversion)
        run: python fetch_tournaments.py
      - name: Fetch real matchup win rates (riftools.app)
        run: python fetch_riftools.py
      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          # riftbound.db's bytes churn on every scrape, and meta.json/meta.js
          # and riftools.json/riftools.js each carry a "generated" timestamp
          # that changes every run. Ignore all five when deciding whether
          # anything really changed — they still get committed alongside a
          # real change, which is what makes the site's "updated" stamp mean
          # "data last changed".
          if git diff --cached --quiet -- ':(exclude)riftbound.db' ':(exclude)meta.json' ':(exclude)meta.js' ':(exclude)riftools.json' ':(exclude)riftools.js'; then
            echo "No data changes this week."
            git reset
          else
            git commit -m "Weekly data update ($(date -u +%F))"
            git push
          fi
