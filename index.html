// one per draw step. The mulligan replaces cards rather than adding them, so it
// doesn't change this count — only the odds below.
function cardsSeenByTurn(t, deck) { return Math.min(deck, HAND_SIZE + t); }

// A Riftbound mulligan sets aside up to 2 and draws replacements without
// reshuffling, so a miss on the opening 4 gets two more looks at a 36-card
// deck that still holds every copy. That makes it strictly better than the
// plain opening-hand number, and it's exactly computable.
function openingWithMulligan(K, deck) {
  const hit = hyperAtLeast(1, K, deck, HAND_SIZE);
  return hit + (1 - hit) * hyperAtLeast(1, K, deck - HAND_SIZE, MULLIGAN_MAX);
}

// P(you have drawn at least one of `K` relevant copies by the start of turn `t`,
// off a `deck`-card deck, under the same set-aside mulligan model as the opener:
// the straight draw sees HAND_SIZE + t cards, and a mulligan buys up to two more
// early looks (the cards you set aside go to the bottom, so they aren't
// re-counted). At t = 0 this reduces exactly to openingWithMulligan. This is the
// bridge between "you own an answer" and "you have it in hand when it matters".
function pAnswerByTurn(K, deck, t) {
  if (K <= 0 || deck <= 0) return 0;
  const seen = cardsSeenByTurn(t, deck);
  const straight = hyperAtLeast(1, K, deck, seen);
  return straight + (1 - straight) * hyperAtLeast(1, K, deck - seen, MULLIGAN_MAX);
}

// Shared "does this opening hand curve out" bar — at least CURVE_MIN_CHEAP
// cards costing CURVE_MAX_COST or less. This is the exact rule the Goldfish
// Simulator's auto-mulligan already uses to decide whether to bottom cards;
// extracting it means the mulligan trainer grades against the identical bar
// instead of inventing a second opinion about what "good" means.
const CURVE_MIN_CHEAP = 2, CURVE_MAX_COST = 2;
function handCurvesOut(names) {
  return names.filter(n => ((cardInfo(n) || {}).cost ?? 99) <= CURVE_MAX_COST).length >= CURVE_MIN_CHEAP;
}
// P(a random HAND_SIZE-card opener from this deckList misses the curve bar) —
// exact hypergeometric, reusing hyperAtLeast rather than a new formula.
function pCurveMiss(deckList) {
  const deckSize = deckList.reduce((a, c) => a + c.count, 0);
  if (!deckSize) return 0;
  const cheapCount = deckList.reduce((a, c) => a + (((cardInfo(c.name) || {}).cost ?? 99) <= CURVE_MAX_COST ? c.count : 0), 0);
  return 1 - hyperAtLeast(CURVE_MIN_CHEAP, cheapCount, deckSize, HAND_SIZE);
}

// Never round a near-certainty up to a flat 100% (or a real chance down to 0%).
function pct(p) {
  const v = 100 * p;
  if (v >= 99.5 && p < 1) return '>99%';
  if (v > 0 && v < 0.5) return '<1%';
  return v.toFixed(0) + '%';
}
function pctColor(p) { return p >= 0.8 ? 'var(--lock)' : p >= 0.5 ? 'var(--flex)' : 'var(--danger)'; }

// The list the simulator and coverage sections reason about: whatever you're
// actually working on, falling back to the consensus prototype.
function activeList() {
  const { counts } = parseDeckText(coachText);
  const total = Object.values(counts).reduce((a, b) => a + b, 0);
  if (total >= 20) return { list: Object.entries(counts).map(([name, count]) => ({ name, count })), source: 'your list' };
  return { list: currentProto.map(c => ({ name: c.name, count: c.copies })), source: 'the consensus prototype' };
}

function setSimTurn(t) {
  simTurn = Math.max(1, Math.min(10, t));
  const out = document.getElementById('simTable');
  if (out) out.innerHTML = simTableHTML();
  const lbl = document.getElementById('simTurnLabel');
  if (lbl) lbl.textContent = simTurn;
}

function simTableHTML() {
  const { list } = activeList();
  const deck = list.reduce((a, c) => a + c.count, 0) || DECK_SIZE;
  const seen = cardsSeenByTurn(simTurn, deck);
  let html = '<div class="panel-wrap"><table class="incl"><thead><tr><th>Card</th><th class="num">Copies</th>' +
    '<th class="num">Opening 4</th><th class="num">After mulligan</th><th class="num">≥1 by turn ' + simTurn + '</th><th class="num">≥2 by turn ' + simTurn + '</th></tr></thead><tbody>';
  // Neutral bars, not a red/amber/green scale: a 1-of at 18% is not "bad", it
  // is a 1-of. The reader compares rows, not each row to a target.
  const bar = p => '<span class="incl-bar" style="width:' + Math.max(1, Math.round(46 * p)) + 'px;opacity:0.55;"></span>';
  [...list].sort((a, b) => (costBucket(a.name) - costBucket(b.name)) || a.name.localeCompare(b.name)).forEach(c => {
    const open = hyperAtLeast(1, c.count, deck, HAND_SIZE);
    const mull = openingWithMulligan(c.count, deck);
    const byT = hyperAtLeast(1, c.count, deck, seen);
    const twoT = hyperAtLeast(2, c.count, deck, seen);
    html += '<tr data-card="' + attr(c.name) + '" data-cardopen="' + attr(c.name) + '" style="cursor:pointer;"><td>' + cardImg(c.name) + escHtml(c.name) + '</td>' +
      '<td class="num">' + c.count + '</td>' +
      '<td class="num">' + pct(open) + '</td>' +
      '<td class="num">' + pct(mull) + '</td>' +
      '<td class="num">' + bar(byT) + ' ' + pct(byT) + '</td>' +
      '<td class="num" style="color:var(--muted)">' + pct(twoT) + '</td></tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

/* ---- Goldfish: deal a real hand off the list ---- */
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function newHand() {
  const { list } = activeList();
  const lib = [];
  list.forEach(c => { for (let i = 0; i < c.count; i++) lib.push(c.name); });
  shuffle(lib);
  const hand = lib.splice(0, Math.min(HAND_SIZE, lib.length));
  sim = { lib, hand, opening: [...hand], aside: new Set(), mulled: false, decision: null };
  renderSimHand();
}
function toggleAside(i) {
  if (!sim || sim.mulled) return;
  if (sim.aside.has(i)) sim.aside.delete(i);
  else if (sim.aside.size < MULLIGAN_MAX) sim.aside.add(i);
  else { toast('You may set aside at most ' + MULLIGAN_MAX + ' cards'); return; }
  renderSimHand();
}
// Explicit "keep" — grades the decision immediately rather than waiting for
// the player to draw into the next turn. Kept separate from drawOne so
// grading doesn't require ever hitting Draw.
function keepHand() {
  if (!sim || sim.mulled) return;
  sim.decision = 'kept';
  renderSimHand();
}
function doMulligan() {
  if (!sim || sim.mulled || !sim.aside.size) { toast('Click up to 2 cards to set aside first'); return; }
  const kept = sim.hand.filter((_, i) => !sim.aside.has(i));
  const bottomed = sim.hand.filter((_, i) => sim.aside.has(i));
  const drawn = sim.lib.splice(0, bottomed.length);
  sim.lib.push(...bottomed);   // recycled to the bottom, no reshuffle
  sim.hand = kept.concat(drawn);
  sim.aside = new Set();
  sim.mulled = true;
  sim.decision = 'mulled';
  renderSimHand();
}
function drawOne() {
  if (!sim) { newHand(); return; }
  if (!sim.lib.length) { toast('Main deck is empty'); return; }
  sim.hand.push(sim.lib.shift());
  sim.mulled = true;   // past the mulligan window
  if (!sim.decision) sim.decision = 'kept';   // never mulliganed, drew anyway — an implicit keep
  renderSimHand();
}

// Grades the just-made keep/mulligan call against handCurvesOut/pCurveMiss —
// the exact bar the Goldfish Simulator's own auto-mulligan uses. Reads the
// ORIGINAL opening hand (sim.opening), not the post-mulligan one, since the
// decision being graded was made on what you first saw.
function mulliganGradeHTML() {
  if (!sim || !sim.decision) return '';
  const { list } = activeList();
  const curved = handCurvesOut(sim.opening);
  const cheapN = sim.opening.filter(n => ((cardInfo(n) || {}).cost ?? 99) <= CURVE_MAX_COST).length;
  const p = pCurveMiss(list);
  const kept = sim.decision === 'kept';
  const agree = kept === curved;
  return '<div class="summary-box" style="margin-top:8px; border-color:' + (agree ? 'var(--lock)' : 'var(--flex)') + '">' +
    '<strong>' + (agree ? 'Agrees with the curve heuristic.' : 'Disagrees with the curve heuristic.') + '</strong> ' +
    'Your opening hand had <strong>' + cheapN + '</strong> card' + (cheapN === 1 ? '' : 's') + ' costing ' + CURVE_MAX_COST + ' or less ' +
    '(the bar is ' + CURVE_MIN_CHEAP + '+), so the same rule the Goldfish Simulator\'s auto-mulligan uses says <strong>' + (curved ? 'keep' : 'mulligan') +
    '</strong> — you <strong>' + (kept ? 'kept' : 'mulliganed') + '</strong>. ' +
    'Off this ' + list.reduce((a, c) => a + c.count, 0) + '-card list, a random opener misses that bar <strong>' + pct(p) + '</strong> of the time ' +
    '(exact hypergeometric, same machinery as the odds above).</div>' +
    '<p class="sub" style="margin-top:4px;">One simple, disclosed rule — cards ≤' + CURVE_MAX_COST + ' cost as a proxy for "can this hand do something early" — not a full hand evaluator. It cannot see removal, card draw, or the matchup. A disagreement is a prompt to think it through, not an automatic correction.</p>';
}

function renderSimHand() {
  const el = document.getElementById('simHand');
  if (!el) return;
  if (!sim) { el.innerHTML = '<p class="sub">Deal a hand to goldfish your opener.</p>'; return; }
  const turn = Math.max(0, sim.hand.length - HAND_SIZE);
  let html = '<div class="hand">';
  sim.hand.forEach((n, i) => {
    const img = imageMap[n];
    html += '<div class="handcard' + (sim.aside.has(i) ? ' aside' : '') + '" data-card="' + attr(n) + '" onclick="toggleAside(' + i + ')" title="' + attr(n) + (sim.mulled ? '' : ' — click to set aside for the mulligan') + '">' +
      (img ? '<img src="' + attr(img) + '" alt="' + attr(n) + '">' : '<div class="noimg" style="width:100%;height:100%;"></div>') + '</div>';
  });
  html += '</div>';
  const costs = sim.hand.map(n => (cardMeta[n] || {}).cost).filter(c => c != null);
  const cheapest = costs.length ? Math.min(...costs) : null;
  html += '<p class="sub" style="margin-top:8px;">' +
    (sim.mulled ? 'After ' + (turn ? turn + ' draw step' + (turn === 1 ? '' : 's') : 'the mulligan') + ': ' : 'Opening hand: ') +
    sim.hand.length + ' cards' + (cheapest != null ? ', cheapest costs ' + cheapest : '') +
    (sim.mulled ? '' : ' · click up to ' + MULLIGAN_MAX + ' cards to set aside, then Mulligan or Keep') + '.</p>';
  html += mulliganGradeHTML();
  el.innerHTML = html;
}

function renderConsistency() {
  const { list, source } = activeList();
  const deck = list.reduce((a, c) => a + c.count, 0);
  if (!deck) return '';
  let html = '<h2>Consistency</h2>';
  html += '<p class="sub">Exact draw odds for <strong>' + escHtml(source) + '</strong> (' + deck + ' cards). Riftbound opens on ' + HAND_SIZE +
    ' cards, lets you set aside up to ' + MULLIGAN_MAX + ' for replacements without reshuffling, then draws 1 per turn — so by turn ' +
    'T you have seen ' + HAND_SIZE + '+T cards. This is the only section here that needs no tournament data: it is hypergeometric ' +
    'probability over the list itself.' + (deck !== DECK_SIZE ? ' <span style="color:var(--flex)">Your list is ' + deck + ' cards, not ' + DECK_SIZE + ' — the odds below use ' + deck + '.</span>' : '') + '</p>';

  // Headline: can you actually do something early?
  const early = list.filter(c => costBucket(c.name) <= 2).reduce((a, c) => a + c.count, 0);
  const lateBombs = list.filter(c => costBucket(c.name) >= 6).reduce((a, c) => a + c.count, 0);
  const pEarly = openingWithMulligan(early, deck);
  const pFlood = 1 - hyperAtLeast(1, deck - lateBombs, deck, HAND_SIZE);   // opener that is all 6+ drops
  html += '<div class="summary-box">' +
    '<strong>' + pct(pEarly) + '</strong> of openers (mulligan included) hold at least one card costing 2 or less — you run <strong>' + early + '</strong> of them. ' +
    (lateBombs ? 'Chance of an opening 4 made entirely of 6+ drops: <strong>' + (100 * pFlood).toFixed(1) + '%</strong>.' : 'Nothing in this list costs 6 or more.') +
    '</div>';

  html += '<div class="coach-tools"><label style="font-size:13px;color:var(--muted)">Odds by turn <strong id="simTurnLabel" style="color:var(--text)">' + simTurn + '</strong></label>' +
    '<input type="range" min="1" max="10" value="' + simTurn + '" oninput="setSimTurn(+this.value)" style="flex:1;max-width:240px;">' +
    '<button onclick="newHand()">Deal a hand</button><button onclick="doMulligan()" class="ghost">Mulligan</button>' +
    '<button onclick="keepHand()" class="ghost" title="Lock in this hand and grade the decision against the curve heuristic">Keep</button>' +
    '<button onclick="drawOne()" class="ghost">Draw</button></div>';
  html += '<div id="simHand"></div>';
  html += '<div id="simTable">' + simTableHTML() + '</div>';
  return html;
}

/* ---------------- Rune split optimizer ----------------
   The rune deck is exactly 12 cards and you channel 2 per turn (3 on turn one
   going second), so "do I have the runes for this card on curve?" is the same
   hypergeometric maths as the draw simulator — computable, not folklore. The
   field's 7/5 split is a data point; this says whether it's actually right
   for the list you're holding. */

function runeColorsOf(name) {
  return ((cardMeta[name] || {}).color || []).filter(c => c && c !== 'Colorless');
}

// P(this card's rune requirement is NOT met by its on-curve turn) for a given
// split. Single-colour needs r of that colour among the first m channelled;
// multi-colour (≥1 of each) is inclusion–exclusion over the demanded colours —
// exact, since P(zero of a colour set) = C(12−Σs, m)/C(12, m).
function runeMissProb(split, card) {
  const m = Math.min(12, 2 * card.turn);
  const cols = Object.keys(card.req);
  if (cols.length === 1) {
    return 1 - hyperAtLeast(card.req[cols[0]], split[cols[0]] || 0, 12, m);
  }
  let p = 0;
  for (let mask = 0; mask < (1 << cols.length); mask++) {
    let bits = 0, excluded = 0;
    for (let i = 0; i < cols.length; i++) if (mask & (1 << i)) { bits++; excluded += split[cols[i]] || 0; }
    p += (bits % 2 ? -1 : 1) * Math.exp(lnC(12 - excluded, m) - lnC(12, m));
  }
  return 1 - Math.max(0, Math.min(1, p));
}

function runeMathHTML() {
  const { list, source } = activeList();
  const perCard = [];
  const colorCopies = {};
  let colorless = 0;
  list.forEach(c => {
    const cols = runeColorsOf(c.name);
    if (!cols.length) { colorless += c.count; return; }
    const req = {};
    cols.forEach(x => req[x] = (req[x] || 0) + 1);
    const cost = (cardMeta[c.name] || {}).cost;
    perCard.push({ name: c.name, copies: c.count, turn: Math.max(1, Math.min(cost == null ? 2 : cost, 8)), req });
    Object.keys(req).forEach(x => colorCopies[x] = (colorCopies[x] || 0) + c.count);
  });
  const colors = Object.keys(colorCopies).sort((a, b) => colorCopies[b] - colorCopies[a]);
  if (!colors.length || colors.length > 4) return '<div id="runeMath"></div>';

  // Every way to split 12 runes across the demanded colours.
  const splits = [];
  (function go(i, left, acc) {
    if (i === colors.length - 1) { splits.push({ ...acc, [colors[i]]: left }); return; }
    for (let k = 0; k <= left; k++) go(i + 1, left - k, { ...acc, [colors[i]]: k });
  })(0, 12, {});
  const evOf = split => perCard.reduce((a, c) => a + c.copies * runeMissProb(split, c), 0);
  const scored = splits.map(s => ({ s, ev: evOf(s) })).sort((a, b) => a.ev - b.ev);
  const best = scored[0];

  // The field's split, for comparison.
  const cons = Object.fromEntries(colors.map(c => [c, 0]));
  consensusExtras(globalDecks).runes.forEach(r => {
    const col = shortName(r.name).replace(' Rune', '');
    if (r.count > 0 && col in cons) cons[col] += r.count;
  });
  const consTotal = Object.values(cons).reduce((a, b) => a + b, 0);
  const consEv = consTotal === 12 ? evOf(cons) : null;
  const splitStr = s => colors.map(c => (s[c] || 0) + ' ' + c).join(' / ');
  const sameAsCons = consEv != null && colors.every(c => (best.s[c] || 0) === cons[c]);

  let html = '<div id="runeMath"><h2>Rune math</h2>';
  html += '<p class="sub">Which 12-rune split actually supports <strong>' + escHtml(source) + '</strong>? You channel 2 runes per turn from a 12-rune deck, so "do I have the colours for this card on curve?" is exact hypergeometric probability — the same engine as the draw odds above, pointed at the rune deck.</p>';

  html += '<div class="summary-box">Demand: ' + colors.map(c => '<strong>' + colorCopies[c] + '</strong> copies want ' + c).join(', ') +
    (colorless ? ', ' + colorless + ' are colourless' : '') + '. ' +
    (sameAsCons
      ? 'Best split: <strong>' + splitStr(best.s) + '</strong> (' + best.ev.toFixed(2) + ' expected on-curve colour misses per game) — <strong>the field\'s split is already optimal</strong> for this list.'
      : 'Best split: <strong>' + splitStr(best.s) + '</strong> — ' + best.ev.toFixed(2) + ' expected on-curve colour misses per game' +
        (consEv != null ? ', vs <strong>' + consEv.toFixed(2) + '</strong> for the field\'s ' + splitStr(cons) + '.' : '.')) + '</div>';

  // For two colours, the whole trade-off fits in one curve.
  if (colors.length === 2) {
    const [A, B] = colors;
    const pts = [];
    for (let k = 0; k <= 12; k++) pts.push({ k, ev: evOf({ [A]: k, [B]: 12 - k }) });
    const W = 520, H = 150, mL = 36, mB = 30, mT = 10, mR = 12;
    const pw = W - mL - mR, ph = H - mT - mB;
    const evMax = Math.max(...pts.map(p => p.ev), 0.01);
    const x = k => mL + k / 12 * pw, y = v => mT + ph - v / evMax * ph;
    let parts = [];
    [0, evMax / 2, evMax].forEach(v => {
      parts.push('<line class="grid" x1="' + mL + '" y1="' + y(v) + '" x2="' + (W - mR) + '" y2="' + y(v) + '"/>');
      parts.push('<text class="axis" x="' + (mL - 5) + '" y="' + (y(v) + 4) + '" font-size="9" text-anchor="end">' + v.toFixed(1) + '</text>');
    });
    parts.push('<polyline points="' + pts.map(p => x(p.k) + ',' + y(p.ev)).join(' ') + '" fill="none" stroke="var(--accent)" stroke-width="2.5"/>');
    pts.forEach(p => parts.push('<circle class="pt" data-tip="' + attr(p.k + ' ' + A + ' / ' + (12 - p.k) + ' ' + B + ': ' + p.ev.toFixed(2) + ' expected misses') + '" cx="' + x(p.k) + '" cy="' + y(p.ev) + '" r="3.4" fill="' +
      (p.k === best.s[A] ? 'var(--lock)' : consEv != null && p.k === cons[A] ? 'var(--flex)' : 'var(--accent)') + '"/>'));
    for (let k = 0; k <= 12; k += 2) parts.push('<text class="axis" x="' + x(k) + '" y="' + (H - 12) + '" font-size="9" text-anchor="middle">' + k + '</text>');
    parts.push('<text class="axis" x="' + (W / 2) + '" y="' + (H - 1) + '" font-size="9" text-anchor="middle">' + A + ' runes (of 12) — green = optimal' + (consEv != null ? ', amber = field' : '') + '</text>');
    html += '<svg class="viz" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' + parts.join('') + '</svg>';
  }

  // Key colour odds under the recommended split.
  html += '<div class="panel-wrap"><table class="incl"><thead><tr><th>Colour (' + splitStr(best.s) + ')</th>' +
    '<th class="num">≥1 by turn 1</th><th class="num">≥1 by turn 2</th><th class="num">≥2 by turn 2</th><th class="num">≥2 by turn 3</th></tr></thead><tbody>';
  colors.forEach(c => {
    const s = best.s[c] || 0;
    html += '<tr><td>' + escHtml(c) + ' (' + s + ' runes)</td>' +
      [[1, 2], [1, 4], [2, 4], [2, 6]].map(([k, m]) =>
        '<td class="num">' + pct(hyperAtLeast(k, s, 12, m)) + '</td>').join('') + '</tr>';
  });
  html += '</tbody></table></div>';

  html += '<p class="sub">Assumes on-curve play going first (2 runes/turn; going second channels a 3rd on turn one, so these are the pessimistic numbers), one rune of each printed domain per card, and one demanding card per turn. It ignores rune-spending abilities and multi-spell turns — read it as relative evidence between splits, which is exactly the decision it is for.</p></div>';
  return html;
}

/* ---------------- Filtering ---------------- */
function regionOf(event) {
  const e = (event || '').toLowerCase();
  if (/vancouver|hartford|atlanta|dallas|chicago|toronto|montreal|seattle|boston|vegas|houston/.test(e)) return 'NA';
  if (/utrecht|london|paris|berlin|madrid|milan|lyon|amsterdam|lille|bologna/.test(e)) return 'EU';
  if (/sydney|melbourne|auckland|brisbane|perth/.test(e)) return 'OCE';
  if (/changsha|tianjin|xian|shanghai|beijing|chengdu|guangzhou|wuhan|suzhou|s3 regional open/.test(e)) return 'CN';
  return 'Other';
}

function computeFullClusters() {
  const N = allDecks.length;
  allDecks.forEach(d => { d._region = regionOf(d.event); });
  if (N < 2) { allDecks.forEach(d => { d._cluster = 0; d._clusterName = 'All'; }); clusterOptions = []; return; }
  const dist = distanceMatrix(allDecks);
  const groups = cutClusters(buildDendrogram(dist));
  const biggest = groups.reduce((a, b) => b.length > a.length ? b : a, groups[0]);
  clusterOptions = [];
  groups.forEach((g, gi) => {
    const name = clusterSignature(g, gi, g === biggest);
    g.forEach(i => { allDecks[i]._cluster = gi; allDecks[i]._clusterName = name; });
    clusterOptions.push({ gi, name, n: g.length });
  });
}

// Name a cluster by the card most over-represented inside it vs. outside.
function clusterSignature(group, gi, isBiggest) {
  const inSet = new Set(group);
  const cardNames = [...new Set(allDecks.flatMap(d => d.cards.map(c => c.name)))];
  let best = null, bestLift = 0.34;
  cardNames.forEach(name => {
    let inN = 0, outN = 0;
    allDecks.forEach((d, i) => {
      const has = d.cards.some(c => c.name === name);
      if (inSet.has(i)) { if (has) inN++; } else if (has) outN++;
    });
    const inFrac = inN / group.length;
    const outFrac = (allDecks.length - group.length) ? outN / (allDecks.length - group.length) : 0;
    if (inFrac >= 0.6 && inFrac - outFrac > bestLift) { bestLift = inFrac - outFrac; best = name; }
  });
  if (best) return shortName(best) + ' build';
  return isBiggest ? 'Core build' : 'Variant ' + (gi + 1);
}

function deckPasses(d) {
  if (filters.region.size && !filters.region.has(d._region)) return false;
  if (filters.cluster.size && !filters.cluster.has(d._cluster)) return false;
  if (filters.placement.size && !filters.placement.has(d.placement)) return false;
  if (filters.from && (!d.event_date || d.event_date < filters.from)) return false;
  if (filters.to && (!d.event_date || d.event_date > filters.to)) return false;
  return true;
}

function toggleFilter(key, val) {
  const s = filters[key];
  if (s.has(val)) s.delete(val); else s.add(val);
  applyFilters();
}
function setDateFilter(which, val) { filters[which] = val; applyFilters(); }
function toggleDedupe() { filters.dedupe = !filters.dedupe; applyFilters(); }
function toggleFieldWeight() { filters.fieldWeight = !filters.fieldWeight; applyFilters(); }
function toggleCommunity() { filters.community = !filters.community; applyFilters(); }
function toggleLadder() { filters.ladder = !filters.ladder; applyFilters(); }
function clearFilters() { filters = { region: new Set(), cluster: new Set(), placement: new Set(), from: '', to: '', dedupe: false, fieldWeight: false, community: false, ladder: false }; applyFilters(); }

// A result from a 1900-player event is stronger evidence than the same
// result from a 1100-player one. Scale placement weight by sqrt of field
// size relative to the median (sqrt keeps big events from dominating).
function medianAttendance() {
  const a = allDecks.map(d => d.attendance).filter(Boolean).sort((x, y) => x - y);
  return a.length ? a[Math.floor(a.length / 2)] : 0;
}
function effWeight(d) {
  const base = d.weight || 1;
  if (!filters.fieldWeight) return base;
  const med = medianAttendance();
  if (!med || !d.attendance) return base;
  return base * Math.sqrt(d.attendance / med);
}

// Keep one list per player (best placement) — removes near-duplicate
// double-counting toward the "consensus" when a player brought two lists.
function dedupeByPlayer(decks) {
  const best = {};
  decks.forEach(d => {
    const key = (d.player || d.label).toLowerCase();
    const rank = PLACEMENT_RANK[d.placement] != null ? PLACEMENT_RANK[d.placement] : 9;
    if (!best[key] || rank < best[key].rank) best[key] = { d, rank };
  });
  return decks.filter(d => best[(d.player || d.label).toLowerCase()].d === d);
}

function applyFilters() {
  changelogCache = null;   // field-size weighting feeds the replayed prototypes
  let src = allDecks;
  if (filters.community) src = src.concat(communityDecks);
  if (filters.ladder) src = src.concat(ladderDecks);
  globalDecks = src.filter(deckPasses);
  if (filters.dedupe) globalDecks = dedupeByPlayer(globalDecks);
  rankedCards = computeStats(globalDecks);
  packagesCache = findPackages(globalDecks.length);
  buildInitialProto();
  if (diffA >= globalDecks.length) diffA = 0;
  if (diffB >= globalDecks.length) diffB = Math.min(1, Math.max(0, globalDecks.length - 1));
  render();
}

function renderFilterBar() {
  const regions = REGION_ORDER.filter(r => allDecks.some(d => d._region === r));
  const placements = [...new Set(allDecks.map(d => d.placement))];
  const dates = [...new Set(allDecks.map(d => d.event_date).filter(Boolean))].sort();
  const chip = (key, val, label) => '<span class="chip' + (filters[key].has(val) ? ' on' : '') + '" onclick="toggleFilter(\'' + key + '\',' + (typeof val === 'number' ? val : "'" + String(val).replace(/'/g, "\\'") + "'") + ')">' + escHtml(label) + '</span>';
  let html = '<div class="filterbar">';
  html += '<div class="fgroup"><span class="flabel">Region</span>' + regions.map(r => chip('region', r, r)).join('') + '</div>';
  if (clusterOptions.length > 1)
    html += '<div class="fgroup"><span class="flabel">Sub-archetype</span>' + clusterOptions.map(c => chip('cluster', c.gi, c.name + ' (' + c.n + ')')).join('') + '</div>';
  html += '<div class="fgroup"><span class="flabel">Placement</span>' + placements.map(p => chip('placement', p, p)).join('') + '</div>';
  if (dates.length > 1) {
    const opt = (sel) => '<option value=""' + (sel === '' ? ' selected' : '') + '>Any</option>' + dates.map(d => '<option value="' + d + '"' + (sel === d ? ' selected' : '') + '>' + d + '</option>').join('');
    html += '<div class="fgroup fdate"><span class="flabel">Dates</span>From <select onchange="setDateFilter(\'from\',this.value)">' + opt(filters.from) + '</select> to <select onchange="setDateFilter(\'to\',this.value)">' + opt(filters.to) + '</select></div>';
  }
  const dupPlayers = allDecks.length - dedupeByPlayer(allDecks).length;
  const haveAttendance = allDecks.some(d => d.attendance);
  html += '<div class="fgroup"><span class="flabel">Sample</span>' +
    '<span class="chip' + (filters.dedupe ? ' on' : '') + '" onclick="toggleDedupe()" title="Keep one list per player (best placement) so a player who brought two near-identical lists doesn\'t double-count toward the consensus">one list per player' +
    (dupPlayers ? ' (−' + dupPlayers + ')' : '') + '</span>' +
    (haveAttendance ? '<span class="chip' + (filters.fieldWeight ? ' on' : '') + '" onclick="toggleFieldWeight()" title="Scale each deck&#39;s weight by the square root of (field size ÷ median field size), so a result from a 1900-player event counts for more than the same result from a 1100-player one">weight by field size</span>' : '') +
    (communityDecks.length ? '<span class="chip' + (filters.community ? ' on' : '') + '" onclick="toggleCommunity()" title="Include decks visitors submitted from the builder. They carry no tournament result, so treat the consensus math with them on as community opinion, not results evidence">community decks (' + communityDecks.length + ')</span>' : '') +
    (ladderDecks.length ? '<span class="chip' + (filters.ladder ? ' on' : '') + '" onclick="toggleLadder()" title="Include scraped Mobalytics ladder brews — Diana lists with no verified tournament placement. Useful for spotting emerging tech early; they count half weight and never join the clustering">ladder brews (' + ladderDecks.length + ')</span>' : '') +
    '</div>';
  const anyOn = filters.region.size || filters.cluster.size || filters.placement.size || filters.from || filters.to || filters.dedupe || filters.fieldWeight || filters.community || filters.ladder;
  const poolN = allDecks.length + (filters.community ? communityDecks.length : 0) + (filters.ladder ? ladderDecks.length : 0);
  const small = globalDecks.length < 20
    ? '<span style="color:var(--flex)"> · small sample — inclusion %s are noisy; see the ± intervals in Analyze</span>' : '';
  const upd = (window.META && META.generated)
    ? '<span class="fbar-updated"> · data updated ' + escHtml(relativeTime(META.generated)) + '</span>' : '';
  html += '<div class="fbar-foot"><span>Showing <strong>' + globalDecks.length + '</strong> of ' + poolN + ' decks' + small + upd + '</span>' +
    (anyOn ? '<button onclick="clearFilters()">Reset filters</button>' : '') + '</div>';
  html += '</div>';
  return html;
}

/* ---------------- What changed ----------------
   The scraper reruns weekly, but a diff of raw JSON tells you nothing. What a
   deckbuilder wants is: since the last event, what moved in the consensus? So
   replay the prototype build over each event date and diff consecutive states.
   Deliberately reads allDecks, not globalDecks — history shouldn't move when
   you tick a filter. */

let changelogCache = null;

function buildChangelog() {
  if (changelogCache) return changelogCache;
  const dated = allDecks.filter(d => d.event_date);
  const dates = [...new Set(dated.map(d => d.event_date))].sort();
  const entries = [];
  dates.forEach(date => {
    const upto = dated.filter(d => d.event_date <= date);
    const before = dated.filter(d => d.event_date < date);
    const arrived = dated.filter(d => d.event_date === date);
    const protoAfter = computeProto(upto, computeStats(upto)).map(c => ({ name: c.name, count: c.copies }));
    const protoBefore = before.length ? computeProto(before, computeStats(before)).map(c => ({ name: c.name, count: c.copies })) : [];
    const diff = before.length ? diffSection(protoBefore, protoAfter) : { removed: [], added: [] };

    const eventNames = [...new Set(arrived.map(d => d.event).filter(Boolean))];
    const ev = (window.META && META.events || []).find(e => eventNames.includes(e.name));
    const clusters = {};
    arrived.forEach(d => { clusters[d._clusterName || 'Unclassified'] = (clusters[d._clusterName || 'Unclassified'] || 0) + 1; });

    entries.push({
      date, arrived, eventNames, diff, ev, clusters,
      first: !before.length,
      swaps: diff.removed.reduce((a, c) => a + c.n, 0),
      decksTotal: upto.length,
    });
  });
  changelogCache = entries.reverse();   // newest first
  return changelogCache;
}

// One-line "here's what moved" for the Build view banner.
function changelogHeadline() {
  const entries = buildChangelog();
  const latest = entries.find(e => !e.first);
  if (!latest) return null;
  const bits = [];
  latest.diff.added.slice(0, 2).forEach(c => bits.push('+' + c.n + ' ' + shortName(c.name)));
  latest.diff.removed.slice(0, 2).forEach(c => bits.push('−' + c.n + ' ' + shortName(c.name)));
  const what = bits.length ? bits.join(', ') : 'the consensus list held firm';
  return { date: latest.date, event: latest.eventNames[0] || latest.date, what, n: latest.arrived.length };
}

function renderChangelog() {
  const entries = buildChangelog();
  if (!entries.length) return '<div class="summary-box">No event dates on the current decks — nothing to replay.</div>';
  let html = '<h2>What changed</h2>';
  html += '<p class="sub">The consensus prototype rebuilt after each event, diffed against the one before it. This is how the deck has actually moved as results came in — not a diff of the raw data. Reads every deck, so the filters above don\'t apply.</p>';
  html += '<div class="timeline">';
  entries.forEach(e => {
    const evName = e.eventNames.join(', ') || e.date;
    let body = '';
    if (e.first) {
      body += '<div class="tl-note">First event in the database — the consensus starts here.</div>';
    } else if (!e.diff.added.length && !e.diff.removed.length) {
      body += '<div class="tl-note">No change to the consensus 40. The new lists agreed with everything already known.</div>';
    } else {
      body += '<div class="tl-note"><strong>' + e.swaps + ' card' + (e.swaps === 1 ? '' : 's') + '</strong> changed in the consensus 40.</div>';
      e.diff.removed.forEach(c => body += '<div class="diff-line diff-del" data-card="' + attr(c.name) + '" data-cardopen="' + attr(c.name) + '">' + cardImg(c.name) + '<span>&minus;' + c.n + ' ' + escHtml(c.name) + '</span></div>');
      e.diff.added.forEach(c => body += '<div class="diff-line diff-add" data-card="' + attr(c.name) + '" data-cardopen="' + attr(c.name) + '">' + cardImg(c.name) + '<span>+' + c.n + ' ' + escHtml(c.name) + '</span></div>');
    }

    const facts = [];
    facts.push(e.arrived.length + ' Diana list' + (e.arrived.length === 1 ? '' : 's') + ' added (' +
      e.arrived.map(d => d.placement).filter(Boolean).join(', ') + ') · ' + e.decksTotal + ' total');
    const clusterBits = Object.entries(e.clusters).map(([n, c]) => c + '× ' + n);
    if (clusterBits.length) facts.push(clusterBits.join(', '));
    if (e.ev) {
      const total = Object.values(e.ev.counts || {}).reduce((a, b) => a + b, 0);
      const dn = (e.ev.counts || {})[META.diana] || 0;
      if (total) facts.push('Diana was ' + dn + '/' + total + ' (' + Math.round(100 * dn / total) + '%) of the top cut');
      if (e.ev.dianaDay1 && e.ev.day1) {
        const dc = 100 * e.ev.dianaDay2 / e.ev.dianaDay1, fc = 100 * e.ev.day2 / e.ev.day1;
        facts.push('converted ' + dc.toFixed(1) + '% into Day 2 vs field ' + fc.toFixed(1) + '% (' + (dc / fc).toFixed(2) + '×)');
      }
      if (e.ev.attendance) facts.push(e.ev.attendance.toLocaleString() + ' players');
    }

    html += '<div class="tl-item"><div class="tl-dot"></div>' +
      '<div class="tl-body"><div class="tl-head"><strong>' + escHtml(evName) + '</strong><span class="tl-date">' + e.date + '</span></div>' +
      '<div class="tl-facts">' + escHtml(facts.join(' · ')) + '</div>' + body + '</div></div>';
  });
  html += '</div>';
  return html;
}

/* ---------------- The wider field (field.js) ---------------- */
function fieldReady() { return !!(window.FIELD && FIELD.archetypes); }

// Field decks are stored compactly ({name: count}); reshape one into the same
// shape decks.js uses so the deck modal and diff code can render it unchanged.
function fieldDeck(slug, j) {
  const d = FIELD.archetypes[slug].decks[j];
  const conv = o => Object.entries(o || {}).map(([name, count]) => ({ name, count })).sort((a, b) => a.name.localeCompare(b.name));
  return {
    label: d.label, player: d.player, placement: d.placement, event: d.event, event_date: d.date, url: d.url,
    cards: conv(d.main), sideboard: conv(d.side), runes: conv(d.runes),
    battlefields: (d.battlefields || []).map(name => ({ name, count: 1 })),
  };
}

function archConversion(slug) {
  const P = window.META && META.performance;
  const a = FIELD.archetypes[slug];
  if (!P || !P.fieldConversion || !a.legend) return null;
  const row = P.archetypes.find(x => x.slug === a.legend);
  if (!row) return null;
  return { ...row, index: row.conversion / P.fieldConversion, fieldConversion: P.fieldConversion };
}

// Weighted consensus over an archetype's own lists (no placement weights exist
// for the scraped field, so every list counts once).
function archStats(slug) {
  const decks = FIELD.archetypes[slug].decks.map(d => ({
    cards: Object.entries(d.main).map(([name, count]) => ({ name, count })), weight: 1,
  }));
  return { decks, ranked: computeStats(decks) };
}

// Merge two {name: count} card maps, summing copies. Used to fold a deck's
// sideboard into its main for the post-board "everything they can present" pool.
function mergeCounts(a, b) {
  const out = Object.assign({}, a);
  Object.entries(b || {}).forEach(([k, v]) => { out[k] = (out[k] || 0) + v; });
  return out;
}

// The shape of a set of decks as the coverage heuristic sees it: what there is
// to answer, averaged per list. `perDeckMaps` is one {name: count} map per deck,
// so the same code profiles an archetype's mains, its main+board pool, or a
// single list (your own deck, for the reverse "what answers you" pass).
function buildProfile(perDeckMaps) {
  const n = perDeckMaps.length || 1;
  let units = 0, spells = 0, gear = 0, costSum = 0, costN = 0;
  const mightCounts = {};    // might -> unit copies (summed over the lists)
  const bucket = {};         // "type|might" -> copies, the things you must answer
  const bucketCost = {};     // "type|might" -> Σ cost×copies, for a per-class landing turn
  perDeckMaps.forEach(dm => Object.entries(dm).forEach(([name, c]) => {
    const m = cardInfo(name) || {};
    if (m.type === 'Unit') { units += c; if (m.might != null) mightCounts[m.might] = (mightCounts[m.might] || 0) + c; }
    else if (m.type === 'Spell') spells += c;
    else if (m.type === 'Gear') gear += c;
    if (m.cost != null) { costSum += m.cost * c; costN += c; }
    const key = (m.type || 'Other') + '|' + (m.might == null ? '' : m.might);
    bucket[key] = (bucket[key] || 0) + c;
    if (m.cost != null) bucketCost[key] = (bucketCost[key] || 0) + m.cost * c;
  }));
  const knownUnits = Object.values(mightCounts).reduce((a, b) => a + b, 0);
  const threats = Object.entries(bucket).map(([k, copies]) => {
    const [type, might] = k.split('|');
    // Copy-weighted average cost of the class — a proxy for the turn it lands,
    // which is the turn you need an answer in hand by.
    const cost = copies && bucketCost[k] != null ? bucketCost[k] / copies : null;
    return { type, might: might === '' ? null : +might, copies: copies / n, cost };
  });
  return {
    n, units: units / n, spells: spells / n, gear: gear / n,
    avgCost: costN ? costSum / costN : 0, mightCounts, knownUnits, threats,
    mainCopies: threats.reduce((a, t) => a + t.copies, 0),
    // Fraction of their unit copies that a "deals/kills up to M might" answer hits.
    unitFracAtMost(M) {
      if (!knownUnits) return 0;
      let hit = 0;
      Object.entries(mightCounts).forEach(([might, c]) => { if (+might <= M) hit += c; });
      return hit / knownUnits;
    },
  };
}

// Podium (1st/2nd) vs the rest of the top cut, per threat class — a proxy for
// "the card that actually matters" beyond raw copy count. Needs 3+ lists on
// each side to say anything; below that every class stays neutral, which is
// also what recovers plain copies-only coverage (see applyImportance).
function archLean(slug) {
  const all = (FIELD.archetypes[slug] || { decks: [] }).decks
    .filter(d => d.placement && d.placement !== 'Best of' && d.placement !== 'Ladder');
  const podium = all.filter(d => d.placement === '1st' || d.placement === '2nd');
  const rest = all.filter(d => d.placement !== '1st' && d.placement !== '2nd');
  if (podium.length < 3 || rest.length < 3) return null;
  const bucket = ds => {
    const m = {};
    buildProfile(ds.map(d => d.main)).threats.forEach(t => { m[t.type + '|' + (t.might == null ? '' : t.might)] = t.copies; });
    return m;
  };
  return { podium: bucket(podium), rest: bucket(rest) };
}

// Importance multiplier per threat class: cost relative to the archetype's
// own average (a bigger investment matters more) × podium lean (winning
// lists lean on this beyond raw copies). Both factors default to neutral (1)
// absent evidence, so importance=1 everywhere is a strict generalisation of
// the original copies-only coverage, not a rewrite of it.
function applyImportance(p, slug) {
  const lean = slug ? archLean(slug) : null;
  p.threats.forEach(t => {
    const costW = p.avgCost ? Math.max(0.5, (t.cost != null ? t.cost : p.avgCost) / p.avgCost) : 1;
    let leanW = 1;
    if (lean) {
      const key = t.type + '|' + (t.might == null ? '' : t.might);
      const pod = lean.podium[key] || 0, rst = lean.rest[key] || 0;
      if (rst > 0) leanW = Math.max(0.5, Math.min(2, pod / rst));
      else if (pod > 0) leanW = 2;
    }
    t.importance = costW * leanW;
  });
  p.weightedMainCopies = p.threats.reduce((a, t) => a + t.copies * t.importance, 0) || p.mainCopies || 1;
  return p;
}

// How an archetype's board actually looks. opts.includeSide folds each list's
// sideboard in, giving the superset of cards they can present across games 2-3.
function archProfile(slug, opts) {
  const decks = FIELD.archetypes[slug].decks;
  const includeSide = opts && opts.includeSide;
  const p = buildProfile(decks.map(d => includeSide ? mergeCounts(d.main, d.side) : d.main));
  p.n = decks.length;
  return applyImportance(p, slug);
}

// Profile of a single arbitrary list (your deck) — the threats an opponent's
// removal has to line up against, for the reverse coverage pass.
function profileFromList(list) {
  const counts = {};
  list.forEach(c => { counts[c.name] = (counts[c.name] || 0) + c.count; });
  const p = buildProfile([counts]);
  p.n = 1;
  return p;
}

// An archetype's averaged card list as answers — what they hold against YOU.
// opts.includeSide adds the anti-you tech they bring in post-board.
function archAnswerList(slug, opts) {
  const decks = FIELD.archetypes[slug].decks;
  const n = decks.length || 1;
  const includeSide = opts && opts.includeSide;
  const sum = {};
  decks.forEach(d => Object.entries(includeSide ? mergeCounts(d.main, d.side) : d.main)
    .forEach(([name, c]) => { sum[name] = (sum[name] || 0) + c; }));
  return Object.entries(sum).map(([name, c]) => ({ name, count: c / n }));
}

/* ---------------- Tech coverage ----------------
   No match data exists, so nothing here can tell you a card "wins" a matchup.
   What the data CAN support: a card's rules text says what it answers, and the
   opposing lists say what there is to answer. Cross the two and you get
   coverage — an explicit, inspectable heuristic, not a win rate. */

function techTags(name) {
  const info = cardInfo(name);
  return (info && info.techTags) || [];
}

// How well does one card answer one thing the opponent plays? 1 = a clean
// answer, 0 = no interaction. Partial answers (bounce, stun, a combat trick
// that can never kill) are discounted rather than counted or ignored.
function handleQuality(tags, threat, answerCost) {
  let q = 0;
  const at = (v) => { if (v > q) q = v; };
  tags.forEach(t => {
    const size = t.size;
    // Hand attack is type-blind: it takes a card before it is ever a threat.
    // Heavily discounted — you hit whatever they happen to be holding, not the
    // card you need gone. (Was tagged but scored 0 against everything.)
    if (t.tag === 'handAttack') { at(0.4); return; }
    if (threat.type === 'Unit') {
      const m = threat.might;
      switch (t.tag) {
        case 'kill':       at(1); break;
        case 'damage':     if (size != null && m != null && m <= size) at(1); break;
        case 'killSmall':  if (size != null && m != null && m <= size) at(1); break;
        case 'shrink':     if (size != null && m != null && m <= size) at(1); break;
        case 'sweep':      at(size != null && m != null && m <= size ? 1 : 0.6); break;   // sizeless sweeps are mass bounce
        case 'bounce':     at(0.6); break;
        case 'stun':       at(0.35); break;
        case 'shrinkSoft': at(0.25); break;
      }
    } else if (threat.type === 'Gear') {
      if (t.tag === 'gearHate') at(1);
      else if (t.tag === 'sweep' && size == null) at(0.6);   // Downwell bounces gear too
    } else if (threat.type === 'Spell') {
      if (t.tag === 'counter') at(1);
    }
  });
  // Answer economy: spending a card that costs more than the threat it kills
  // is a worse rate exchange — discounted, floored at 0.5 because it still
  // fully answers the card, just inefficiently. Never boosts: a cheap answer
  // to an expensive threat keeps whatever quality the tag alone earned.
  if (q > 0 && answerCost != null && threat.cost != null && answerCost > 0) {
    q *= Math.max(0.5, Math.min(1, threat.cost / answerCost));
  }
  return q;
}

// Coverage of one archetype: the share of their main deck, copy by copy, that
// you hold an answer to. No free calibration constants — every number is
// "how many of their 40 cards can this list interact with".
//
// `opts.deckSize` opts in to TIMELY coverage: breadth asks only whether you own
// an answer, which saturates (one counter "covers" all their spells). Timely
// discounts each threat class by the probability you have actually drawn a
// relevant answer by the turn it lands, off a deckSize-card deck. That makes
// copies matter — a lone silver bullet is unreliable, a third copy of it is not
// — and it can only ever lower breadth, never inflate it.
function coverageOf(list, p, opts) {
  const deckSize = opts && opts.deckSize;
  const answers = list.map(c => ({ name: c.name, count: c.count, tags: techTags(c.name), cost: (cardInfo(c.name) || {}).cost }));
  let covered = 0, timely = 0;
  p.threats.forEach(t => {
    const w = t.importance || 1;   // threat-importance weight; 1 if none was computed (e.g. the reverse pass)
    let q = 0, answerCopies = 0;
    answers.forEach(a => {
      const x = handleQuality(a.tags, t, a.cost);
      if (x > q) q = x;
      if (x > 0) answerCopies += a.count;   // every copy that interacts is a card you could draw
    });
    covered += t.copies * w * q;
    if (deckSize && q > 0) {
      const turn = Math.max(1, Math.round(t.cost != null ? t.cost : 3));
      // answerCopies can be fractional when the answers are an averaged list
      // (the reverse pass); the hypergeometric wants an integer copy count.
      timely += t.copies * w * q * pAnswerByTurn(Math.round(answerCopies), deckSize, turn);
    }
  });
  // weightedMainCopies (importance-weighted) when available, else the plain
  // copy total — so importance=1 everywhere is provably the same score.
  const total = p.weightedMainCopies || p.mainCopies || 1;

  // Which single card pulls the most weight, and how many relevant copies you hold.
  // `solo` stays in card-copies until the winner is picked — comparing a raw
  // copy count against an already-normalised fraction silently elects the last
  // card in the list.
  let best = { name: null, solo: 0, tag: null }, depth = 0;
  answers.forEach(a => {
    let solo = 0;
    p.threats.forEach(t => solo += t.copies * (t.importance || 1) * handleQuality(a.tags, t, a.cost));
    if (solo > 0) depth += a.count;
    if (solo > best.solo) best = { name: a.name, solo, tag: dominantTag(a.tags, p, a.cost) };
  });
  const coverage = covered / total;
  return { coverage, timely: timely / total, drawOdds: coverage > 0 ? (timely / total) / coverage : 0,
    ...best, solo: best.solo / total, depth };
}

// The tag that explains most of a card's contribution — for the "why" string.
function dominantTag(tags, p, answerCost) {
  let best = null, bestVal = -1;
  tags.forEach(t => {
    let v = 0;
    p.threats.forEach(th => v += th.copies * (th.importance || 1) * handleQuality([t], th, answerCost));
    if (v > bestVal) { bestVal = v; best = t; }
  });
  return best;
}

// Marginal coverage a card would add to this list — what a suggestion is worth.
function marginalGain(name, list, p, baseline) {
  return coverageOf(list.concat([{ name, count: 1 }]), p).coverage - baseline;
}

// `p` is the profile being answered. By default that is the opponent ("their
// units"); in the reverse pass p is your own deck, so opts.self flips the
// pronouns to "your units" without duplicating the templates.
function answerWhy(name, tag, p, opts) {
  if (!tag) return 'no interaction in its rules text';
  const size = tag.size;
  const n = x => Math.round(x);
  const self = opts && opts.self;
  const who = self ? 'you run' : 'they run';
  const poss = self ? 'your' : 'their';
  switch (tag.tag) {
    case 'counter':    return 'counters spells — ' + who + ' ' + n(p.spells) + ' in ' + poss + ' 40';
    case 'kill':       return 'unconditional removal — answers any of ' + poss + ' ' + n(p.units) + ' units';
    case 'damage':     return 'deals ' + size + ', killing ' + pct(p.unitFracAtMost(size)) + ' of ' + poss + ' unit copies';
    case 'killSmall':  return 'answers ' + size + ' might or less — ' + pct(p.unitFracAtMost(size)) + ' of ' + poss + ' units';
    case 'shrink':     return '−' + size + ' might kills ' + pct(p.unitFracAtMost(size)) + ' of ' + poss + ' units';
    case 'sweep':      return 'sweeper — ' + who + ' ' + n(p.units) + ' units in ' + poss + ' 40';
    case 'gearHate':   return 'gear removal — ' + who + ' ' + n(p.gear) + ' gear in ' + poss + ' 40';
    case 'bounce':     return 'bounce — tempo, not a permanent answer';
    case 'shrinkSoft': return 'combat trick — blunts, never kills';
    case 'handAttack': return 'hand attack — strips one card';
    case 'stun':       return 'stun — buys a turn';
    default:           return '';
  }
}

/* ---- Beyond neutralization ----
   Coverage only sees cards that neutralize other cards — one of several ways a
   list wins a matchup. These helpers read the other axes off the same printed
   text and decklists: card economy (draw/selection/recursion), combat (your
   units answering theirs by out-Mighting them), the clock (who is faster), and
   protection (foiling their removal). Still no match data: every number is a
   decklist fact or a disclosed discount. */

const ECON_WEIGHTS = { draw: 1, loot: 0.5, selection: 0.5, recursion: 0.5 };
const _econCache = new Map();
function econTags(name) {
  if (_econCache.has(name)) return _econCache.get(name);
  const info = cardInfo(name);
  const e = (info && info.effect) || '';
  const tags = [];
  const draw = e.match(/draw (\d+)/i);
  // "draw 1, then discard 1" is selection, not card advantage (Hwei, Merchant).
  const selfDiscard = /discard \d/i.test(e) && !/they discard|opponent/i.test(e);
  if (draw) tags.push(selfDiscard
    ? { tag: 'loot', label: 'loot — filters, does not add cards', value: ECON_WEIGHTS.loot }
    : { tag: 'draw', label: 'draw ' + draw[1], value: ECON_WEIGHTS.draw * +draw[1] });
  if (/look at the top (\d+)/i.test(e)) tags.push({ tag: 'selection', label: 'card selection', value: ECON_WEIGHTS.selection });
  if (/return[\s\S]{0,60}?trash/i.test(e)) tags.push({ tag: 'recursion', label: 'recursion from trash', value: ECON_WEIGHTS.recursion });
  _econCache.set(name, tags);
  return tags;
}
function gasValue(name) { return econTags(name).reduce((a, t) => a + t.value, 0); }
// Card-economy copies in a list: Σ copies × per-card weight. Flat per copy —
// a repeatable engine is undercounted, a one-shot overcounted; disclosed.
function gasOf(list) { return list.reduce((a, c) => a + c.count * gasValue(c.name), 0); }

// Cards that FOIL removal rather than being removal: a counter stops the
// removal spell itself, a +N Might trick lifts the target out of a sized
// answer's range (situational, so it counts half). Spells only — a unit
// pumping itself is a body, not a trick you hold up.
const _protCache = new Map();
function protectTags(name) {
  if (_protCache.has(name)) return _protCache.get(name);
  const info = cardInfo(name);
  const tags = [];
  if (info && info.type === 'Spell') {
    const e = info.effect || '';
    if (techTags(name).some(t => t.tag === 'counter')) tags.push({ tag: 'counterSave', label: 'counters the removal spell', q: 1 });
    const pump = e.match(/\+(\d+) :rb_might:/i);
    if (pump) tags.push({ tag: 'pump', label: '+' + pump[1] + ' Might trick', size: +pump[1], q: 0.5 });
  }
  _protCache.set(name, tags);
  return tags;
}

// P(a random unit of yours out-Mights a random unit of theirs). Combat is the
// game's native removal, and it is free — you are already playing the units.
// Pure probability from both Might distributions, no constants.
function combatParity(you, them) {
  if (!you.knownUnits || !them.knownUnits) return null;
  let win = 0, tie = 0;
  Object.entries(you.mightCounts).forEach(([a, ca]) => {
    Object.entries(them.mightCounts).forEach(([b, cb]) => {
      const p = (ca / you.knownUnits) * (cb / them.knownUnits);
      if (+a > +b) win += p; else if (+a === +b) tie += p;
    });
  });
  return { win, tie, lose: Math.max(0, 1 - win - tie) };
}

// Share of their unit-removal copies you hold a foil to, quality-weighted —
// the counterweight to the Exposure column.
function shieldAgainst(theirAnswers, yourCards) {
  const foils = [];
  yourCards.forEach(c => protectTags(c.name).forEach(t => foils.push({ ...t, name: c.name })));
  let total = 0, saved = 0, best = { name: null, q: 0 };
  theirAnswers.forEach(a => {
    const info = cardInfo(a.name);
    const removal = techTags(a.name).filter(t => ['kill', 'damage', 'killSmall', 'shrink', 'sweep'].includes(t.tag));
    if (!removal.length) return;
    total += a.count;
    let q = 0, who = null;
    foils.forEach(f => {
      let v = 0;
      if (f.tag === 'counterSave' && info && info.type === 'Spell') v = f.q;
      else if (f.tag === 'pump' && removal.some(t => t.size != null)) v = f.q;
      if (v > q) { q = v; who = f.name; }
    });
    saved += a.count * q;
    if (q > best.q) best = { name: who, q };
  });
  return total ? { share: saved / total, total, best: best.name } : null;
}

// Which axis most likely decides the pairing, from two decklist differentials.
// The thresholds (±0.3 cost, ±1.5 gas) are disclosed judgment calls — there is
// no result data to fit them to.
function planFor(clockD, gasD) {
  if (clockD >= 0.3) return { label: 'Race', axis: 'protect', why: 'your curve is ~' + clockD.toFixed(1) + ' cheaper — keep the pressure on and protect what sticks' };
  if (clockD <= -0.3) return { label: 'Stabilize', axis: 'cheapAnswer', why: 'their curve is ~' + (-clockD).toFixed(1) + ' cheaper — cheap interaction beats clever interaction' };
  if (gasD >= 1.5) return { label: 'Grind', axis: 'econ', why: 'even speed and you out-draw them by ~' + gasD.toFixed(1) + ' cards — extend the game' };
  if (gasD <= -1.5) return { label: 'Pressure', axis: 'handAttack', why: 'even speed but they out-draw you by ~' + (-gasD).toFixed(1) + ' cards — end it before gas decides, or strip their hand' };
  return { label: 'Attrition', axis: 'twoForOne', why: 'even speed, even gas — card-for-card exchanges decide it' };
}

// Board suggestions routed to the plan's axis, from the Diana pool — so the
// advice stops defaulting to removal when removal is not what the matchup asks.
function planSuggestions(axis, p, sideList) {
  const inSide = new Set(sideList.map(c => c.name));
  const cand = Object.keys(window.CARDS || {}).filter(n => !inSide.has(n));
  let scored = [];
  if (axis === 'econ') {
    scored = cand.filter(n => gasValue(n) > 0)
      .map(n => ({ n, s: gasValue(n), why: econTags(n).map(t => t.label).join(', ') }));
  } else if (axis === 'cheapAnswer') {
    const base = coverageOf(sideList, p).coverage;
    scored = cand.filter(n => techTags(n).length && ((cardInfo(n) || {}).cost || 9) <= 2)
      .map(n => ({ n, s: marginalGain(n, sideList, p, base), why: 'cheap answer — lands before their curve does' }))
      .filter(x => x.s > 0.01);
  } else if (axis === 'protect') {
    scored = cand.filter(n => protectTags(n).length)
      .map(n => ({ n, s: protectTags(n).reduce((a, t) => a + t.q, 0), why: protectTags(n).map(t => t.label).join(', ') }));
  } else if (axis === 'handAttack') {
    scored = cand.filter(n => techTags(n).some(t => t.tag === 'handAttack'))
      .map(n => ({ n, s: 1, why: 'strips their gas before it lands' }));
  } else { // twoForOne
    scored = cand.filter(n => techTags(n).some(t => t.tag === 'sweep') || gasValue(n) > 0)
      .map(n => ({
        n, s: (techTags(n).some(t => t.tag === 'sweep') ? 1 : 0) + gasValue(n),
        why: techTags(n).some(t => t.tag === 'sweep') ? 'sweeper — the cleanest 2-for-1' : econTags(n).map(t => t.label).join(', '),
      }));
  }
  return scored.sort((a, b) => b.s - a.s).slice(0, 2);
}

/* ---- Field model: which field are you prepping for? ----
   You don't play against the historical average — you play against next
   week's field, maybe in one region. The model reweights every field deck by
   recency (exponential decay) and/or region, and everything downstream
   (threat, coverage, mirror prep) reads it. */

let _fieldLatest = null;
function fieldLatestDate() {
  if (_fieldLatest == null) {
    let max = 0;
    Object.values(FIELD.archetypes).forEach(a => a.decks.forEach(d => {
      if (d.date) max = Math.max(max, new Date(d.date).getTime());
    }));
    _fieldLatest = max || Date.now();
  }
  return _fieldLatest;
}

function fieldDeckWeight(d) {
  // Event showcase lists ("Best of <event>") are decklist evidence, not
  // results evidence: they enrich archetype profiles (archProfile reads every
  // list) but carry zero weight in field share and threat.
  if (d.placement === 'Best of') return 0;
  if (fieldModel.region && regionOf(d.event) !== fieldModel.region) return 0;
  if (!fieldModel.recency) return 1;
  // Undated lists can't prove they're recent; treat them as very old.
  const age = d.date ? Math.max(0, (fieldLatestDate() - new Date(d.date).getTime()) / 86400000) : 120;
  return Math.pow(0.5, age / FIELD_HALF_LIFE_DAYS);
}

function setFieldRecency(on) { fieldModel.recency = on; saveFieldModel(); render(); }
function setFieldRegion(r) { fieldModel.region = fieldModel.region === r ? null : r; saveFieldModel(); render(); }
function saveFieldModel() { try { localStorage.setItem('ddl-fieldmodel', JSON.stringify(fieldModel)); } catch (e) {} }

function fieldModelLabel() {
  const bits = [];
  if (fieldModel.recency) bits.push('recent form (half-life ' + FIELD_HALF_LIFE_DAYS + ' days)');
  if (fieldModel.region) bits.push(fieldModel.region + ' events only');
  return bits.join(', ');
}

// Threat weight: how much of the expected field it is, scaled by how well it
// converts. A rare deck that wins is worth teching against; a popular deck
// that folds on Day 1 is not. Shares are of the WHOLE field (mirror included)
// under the active field model.
function threatWeights(opts) {
  const includeMirror = opts && opts.includeMirror;
  const slugs = Object.keys(FIELD.archetypes);
  const wOf = {};
  let totalW = 0, rawN = 0, effN = 0;
  slugs.forEach(slug => {
    const w = FIELD.archetypes[slug].decks.reduce((a, d) => a + fieldDeckWeight(d), 0);
    wOf[slug] = w; totalW += w;
    rawN += FIELD.archetypes[slug].decks.length; effN += w;
  });
  const rows = slugs
    .filter(s => includeMirror || s !== FIELD.diana)
    .map(slug => {
      const conv = archConversion(slug);
      const share = totalW ? wOf[slug] / totalW : 0;
      return {
        slug, n: FIELD.archetypes[slug].decks.filter(d => d.placement !== 'Best of').length,
        nAll: FIELD.archetypes[slug].decks.length, effN: wOf[slug], share, conv,
        weight: share * (conv ? conv.index : 1), mirror: slug === FIELD.diana,
      };
    })
    .filter(r => r.effN > 0)
    .sort((a, b) => b.weight - a.weight);
  return { rows, rawN, effN, modelOn: !!(fieldModel.recency || fieldModel.region) };
}

function currentSideboard() {
  const parsed = parseDeckText(sideText);
  const list = Object.entries(parsed.counts).map(([name, count]) => ({ name, count }));
  if (list.length) return { list, source: 'your sideboard', mine: true };
  const ex = consensusExtras(globalDecks);
  return { list: ex.side.map(c => ({ name: c.name, count: c.copies })), source: 'the consensus sideboard', mine: false };
}

function sideChanged() {
  sideText = document.getElementById('sideInput').value;
  try { localStorage.setItem('ddl-side', sideText); } catch (e) {}
  clearTimeout(sideTimer);
  sideTimer = setTimeout(() => { const o = document.getElementById('coverOut'); if (o) o.innerHTML = coverageHTML(); }, 350);
}
function addToSideboard(name) {
  // With an empty box we are scoring the consensus sideboard, so "add" has to
  // mean "add to that" — otherwise the first click silently swaps SIDEBOARD_SIZE
  // cards for 1 and coverage falls.
  const { list } = currentSideboard();
  const counts = {};
  list.forEach(c => counts[c.name] = c.count);
  counts[name] = (counts[name] || 0) + 1;
  bCheckpoint();
  sideText = Object.entries(counts).map(([n, c]) => c + ' ' + n).join('\n');
  try { localStorage.setItem('ddl-side', sideText); } catch (e) {}
  const ta = document.getElementById('sideInput'); if (ta) ta.value = sideText;
  const o = document.getElementById('coverOut'); if (o) o.innerHTML = coverageHTML();
  toast('Added ' + name + ' to your sideboard');
}

/* ---- Sideboard optimizer ----
   Same greedy hill-climb shape as the main-deck optimizer (optimizeList),
   scored on the exact field-weighted timely coverage the table above already
   shows — threat-importance and answer-economy discounts included, since
   both flow through coverageOf. Not a separate metric, the same one made
   actionable. `rows` (weight + archetype profile per row) is computed once
   by the caller and reused across every trial list, so the hot loop never
   recomputes archProfile/archLean. */
function sideboardScore(list, rows) {
  const wSum = rows.reduce((a, r) => a + r.weight, 0) || 1;
  return rows.reduce((a, r) => a + r.weight * coverageOf(list, r.p, { deckSize: DECK_SIZE }).timely, 0) / wSum;
}

function optimizeSideboard(startCounts, rows, slots) {
  const counts = {};
  Object.entries(startCounts).forEach(([n, c]) => { if (c > 0) counts[n] = Math.min(c, 3); });
  const pool = Object.keys(window.CARDS || {}).filter(n => techTags(n).length || econTags(n).length || protectTags(n).length);
  const size = () => Object.values(counts).reduce((a, b) => a + b, 0);
  const toList = c => Object.entries(c).map(([name, count]) => ({ name, count }));
  const moves = [];

  // Trim to the slot cap first if the starting board is oversize, cutting
  // whatever costs the score least.
  while (size() > slots) {
    let worst = null, worstScore = Infinity;
    Object.keys(counts).forEach(n => {
      const trial = { ...counts }; trial[n]--; if (!trial[n]) delete trial[n];
      const s = sideboardScore(toList(trial), rows);
      if (s < worstScore) { worstScore = s; worst = n; }
    });
    counts[worst]--; if (!counts[worst]) delete counts[worst];
    moves.push({ kind: 'trim', cut: worst });
  }

  // Fill remaining slots with whichever single add gains the most, one at a time.
  while (size() < slots) {
    const base = sideboardScore(toList(counts), rows);
    let best = null, bestGain = 0.002;
    pool.forEach(n => {
      if ((counts[n] || 0) >= 3) return;
      const gain = sideboardScore(toList({ ...counts, [n]: (counts[n] || 0) + 1 }), rows) - base;
      if (gain > bestGain) { bestGain = gain; best = n; }
    });
    if (!best) break;
    counts[best] = (counts[best] || 0) + 1;
    moves.push({ kind: 'add', add: best, gain: bestGain });
  }

  // Swap pass: once full, try replacing each held card with something better.
  for (let iter = 0; iter < 15; iter++) {
    const base = sideboardScore(toList(counts), rows);
    let best = null, bestGain = 0.002;
    Object.keys(counts).forEach(cut => {
      const trial = { ...counts }; trial[cut]--; if (!trial[cut]) delete trial[cut];
      pool.forEach(add => {
        if (add === cut || (trial[add] || 0) >= 3) return;
        const gain = sideboardScore(toList({ ...trial, [add]: (trial[add] || 0) + 1 }), rows) - base;
        if (gain > bestGain) { bestGain = gain; best = { cut, add }; }
      });
    });
    if (!best) break;
    counts[best.cut]--; if (!counts[best.cut]) delete counts[best.cut];
    counts[best.add] = (counts[best.add] || 0) + 1;
    moves.push({ kind: 'swap', ...best, gain: bestGain });
  }

  return { counts, moves };
}

function runSideboardOptimizer() {
  const { list, source } = currentSideboard();
  const tw = threatWeights({ includeMirror: true });
  const rows = tw.rows.map(w => ({ weight: w.weight, p: archProfile(w.slug) }));
  const startCounts = {};
  list.forEach(c => startCounts[c.name] = c.count);
  const before = sideboardScore(list, rows);
  const { counts, moves } = optimizeSideboard(startCounts, rows, SIDEBOARD_SIZE);
  const optimizedList = Object.entries(counts).map(([name, count]) => ({ name, count }));
  const after = sideboardScore(optimizedList, rows);
  const out = document.getElementById('sbOptResults');
  if (!out) return;

  let html = '<div class="summary-box"><strong>Optimized from ' + escHtml(source) + '.</strong> Field-weighted timely coverage: ' +
    pct(before) + ' → <strong>' + pct(after) + '</strong>. Greedy hill-climb over the same ' + rows.length + ' weighted archetypes and the same threat-importance / answer-economy discounts as the table above — consensus-optimal against the expected field, not a guarantee against any one opponent.</div>';
  if (!moves.length) {
    html += '<div class="summary-box">No improving change found — this sideboard already sits at a local optimum against the weighted field.</div>';
  } else {
    moves.forEach(m => {
      if (m.kind === 'trim') {
        html += '<div class="diff-line diff-del" data-card="' + attr(m.cut) + '">' + cardImg(m.cut) + '<span>&minus;1 ' + escHtml(m.cut) + '</span><span style="font-size:11px;opacity:0.7;">trimming to 8 slots</span></div>';
      } else if (m.kind === 'add') {
        html += '<div class="diff-line diff-add" data-card="' + attr(m.add) + '">' + cardImg(m.add) + '<span>+1 ' + escHtml(m.add) + '</span><span style="font-size:11px;opacity:0.7;">+' + pct(m.gain) + ' field-weighted timely</span></div>';
      } else {
        html += '<div class="diff-line diff-del" data-card="' + attr(m.cut) + '">' + cardImg(m.cut) + '<span>&minus;1 ' + escHtml(m.cut) + '</span></div>';
        html += '<div class="diff-line diff-add" data-card="' + attr(m.add) + '">' + cardImg(m.add) + '<span>+1 ' + escHtml(m.add) + '</span><span style="font-size:11px;opacity:0.7;">+' + pct(m.gain) + ' field-weighted timely</span></div>';
      }
    });
    html += '<div style="margin-top:10px;"><button id="sbOptApply">Apply optimized sideboard</button></div>';
  }
  out.innerHTML = html;
  const btn = document.getElementById('sbOptApply');
  if (btn) btn.onclick = () => {
    bCheckpoint();
    sideText = Object.entries(counts).map(([n, c]) => c + ' ' + n).join('\n');
    try { localStorage.setItem('ddl-side', sideText); } catch (e) {}
    const ta = document.getElementById('sideInput'); if (ta) ta.value = sideText;
    const o = document.getElementById('coverOut'); if (o) o.innerHTML = coverageHTML();
    toast('Optimized sideboard applied');
  };
}

function coverageHTML() {
  const { list, source, mine } = currentSideboard();
  const tw = threatWeights({ includeMirror: true });
  if (!list.length) return '<div class="summary-box">No sideboard to score.</div>';

  const rows = tw.rows.map(w => {
    const p = archProfile(w.slug);
    // Games 2-3 are against their post-board pool. With ≥3 lists we can trust
    // their averaged sideboard; below that it is one player's tech, so we
    // don't pretend to know their post-board deck.
    const enoughSide = FIELD.archetypes[w.slug].decks.length >= 3;
    const pSb = enoughSide ? archProfile(w.slug, { includeSide: true }) : null;
    return {
      ...w, p, pSb,
      cov: coverageOf(list, p, { deckSize: DECK_SIZE }),
      covSb: pSb ? coverageOf(list, pSb, { deckSize: DECK_SIZE }) : null,
    };
  });
  const wSum = rows.reduce((a, r) => a + r.weight, 0) || 1;
  const overall = rows.reduce((a, r) => a + r.weight * r.cov.coverage, 0) / wSum;
  const overallTimely = rows.reduce((a, r) => a + r.weight * r.cov.timely, 0) / wSum;
  const gaps = [...rows].filter(r => r.cov.coverage < 0.5).slice(0, 5);

  const sideNames = new Set(list.map(c => c.name));
  const pool = Object.keys((window.CARDS) || {}).filter(n => !sideNames.has(n) && techTags(n).length);
  const nCards = list.reduce((a, c) => a + c.count, 0);
  const haveLog = loadMatches().length > 0;

  let html = '<div class="summary-box"><strong>' + (mine ? 'Your' : 'The consensus') + ' ' + nCards + '-card sideboard holds <em>some</em> answer to ' +
    pct(overall) + ' of what the field plays' +
    ' — but weighting each of their cards by how likely you have actually <em>drawn</em> a relevant answer by the turn it lands, that falls to ' +
    pct(overallTimely) + '.</strong> ' +
    'The first number (<strong>breadth</strong>) is the chance your rules text addresses a random card from an opponent\'s main deck, averaged across archetypes weighted by ' +
    'how much of the top-cut field each one is <em>and</em> how well it converts into Day 2, so a rare deck that wins counts for more than a popular deck that folds. ' +
    (tw.modelOn ? '<strong>Field model: ' + escHtml(fieldModelLabel()) + '</strong> — effective sample ' + tw.effN.toFixed(1) + ' of ' + tw.rawN + ' lists. ' : '') +
    'The mirror is in the table too: other Diana players are part of your expected field.<br><br>' +
    'The gap between the two columns is your <strong>draw problem</strong>. Breadth counts a lone silver bullet the same as a full playset; the <strong>Timely</strong> column does not — ' +
    'a single counterspell "covers" all ' + Math.round(rows[0].p.spells) + ' spells ' + escHtml(FIELD.archetypes[rows[0].slug].name) +
    ' runs, but off a 40-card deck you will rarely have it in hand on the turn they cast one. Adding copies closes the gap: each extra copy raises the odds you have drawn one in time. ' +
    'Timely already folds the <em>Answers</em> depth column into hypergeometric draw odds (with mulligan). ' +
    'And interaction is only one axis of a matchup — the <strong>Matchup plans</strong> table below reads the clock, combat and card economy off the same decklists. ' +
    'None of it is a win rate — it cannot see sequencing, tempo, or your opponent\'s line: no per-match data is published for these events.</div>';

  html += '<div class="panel-wrap"><table class="incl"><thead><tr><th>Archetype</th><th class="num">Field</th><th class="num">Conv.</th>' +
    '<th>Their 40</th><th>Your best answer</th><th title="Do you hold any answer to each of their cards?">Breadth</th>' +
    '<th title="Breadth discounted by the chance you have drawn a relevant answer by the turn each threat lands. Off a 40-card deck, with mulligan.">Timely G1</th>' +
    '<th title="Timely coverage against their post-board pool — their main plus the sideboard tech they can bring in for games 2-3. Only shown for archetypes with 3+ scraped lists. A drop means their board adds threats you cannot answer.">Post-SB</th>' +
    '<th class="num">Answers</th>' +
    (haveLog ? '<th class="num" title="Your logged record vs this archetype (Log view)">You</th>' : '') +
    '<th class="num" title="Log a game vs this archetype without leaving this page. Play/draw and notes can be added later in the Log view.">Log</th></tr></thead><tbody>';
  rows.slice(0, 13).forEach(r => {
    const a = FIELD.archetypes[r.slug];
    const board = r.p.units.toFixed(1) + ' units / ' + r.p.spells.toFixed(1) + ' spells / ' + r.p.gear.toFixed(1) + ' gear · avg cost ' + r.p.avgCost.toFixed(2);
    const ans = r.cov.name
      ? cardImg(r.cov.name, 'tiny') + '<span data-card="' + attr(r.cov.name) + '">' + escHtml(shortName(r.cov.name)) + '</span>' +
        '<span class="ci">' + escHtml(answerWhy(r.cov.name, r.cov.tag, r.p)) + '</span>'
      : '<span style="color:var(--danger)">nothing</span>';
    const c = r.cov.coverage;
    const tm = r.cov.timely;
    const rec = haveLog ? matchRecord(r.slug) : null;
    html += '<tr' + (r.mirror ? ' style="font-weight:600"' : '') + '><td><span class="deck-link" onclick="openArch(\'' + r.slug + '\')">' +
      escHtml(r.mirror ? 'Diana — the mirror ★' : a.name) + '</span></td>' +
      '<td class="num">' + pct(r.share) + '</td>' +
      '<td class="num" style="color:' + (r.conv && r.conv.index >= 1 ? 'var(--lock)' : 'var(--muted)') + '">' + (r.conv ? r.conv.index.toFixed(2) + '×' : '—') + '</td>' +
      '<td style="color:var(--muted);font-size:12px;">' + escHtml(board) + '</td>' +
      '<td>' + ans + '</td>' +
      '<td title="' + attr((c * r.p.mainCopies).toFixed(0) + ' of their ' + r.p.mainCopies.toFixed(0) + ' main-deck cards, quality-weighted') + '">' +
      '<span class="incl-bar" style="width:' + Math.round(90 * c) + 'px;background:' + pctColor(c) + '"></span>' + pct(c) + '</td>' +
      '<td title="' + attr(pct(r.cov.drawOdds) + ' of that breadth arrives in time — you have drawn a relevant answer by the turn each threat lands. Off a 40-card deck, with mulligan.') + '">' +
      '<span class="incl-bar" style="width:' + Math.round(90 * tm) + 'px;background:' + pctColor(tm) + '"></span>' + pct(tm) + '</td>' +
      (function () {
        if (!r.covSb) return '<td class="num" style="color:var(--muted)" title="Fewer than 3 scraped lists — not enough sideboard data to trust an averaged post-board deck.">—</td>';
        const sb = r.covSb.timely, delta = sb - tm;
        const arrow = Math.abs(delta) < 0.03 ? '' : (delta < 0
          ? ' <span style="color:var(--danger);font-size:11px;">▼' + pct(-delta) + '</span>'
          : ' <span style="color:var(--lock);font-size:11px;">▲' + pct(delta) + '</span>');
        return '<td title="' + attr('Timely coverage against their main + sideboard pool (' + r.pSb.mainCopies.toFixed(0) + ' cards). Game-1 timely was ' + pct(tm) + '.') + '">' +
          '<span class="incl-bar" style="width:' + Math.round(90 * sb) + 'px;background:' + pctColor(sb) + '"></span>' + pct(sb) + arrow + '</td>';
      })() +
      '<td class="num" title="' + attr('Cards in this sideboard that interact with them at all. Breadth says you hold an answer; this says how many.') + '" ' +
      'style="color:' + (r.cov.depth >= 3 ? 'var(--muted)' : 'var(--flex)') + '">' + r.cov.depth + '</td>' +
      (haveLog ? '<td class="num" style="color:' + (rec.n ? (rec.w / rec.n >= 0.5 ? 'var(--lock)' : 'var(--danger)') : 'var(--muted)') + '">' +
        (rec.n ? rec.w + '–' + rec.l : '—') + '</td>' : '') +
      '<td class="num" style="white-space:nowrap">' +
      '<button class="mini" onclick="quickLog(\'' + r.slug + '\',\'W\')" title="Log a win vs ' + attr(a.name) + '">W</button> ' +
      '<button class="mini" onclick="quickLog(\'' + r.slug + '\',\'L\')" title="Log a loss vs ' + attr(a.name) + '">L</button></td></tr>';
  });
  html += '</tbody></table></div>';

  if (gaps.length) {
    html += '<h2>Coverage gaps</h2><p class="sub">The decks you are least equipped for, worst-weighted first. Each suggestion shows the coverage it would <em>add</em> against that archetype, and comes only from cards some winning Diana list has already played, main or side — nothing invented.</p>';
    gaps.forEach(r => {
      const a = FIELD.archetypes[r.slug];
      const best = pool.map(n => ({ n, gain: marginalGain(n, list, r.p, r.cov.coverage) }))
        .filter(x => x.gain > 0.02).sort((x, y) => y.gain - x.gain).slice(0, 3);
      html += '<div class="pkg-box"><strong>' + escHtml(a.name) + '</strong> — answers to ' + pct(r.cov.coverage) + ' of their 40 (' +
        r.cov.depth + ' relevant card' + (r.cov.depth === 1 ? '' : 's') + ', ' + pct(r.cov.timely) + ' drawn in time), ' +
        pct(r.share) + ' of the field' + (r.conv ? ' at ' + r.conv.index.toFixed(2) + '× conversion' : '') + '.<br>' +
        '<span style="color:var(--muted);font-size:12.5px;">' + escHtml(r.cov.name
          ? 'Best you have is ' + r.cov.name + ' — ' + answerWhy(r.cov.name, r.cov.tag, r.p) + '.'
          : 'Nothing in this sideboard interacts with them at all.') + '</span><br>';
      if (!best.length) html += '<span style="color:var(--muted);font-size:12.5px;">No card in the Diana pool would add meaningful coverage.</span>';
      best.forEach(x => {
        const t = dominantTag(techTags(x.n), r.p, (cardInfo(x.n) || {}).cost);
        html += '<span class="pkg-chip" title="' + attr(answerWhy(x.n, t, r.p)) + '">' + cardImg(x.n) +
          '<span data-card="' + attr(x.n) + '">' + escHtml(x.n) + '</span>' +
          '<span style="color:var(--lock);font-size:11px;">+' + pct(x.gain) + '</span>' +
          '<button class="mini" style="margin-left:4px" onclick="addToSideboard(\'' + x.n.replace(/'/g, "\\'") + '\')">+</button></span>';
      });
      html += '</div>';
    });
  } else {
    html += '<div class="summary-box">Every archetype in the field sits at 50% coverage or better with this sideboard.</div>';
  }

  html += '<h2>Sideboard optimizer</h2><p class="sub">Hill-climbs single-card swaps over your ' + SIDEBOARD_SIZE + ' slots, scoring the exact field-weighted timely coverage above — same weights, same threat-importance and answer-economy discounts. Consensus-optimal against the expected field, the same way the Build view\'s optimizer is consensus-optimal for the main 40.</p>' +
    '<button onclick="runSideboardOptimizer()">Optimize sideboard</button><div id="sbOptResults" style="margin-top:10px"></div>';

  // ---- Reverse pass: what the field boards against YOU ----
  // Same engine, arguments swapped: their cards (main + the tech they board in)
  // become the answers, your deck becomes the threats. This is the exposure a
  // sideboard table never shows — whether your threats survive their removal.
  const { list: yourList, source: yourSrc } = activeList();
  const yourN = yourList.reduce((a, c) => a + c.count, 0);
  if (yourN >= 20) {
    const you = profileFromList(yourList);
    const gasYou = gasOf(yourList);
    const exp = rows.filter(r => r.pSb && !r.mirror).map(r => {
      const ansSb = archAnswerList(r.slug, { includeSide: true });
      const eSb = coverageOf(ansSb, you, { deckSize: DECK_SIZE });
      const eMain = coverageOf(archAnswerList(r.slug, { includeSide: false }), you, { deckSize: DECK_SIZE });
      return { ...r, eSb, boardAdds: eSb.coverage - eMain.coverage, shield: shieldAgainst(ansSb, yourList.concat(list)) };
    }).sort((a, b) => b.weight * b.eSb.coverage - a.weight * a.eSb.coverage);
    if (exp.length && you.knownUnits) {
      const wS = exp.reduce((a, r) => a + r.weight, 0) || 1;
      const overallExp = exp.reduce((a, r) => a + r.weight * r.eSb.coverage, 0) / wS;
      html += '<h2>What the field boards against you</h2>';
      html += '<p class="sub">The coverage engine run in reverse: their cards — main <em>plus</em> the sideboard tech they bring in for games 2-3 — as the answers, <strong>' + escHtml(yourSrc) + '</strong> as the threats. ' +
        'This is how exposed your ' + you.units.toFixed(0) + ' units (and ' + (you.spells + you.gear).toFixed(0) + ' spells/gear) are to their removal — the mirror image of the table above, and the thing that actually decides whether your threats stick. Same caveats: breadth from rules text, not a win rate.</p>';
      html += '<div class="summary-box">Weighted across the field, opposing decks hold <em>some</em> answer to <strong style="color:' + pctColor(overallExp) + '">' + pct(overallExp) + '</strong> of your list once they board. Rows are ordered by field weight × exposure — the removal you most have to play around.</div>';
      html += '<div class="panel-wrap"><table class="incl"><thead><tr><th>Archetype</th><th class="num">Field</th><th>Their key answer to your deck</th>' +
        '<th title="Share of your 40, copy by copy, that their post-board deck can interact with.">Exposure</th>' +
        '<th class="num" title="Extra exposure their sideboard adds on top of their maindeck — the cards they specifically bring in against you.">From board</th>' +
        '<th class="num" title="The counterweight: share of their unit-removal copies you hold a foil to. A counter stops the removal spell itself (counts 1); a +N Might trick lifts the target out of a sized answer\'s range (situational, counts ½). Reads your main + sideboard.">Shield</th></tr></thead><tbody>';
      exp.slice(0, 8).forEach(r => {
        const a = FIELD.archetypes[r.slug];
        const ex = r.eSb, c = ex.coverage;
        const ans = ex.name
