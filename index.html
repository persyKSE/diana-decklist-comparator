/* ---------------- Rune split optimizer ----------------
   The rune deck is exactly 12 cards and you channel 2 per turn (3 on turn one
   going second), so "do I have the runes for this card on curve?" is the same
   hypergeometric maths as the draw simulator — computable, not folklore. The
   field's 7/5 split is a data point; this says whether it's actually right
   for the list you're holding. */

function runeColorsOf(name) {
  return ((cardMeta[name] || {}).color || []).filter(c => c && c !== 'Colorless');
}

// P(this card's rune requirement is NOT met by its on-curve turn) for a given
// split. Single-colour needs r of that colour among the first m channelled;
// multi-colour (≥1 of each) is inclusion–exclusion over the demanded colours —
// exact, since P(zero of a colour set) = C(12−Σs, m)/C(12, m).
function runeMissProb(split, card) {
  const m = Math.min(12, 2 * card.turn);
  const cols = Object.keys(card.req);
  if (cols.length === 1) {
    return 1 - hyperAtLeast(card.req[cols[0]], split[cols[0]] || 0, 12, m);
  }
  let p = 0;
  for (let mask = 0; mask < (1 << cols.length); mask++) {
    let bits = 0, excluded = 0;
    for (let i = 0; i < cols.length; i++) if (mask & (1 << i)) { bits++; excluded += split[cols[i]] || 0; }
    p += (bits % 2 ? -1 : 1) * Math.exp(lnC(12 - excluded, m) - lnC(12, m));
  }
  return 1 - Math.max(0, Math.min(1, p));
}

function runeMathHTML() {
  const { list, source } = activeList();
  const perCard = [];
  const colorCopies = {};
  let colorless = 0;
  list.forEach(c => {
    const cols = runeColorsOf(c.name);
    if (!cols.length) { colorless += c.count; return; }
    const req = {};
    cols.forEach(x => req[x] = (req[x] || 0) + 1);
    const cost = (cardMeta[c.name] || {}).cost;
    perCard.push({ name: c.name, copies: c.count, turn: Math.max(1, Math.min(cost == null ? 2 : cost, 8)), req });
    Object.keys(req).forEach(x => colorCopies[x] = (colorCopies[x] || 0) + c.count);
  });
  const colors = Object.keys(colorCopies).sort((a, b) => colorCopies[b] - colorCopies[a]);
  if (!colors.length || colors.length > 4) return '<div id="runeMath"></div>';

  // Every way to split 12 runes across the demanded colours.
  const splits = [];
  (function go(i, left, acc) {
    if (i === colors.length - 1) { splits.push({ ...acc, [colors[i]]: left }); return; }
    for (let k = 0; k <= left; k++) go(i + 1, left - k, { ...acc, [colors[i]]: k });
  })(0, 12, {});
  const evOf = split => perCard.reduce((a, c) => a + c.copies * runeMissProb(split, c), 0);
  const scored = splits.map(s => ({ s, ev: evOf(s) })).sort((a, b) => a.ev - b.ev);
  const best = scored[0];

  // The field's split, for comparison.
  const cons = Object.fromEntries(colors.map(c => [c, 0]));
  consensusExtras(globalDecks).runes.forEach(r => {
    const col = shortName(r.name).replace(' Rune', '');
    if (r.count > 0 && col in cons) cons[col] += r.count;
  });
  const consTotal = Object.values(cons).reduce((a, b) => a + b, 0);
  const consEv = consTotal === 12 ? evOf(cons) : null;
  const splitStr = s => colors.map(c => (s[c] || 0) + ' ' + c).join(' / ');
  const sameAsCons = consEv != null && colors.every(c => (best.s[c] || 0) === cons[c]);

  let html = '<div id="runeMath"><h2>Rune math</h2>';
  html += '<p class="sub">Which 12-rune split actually supports <strong>' + escHtml(source) + '</strong>? You channel 2 runes per turn from a 12-rune deck, so "do I have the colours for this card on curve?" is exact hypergeometric probability — the same engine as the draw odds above, pointed at the rune deck.</p>';

  html += '<div class="summary-box">Demand: ' + colors.map(c => '<strong>' + colorCopies[c] + '</strong> copies want ' + c).join(', ') +
    (colorless ? ', ' + colorless + ' are colourless' : '') + '. ' +
    (sameAsCons
      ? 'Best split: <strong>' + splitStr(best.s) + '</strong> (' + best.ev.toFixed(2) + ' expected on-curve colour misses per game) — <strong>the field\'s split is already optimal</strong> for this list.'
      : 'Best split: <strong>' + splitStr(best.s) + '</strong> — ' + best.ev.toFixed(2) + ' expected on-curve colour misses per game' +
        (consEv != null ? ', vs <strong>' + consEv.toFixed(2) + '</strong> for the field\'s ' + splitStr(cons) + '.' : '.')) + '</div>';

  // For two colours, the whole trade-off fits in one curve.
  if (colors.length === 2) {
    const [A, B] = colors;
    const pts = [];
    for (let k = 0; k <= 12; k++) pts.push({ k, ev: evOf({ [A]: k, [B]: 12 - k }) });
    const W = 520, H = 150, mL = 36, mB = 30, mT = 10, mR = 12;
    const pw = W - mL - mR, ph = H - mT - mB;
    const evMax = Math.max(...pts.map(p => p.ev), 0.01);
    const x = k => mL + k / 12 * pw, y = v => mT + ph - v / evMax * ph;
    let parts = [];
    [0, evMax / 2, evMax].forEach(v => {
      parts.push('<line class="grid" x1="' + mL + '" y1="' + y(v) + '" x2="' + (W - mR) + '" y2="' + y(v) + '"/>');
      parts.push('<text class="axis" x="' + (mL - 5) + '" y="' + (y(v) + 4) + '" font-size="9" text-anchor="end">' + v.toFixed(1) + '</text>');
    });
    parts.push('<polyline points="' + pts.map(p => x(p.k) + ',' + y(p.ev)).join(' ') + '" fill="none" stroke="var(--accent)" stroke-width="2.5"/>');
    pts.forEach(p => parts.push('<circle class="pt" data-tip="' + attr(p.k + ' ' + A + ' / ' + (12 - p.k) + ' ' + B + ': ' + p.ev.toFixed(2) + ' expected misses') + '" cx="' + x(p.k) + '" cy="' + y(p.ev) + '" r="3.4" fill="' +
      (p.k === best.s[A] ? 'var(--lock)' : consEv != null && p.k === cons[A] ? 'var(--flex)' : 'var(--accent)') + '"/>'));
    for (let k = 0; k <= 12; k += 2) parts.push('<text class="axis" x="' + x(k) + '" y="' + (H - 12) + '" font-size="9" text-anchor="middle">' + k + '</text>');
    parts.push('<text class="axis" x="' + (W / 2) + '" y="' + (H - 1) + '" font-size="9" text-anchor="middle">' + A + ' runes (of 12) — green = optimal' + (consEv != null ? ', amber = field' : '') + '</text>');
    html += '<svg class="viz" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' + parts.join('') + '</svg>';
  }

  // Key colour odds under the recommended split.
  html += '<div class="panel-wrap"><table class="incl"><thead><tr><th>Colour (' + splitStr(best.s) + ')</th>' +
    '<th class="num">≥1 by turn 1</th><th class="num">≥1 by turn 2</th><th class="num">≥2 by turn 2</th><th class="num">≥2 by turn 3</th></tr></thead><tbody>';
  colors.forEach(c => {
    const s = best.s[c] || 0;
    html += '<tr><td>' + escHtml(c) + ' (' + s + ' runes)</td>' +
      [[1, 2], [1, 4], [2, 4], [2, 6]].map(([k, m]) =>
        '<td class="num">' + pct(hyperAtLeast(k, s, 12, m)) + '</td>').join('') + '</tr>';
  });
  html += '</tbody></table></div>';

  html += '<p class="sub">Assumes on-curve play going first (2 runes/turn; going second channels a 3rd on turn one, so these are the pessimistic numbers), one rune of each printed domain per card, and one demanding card per turn. It ignores rune-spending abilities and multi-spell turns — read it as relative evidence between splits, which is exactly the decision it is for.</p></div>';
  return html;
}

/* ---------------- Filtering ---------------- */
function regionOf(event) {
  const e = (event || '').toLowerCase();
  if (/vancouver|hartford|atlanta|dallas|chicago|toronto|montreal|seattle|boston|vegas|houston/.test(e)) return 'NA';
  if (/utrecht|london|paris|berlin|madrid|milan|lyon|amsterdam|lille|bologna/.test(e)) return 'EU';
  if (/sydney|melbourne|auckland|brisbane|perth/.test(e)) return 'OCE';
  if (/changsha|tianjin|xian|shanghai|beijing|chengdu|guangzhou|wuhan|suzhou|s3 regional open/.test(e)) return 'CN';
  return 'Other';
}

function computeFullClusters() {
  const N = allDecks.length;
  allDecks.forEach(d => { d._region = regionOf(d.event); });
  if (N < 2) { allDecks.forEach(d => { d._cluster = 0; d._clusterName = 'All'; }); clusterOptions = []; return; }
  const dist = distanceMatrix(allDecks);
  const groups = cutClusters(buildDendrogram(dist));
  const biggest = groups.reduce((a, b) => b.length > a.length ? b : a, groups[0]);
  clusterOptions = [];
  groups.forEach((g, gi) => {
    const name = clusterSignature(g, gi, g === biggest);
    g.forEach(i => { allDecks[i]._cluster = gi; allDecks[i]._clusterName = name; });
    clusterOptions.push({ gi, name, n: g.length });
  });
}

// Name a cluster by the card most over-represented inside it vs. outside.
function clusterSignature(group, gi, isBiggest) {
  const inSet = new Set(group);
  const cardNames = [...new Set(allDecks.flatMap(d => d.cards.map(c => c.name)))];
  let best = null, bestLift = 0.34;
  cardNames.forEach(name => {
    let inN = 0, outN = 0;
    allDecks.forEach((d, i) => {
      const has = d.cards.some(c => c.name === name);
      if (inSet.has(i)) { if (has) inN++; } else if (has) outN++;
    });
    const inFrac = inN / group.length;
    const outFrac = (allDecks.length - group.length) ? outN / (allDecks.length - group.length) : 0;
    if (inFrac >= 0.6 && inFrac - outFrac > bestLift) { bestLift = inFrac - outFrac; best = name; }
  });
  if (best) return shortName(best) + ' build';
  return isBiggest ? 'Core build' : 'Variant ' + (gi + 1);
}

function deckPasses(d) {
  if (filters.region.size && !filters.region.has(d._region)) return false;
  if (filters.cluster.size && !filters.cluster.has(d._cluster)) return false;
  if (filters.placement.size && !filters.placement.has(d.placement)) return false;
  if (filters.from && (!d.event_date || d.event_date < filters.from)) return false;
  if (filters.to && (!d.event_date || d.event_date > filters.to)) return false;
  return true;
}

function toggleFilter(key, val) {
  const s = filters[key];
  if (s.has(val)) s.delete(val); else s.add(val);
  applyFilters();
}
function setDateFilter(which, val) { filters[which] = val; applyFilters(); }
function toggleDedupe() { filters.dedupe = !filters.dedupe; applyFilters(); }
function toggleFieldWeight() { filters.fieldWeight = !filters.fieldWeight; applyFilters(); }
function toggleCommunity() { filters.community = !filters.community; applyFilters(); }
function clearFilters() { filters = { region: new Set(), cluster: new Set(), placement: new Set(), from: '', to: '', dedupe: false, fieldWeight: false, community: false }; applyFilters(); }

// A result from a 1900-player event is stronger evidence than the same
// result from a 1100-player one. Scale placement weight by sqrt of field
// size relative to the median (sqrt keeps big events from dominating).
function medianAttendance() {
  const a = allDecks.map(d => d.attendance).filter(Boolean).sort((x, y) => x - y);
  return a.length ? a[Math.floor(a.length / 2)] : 0;
}
function effWeight(d) {
  const base = d.weight || 1;
  if (!filters.fieldWeight) return base;
  const med = medianAttendance();
  if (!med || !d.attendance) return base;
  return base * Math.sqrt(d.attendance / med);
}

// Keep one list per player (best placement) — removes near-duplicate
// double-counting toward the "consensus" when a player brought two lists.
function dedupeByPlayer(decks) {
  const best = {};
  decks.forEach(d => {
    const key = (d.player || d.label).toLowerCase();
    const rank = PLACEMENT_RANK[d.placement] != null ? PLACEMENT_RANK[d.placement] : 9;
    if (!best[key] || rank < best[key].rank) best[key] = { d, rank };
  });
  return decks.filter(d => best[(d.player || d.label).toLowerCase()].d === d);
}

function applyFilters() {
  changelogCache = null;   // field-size weighting feeds the replayed prototypes
  const src = filters.community ? allDecks.concat(communityDecks) : allDecks;
  globalDecks = src.filter(deckPasses);
  if (filters.dedupe) globalDecks = dedupeByPlayer(globalDecks);
  rankedCards = computeStats(globalDecks);
  packagesCache = findPackages(globalDecks.length);
  buildInitialProto();
  if (diffA >= globalDecks.length) diffA = 0;
  if (diffB >= globalDecks.length) diffB = Math.min(1, Math.max(0, globalDecks.length - 1));
  render();
}

function renderFilterBar() {
  const regions = REGION_ORDER.filter(r => allDecks.some(d => d._region === r));
  const placements = [...new Set(allDecks.map(d => d.placement))];
  const dates = [...new Set(allDecks.map(d => d.event_date).filter(Boolean))].sort();
  const chip = (key, val, label) => '<span class="chip' + (filters[key].has(val) ? ' on' : '') + '" onclick="toggleFilter(\'' + key + '\',' + (typeof val === 'number' ? val : "'" + String(val).replace(/'/g, "\\'") + "'") + ')">' + escHtml(label) + '</span>';
  let html = '<div class="filterbar">';
  html += '<div class="fgroup"><span class="flabel">Region</span>' + regions.map(r => chip('region', r, r)).join('') + '</div>';
  if (clusterOptions.length > 1)
    html += '<div class="fgroup"><span class="flabel">Sub-archetype</span>' + clusterOptions.map(c => chip('cluster', c.gi, c.name + ' (' + c.n + ')')).join('') + '</div>';
  html += '<div class="fgroup"><span class="flabel">Placement</span>' + placements.map(p => chip('placement', p, p)).join('') + '</div>';
  if (dates.length > 1) {
    const opt = (sel) => '<option value=""' + (sel === '' ? ' selected' : '') + '>Any</option>' + dates.map(d => '<option value="' + d + '"' + (sel === d ? ' selected' : '') + '>' + d + '</option>').join('');
    html += '<div class="fgroup fdate"><span class="flabel">Dates</span>From <select onchange="setDateFilter(\'from\',this.value)">' + opt(filters.from) + '</select> to <select onchange="setDateFilter(\'to\',this.value)">' + opt(filters.to) + '</select></div>';
  }
  const dupPlayers = allDecks.length - dedupeByPlayer(allDecks).length;
  const haveAttendance = allDecks.some(d => d.attendance);
  html += '<div class="fgroup"><span class="flabel">Sample</span>' +
    '<span class="chip' + (filters.dedupe ? ' on' : '') + '" onclick="toggleDedupe()" title="Keep one list per player (best placement) so a player who brought two near-identical lists doesn\'t double-count toward the consensus">one list per player' +
    (dupPlayers ? ' (−' + dupPlayers + ')' : '') + '</span>' +
    (haveAttendance ? '<span class="chip' + (filters.fieldWeight ? ' on' : '') + '" onclick="toggleFieldWeight()" title="Scale each deck&#39;s weight by the square root of (field size ÷ median field size), so a result from a 1900-player event counts for more than the same result from a 1100-player one">weight by field size</span>' : '') +
    (communityDecks.length ? '<span class="chip' + (filters.community ? ' on' : '') + '" onclick="toggleCommunity()" title="Include decks visitors submitted from the builder. They carry no tournament result, so treat the consensus math with them on as community opinion, not results evidence">community decks (' + communityDecks.length + ')</span>' : '') +
    '</div>';
  const anyOn = filters.region.size || filters.cluster.size || filters.placement.size || filters.from || filters.to || filters.dedupe || filters.fieldWeight || filters.community;
  const poolN = allDecks.length + (filters.community ? communityDecks.length : 0);
  const small = globalDecks.length < 20
    ? '<span style="color:var(--flex)"> · small sample — inclusion %s are noisy; see the ± intervals in Analyze</span>' : '';
  const upd = (window.META && META.generated)
    ? '<span class="fbar-updated"> · data updated ' + escHtml(relativeTime(META.generated)) + '</span>' : '';
  html += '<div class="fbar-foot"><span>Showing <strong>' + globalDecks.length + '</strong> of ' + poolN + ' decks' + small + upd + '</span>' +
    (anyOn ? '<button onclick="clearFilters()">Reset filters</button>' : '') + '</div>';
  html += '</div>';
  return html;
}

/* ---------------- What changed ----------------
   The scraper reruns weekly, but a diff of raw JSON tells you nothing. What a
   deckbuilder wants is: since the last event, what moved in the consensus? So
   replay the prototype build over each event date and diff consecutive states.
   Deliberately reads allDecks, not globalDecks — history shouldn't move when
   you tick a filter. */

let changelogCache = null;

function buildChangelog() {
  if (changelogCache) return changelogCache;
  const dated = allDecks.filter(d => d.event_date);
  const dates = [...new Set(dated.map(d => d.event_date))].sort();
  const entries = [];
  dates.forEach(date => {
    const upto = dated.filter(d => d.event_date <= date);
    const before = dated.filter(d => d.event_date < date);
    const arrived = dated.filter(d => d.event_date === date);
    const protoAfter = computeProto(upto, computeStats(upto)).map(c => ({ name: c.name, count: c.copies }));
    const protoBefore = before.length ? computeProto(before, computeStats(before)).map(c => ({ name: c.name, count: c.copies })) : [];
    const diff = before.length ? diffSection(protoBefore, protoAfter) : { removed: [], added: [] };

    const eventNames = [...new Set(arrived.map(d => d.event).filter(Boolean))];
    const ev = (window.META && META.events || []).find(e => eventNames.includes(e.name));
    const clusters = {};
    arrived.forEach(d => { clusters[d._clusterName || 'Unclassified'] = (clusters[d._clusterName || 'Unclassified'] || 0) + 1; });

    entries.push({
      date, arrived, eventNames, diff, ev, clusters,
      first: !before.length,
      swaps: diff.removed.reduce((a, c) => a + c.n, 0),
      decksTotal: upto.length,
    });
  });
  changelogCache = entries.reverse();   // newest first
  return changelogCache;
}

// One-line "here's what moved" for the Build view banner.
function changelogHeadline() {
  const entries = buildChangelog();
  const latest = entries.find(e => !e.first);
  if (!latest) return null;
  const bits = [];
  latest.diff.added.slice(0, 2).forEach(c => bits.push('+' + c.n + ' ' + shortName(c.name)));
  latest.diff.removed.slice(0, 2).forEach(c => bits.push('−' + c.n + ' ' + shortName(c.name)));
  const what = bits.length ? bits.join(', ') : 'the consensus list held firm';
  return { date: latest.date, event: latest.eventNames[0] || latest.date, what, n: latest.arrived.length };
}

function renderChangelog() {
  const entries = buildChangelog();
  if (!entries.length) return '<div class="summary-box">No event dates on the current decks — nothing to replay.</div>';
  let html = '<h2>What changed</h2>';
  html += '<p class="sub">The consensus prototype rebuilt after each event, diffed against the one before it. This is how the deck has actually moved as results came in — not a diff of the raw data. Reads every deck, so the filters above don\'t apply.</p>';
  html += '<div class="timeline">';
  entries.forEach(e => {
    const evName = e.eventNames.join(', ') || e.date;
    let body = '';
    if (e.first) {
      body += '<div class="tl-note">First event in the database — the consensus starts here.</div>';
    } else if (!e.diff.added.length && !e.diff.removed.length) {
      body += '<div class="tl-note">No change to the consensus 40. The new lists agreed with everything already known.</div>';
    } else {
      body += '<div class="tl-note"><strong>' + e.swaps + ' card' + (e.swaps === 1 ? '' : 's') + '</strong> changed in the consensus 40.</div>';
      e.diff.removed.forEach(c => body += '<div class="diff-line diff-del" data-card="' + attr(c.name) + '" data-cardopen="' + attr(c.name) + '">' + cardImg(c.name) + '<span>&minus;' + c.n + ' ' + escHtml(c.name) + '</span></div>');
      e.diff.added.forEach(c => body += '<div class="diff-line diff-add" data-card="' + attr(c.name) + '" data-cardopen="' + attr(c.name) + '">' + cardImg(c.name) + '<span>+' + c.n + ' ' + escHtml(c.name) + '</span></div>');
    }

    const facts = [];
    facts.push(e.arrived.length + ' Diana list' + (e.arrived.length === 1 ? '' : 's') + ' added (' +
      e.arrived.map(d => d.placement).filter(Boolean).join(', ') + ') · ' + e.decksTotal + ' total');
    const clusterBits = Object.entries(e.clusters).map(([n, c]) => c + '× ' + n);
    if (clusterBits.length) facts.push(clusterBits.join(', '));
    if (e.ev) {
      const total = Object.values(e.ev.counts || {}).reduce((a, b) => a + b, 0);
      const dn = (e.ev.counts || {})[META.diana] || 0;
      if (total) facts.push('Diana was ' + dn + '/' + total + ' (' + Math.round(100 * dn / total) + '%) of the top cut');
      if (e.ev.dianaDay1 && e.ev.day1) {
        const dc = 100 * e.ev.dianaDay2 / e.ev.dianaDay1, fc = 100 * e.ev.day2 / e.ev.day1;
        facts.push('converted ' + dc.toFixed(1) + '% into Day 2 vs field ' + fc.toFixed(1) + '% (' + (dc / fc).toFixed(2) + '×)');
      }
      if (e.ev.attendance) facts.push(e.ev.attendance.toLocaleString() + ' players');
    }

    html += '<div class="tl-item"><div class="tl-dot"></div>' +
      '<div class="tl-body"><div class="tl-head"><strong>' + escHtml(evName) + '</strong><span class="tl-date">' + e.date + '</span></div>' +
      '<div class="tl-facts">' + escHtml(facts.join(' · ')) + '</div>' + body + '</div></div>';
  });
  html += '</div>';
  return html;
}

/* ---------------- The wider field (field.js) ---------------- */
function fieldReady() { return !!(window.FIELD && FIELD.archetypes); }

// Field decks are stored compactly ({name: count}); reshape one into the same
// shape decks.js uses so the deck modal and diff code can render it unchanged.
function fieldDeck(slug, j) {
  const d = FIELD.archetypes[slug].decks[j];
  const conv = o => Object.entries(o || {}).map(([name, count]) => ({ name, count })).sort((a, b) => a.name.localeCompare(b.name));
  return {
    label: d.label, player: d.player, placement: d.placement, event: d.event, event_date: d.date, url: d.url,
    cards: conv(d.main), sideboard: conv(d.side), runes: conv(d.runes),
    battlefields: (d.battlefields || []).map(name => ({ name, count: 1 })),
  };
}

function archConversion(slug) {
  const P = window.META && META.performance;
  const a = FIELD.archetypes[slug];
  if (!P || !P.fieldConversion || !a.legend) return null;
  const row = P.archetypes.find(x => x.slug === a.legend);
  if (!row) return null;
  return { ...row, index: row.conversion / P.fieldConversion, fieldConversion: P.fieldConversion };
}

// Weighted consensus over an archetype's own lists (no placement weights exist
// for the scraped field, so every list counts once).
function archStats(slug) {
  const decks = FIELD.archetypes[slug].decks.map(d => ({
    cards: Object.entries(d.main).map(([name, count]) => ({ name, count })), weight: 1,
  }));
  return { decks, ranked: computeStats(decks) };
}

// How an archetype's board actually looks — the inputs the coverage heuristic
// needs to say what a tech card is answering. Per-deck averages.
function archProfile(slug) {
  const decks = FIELD.archetypes[slug].decks;
  const n = decks.length || 1;
  let units = 0, spells = 0, gear = 0, costSum = 0, costN = 0;
  const mightCounts = {};    // might -> unit copies (summed over their lists)
  const bucket = {};         // "type|might" -> copies, the things you must answer
  decks.forEach(d => Object.entries(d.main).forEach(([name, c]) => {
    const m = FIELD.cards[name] || {};
    if (m.type === 'Unit') { units += c; if (m.might != null) mightCounts[m.might] = (mightCounts[m.might] || 0) + c; }
    else if (m.type === 'Spell') spells += c;
    else if (m.type === 'Gear') gear += c;
    if (m.cost != null) { costSum += m.cost * c; costN += c; }
    const key = (m.type || 'Other') + '|' + (m.might == null ? '' : m.might);
    bucket[key] = (bucket[key] || 0) + c;
  }));
  const knownUnits = Object.values(mightCounts).reduce((a, b) => a + b, 0);
  const threats = Object.entries(bucket).map(([k, copies]) => {
    const [type, might] = k.split('|');
    return { type, might: might === '' ? null : +might, copies: copies / n };
  });
  return {
    n: decks.length, units: units / n, spells: spells / n, gear: gear / n,
    avgCost: costN ? costSum / costN : 0, mightCounts, knownUnits, threats,
    mainCopies: threats.reduce((a, t) => a + t.copies, 0),
    // Fraction of their unit copies that a "deals/kills up to M might" answer hits.
    unitFracAtMost(M) {
      if (!knownUnits) return 0;
      let hit = 0;
      Object.entries(mightCounts).forEach(([might, c]) => { if (+might <= M) hit += c; });
      return hit / knownUnits;
    },
  };
}

/* ---------------- Tech coverage ----------------
   No match data exists, so nothing here can tell you a card "wins" a matchup.
   What the data CAN support: a card's rules text says what it answers, and the
   opposing lists say what there is to answer. Cross the two and you get
   coverage — an explicit, inspectable heuristic, not a win rate. */

function techTags(name) {
  const info = cardInfo(name);
  return (info && info.techTags) || [];
}

// How well does one card answer one thing the opponent plays? 1 = a clean
// answer, 0 = no interaction. Partial answers (bounce, stun, a combat trick
// that can never kill) are discounted rather than counted or ignored.
function handleQuality(tags, threat) {
  let q = 0;
  const at = (v) => { if (v > q) q = v; };
  tags.forEach(t => {
    const size = t.size;
    if (threat.type === 'Unit') {
      const m = threat.might;
      switch (t.tag) {
        case 'kill':       at(1); break;
        case 'damage':     if (size != null && m != null && m <= size) at(1); break;
        case 'killSmall':  if (size != null && m != null && m <= size) at(1); break;
        case 'shrink':     if (size != null && m != null && m <= size) at(1); break;
        case 'sweep':      at(size != null && m != null && m <= size ? 1 : 0.6); break;   // sizeless sweeps are mass bounce
        case 'bounce':     at(0.6); break;
        case 'stun':       at(0.35); break;
        case 'shrinkSoft': at(0.25); break;
      }
    } else if (threat.type === 'Gear') {
      if (t.tag === 'gearHate') at(1);
      else if (t.tag === 'sweep' && size == null) at(0.6);   // Downwell bounces gear too
    } else if (threat.type === 'Spell') {
      if (t.tag === 'counter') at(1);
    }
  });
  return q;
}

// Coverage of one archetype: the share of their main deck, copy by copy, that
// you hold an answer to. No free calibration constants — every number is
// "how many of their 40 cards can this list interact with".
function coverageOf(list, p) {
  const answers = list.map(c => ({ name: c.name, count: c.count, tags: techTags(c.name) }));
  let covered = 0;
  p.threats.forEach(t => {
    let q = 0;
    answers.forEach(a => { const x = handleQuality(a.tags, t); if (x > q) q = x; });
    covered += t.copies * q;
  });
  const total = p.mainCopies || 1;

  // Which single card pulls the most weight, and how many relevant copies you hold.
  // `solo` stays in card-copies until the winner is picked — comparing a raw
  // copy count against an already-normalised fraction silently elects the last
  // card in the list.
  let best = { name: null, solo: 0, tag: null }, depth = 0;
  answers.forEach(a => {
    let solo = 0;
    p.threats.forEach(t => solo += t.copies * handleQuality(a.tags, t));
    if (solo > 0) depth += a.count;
    if (solo > best.solo) best = { name: a.name, solo, tag: dominantTag(a.tags, p) };
  });
  return { coverage: covered / total, ...best, solo: best.solo / total, depth };
}

// The tag that explains most of a card's contribution — for the "why" string.
function dominantTag(tags, p) {
  let best = null, bestVal = -1;
  tags.forEach(t => {
    let v = 0;
    p.threats.forEach(th => v += th.copies * handleQuality([t], th));
    if (v > bestVal) { bestVal = v; best = t; }
  });
  return best;
}

// Marginal coverage a card would add to this list — what a suggestion is worth.
function marginalGain(name, list, p, baseline) {
  return coverageOf(list.concat([{ name, count: 1 }]), p).coverage - baseline;
}

function answerWhy(name, tag, p) {
  if (!tag) return 'no interaction in its rules text';
  const size = tag.size;
  const n = x => Math.round(x);
  switch (tag.tag) {
    case 'counter':    return 'counters spells — they run ' + n(p.spells) + ' in their 40';
    case 'kill':       return 'unconditional removal — answers any of their ' + n(p.units) + ' units';
    case 'damage':     return 'deals ' + size + ', killing ' + pct(p.unitFracAtMost(size)) + ' of their unit copies';
    case 'killSmall':  return 'answers ' + size + ' might or less — ' + pct(p.unitFracAtMost(size)) + ' of their units';
    case 'shrink':     return '−' + size + ' might kills ' + pct(p.unitFracAtMost(size)) + ' of their units';
    case 'sweep':      return 'sweeper — they run ' + n(p.units) + ' units in their 40';
    case 'gearHate':   return 'gear removal — they run ' + n(p.gear) + ' gear in their 40';
    case 'bounce':     return 'bounce — tempo, not a permanent answer';
    case 'shrinkSoft': return 'combat trick — blunts, never kills';
    case 'handAttack': return 'hand attack — strips one card';
    case 'stun':       return 'stun — buys a turn';
    default:           return '';
  }
}

/* ---- Field model: which field are you prepping for? ----
   You don't play against the historical average — you play against next
   week's field, maybe in one region. The model reweights every field deck by
   recency (exponential decay) and/or region, and everything downstream
   (threat, coverage, mirror prep) reads it. */

let _fieldLatest = null;
function fieldLatestDate() {
  if (_fieldLatest == null) {
    let max = 0;
    Object.values(FIELD.archetypes).forEach(a => a.decks.forEach(d => {
      if (d.date) max = Math.max(max, new Date(d.date).getTime());
    }));
    _fieldLatest = max || Date.now();
  }
  return _fieldLatest;
}

function fieldDeckWeight(d) {
  if (fieldModel.region && regionOf(d.event) !== fieldModel.region) return 0;
  if (!fieldModel.recency) return 1;
  // Undated lists can't prove they're recent; treat them as very old.
  const age = d.date ? Math.max(0, (fieldLatestDate() - new Date(d.date).getTime()) / 86400000) : 120;
  return Math.pow(0.5, age / FIELD_HALF_LIFE_DAYS);
}

function setFieldRecency(on) { fieldModel.recency = on; saveFieldModel(); render(); }
function setFieldRegion(r) { fieldModel.region = fieldModel.region === r ? null : r; saveFieldModel(); render(); }
function saveFieldModel() { try { localStorage.setItem('ddl-fieldmodel', JSON.stringify(fieldModel)); } catch (e) {} }

function fieldModelLabel() {
  const bits = [];
  if (fieldModel.recency) bits.push('recent form (half-life ' + FIELD_HALF_LIFE_DAYS + ' days)');
  if (fieldModel.region) bits.push(fieldModel.region + ' events only');
  return bits.join(', ');
}

// Threat weight: how much of the expected field it is, scaled by how well it
// converts. A rare deck that wins is worth teching against; a popular deck
// that folds on Day 1 is not. Shares are of the WHOLE field (mirror included)
// under the active field model.
function threatWeights(opts) {
  const includeMirror = opts && opts.includeMirror;
  const slugs = Object.keys(FIELD.archetypes);
  const wOf = {};
  let totalW = 0, rawN = 0, effN = 0;
  slugs.forEach(slug => {
    const w = FIELD.archetypes[slug].decks.reduce((a, d) => a + fieldDeckWeight(d), 0);
    wOf[slug] = w; totalW += w;
    rawN += FIELD.archetypes[slug].decks.length; effN += w;
  });
  const rows = slugs
    .filter(s => includeMirror || s !== FIELD.diana)
    .map(slug => {
      const conv = archConversion(slug);
      const share = totalW ? wOf[slug] / totalW : 0;
      return {
        slug, n: FIELD.archetypes[slug].decks.length, effN: wOf[slug], share, conv,
        weight: share * (conv ? conv.index : 1), mirror: slug === FIELD.diana,
      };
    })
    .filter(r => r.effN > 0)
    .sort((a, b) => b.weight - a.weight);
  return { rows, rawN, effN, modelOn: !!(fieldModel.recency || fieldModel.region) };
}

function currentSideboard() {
  const parsed = parseDeckText(sideText);
  const list = Object.entries(parsed.counts).map(([name, count]) => ({ name, count }));
  if (list.length) return { list, source: 'your sideboard', mine: true };
  const ex = consensusExtras(globalDecks);
  return { list: ex.side.map(c => ({ name: c.name, count: c.copies })), source: 'the consensus sideboard', mine: false };
}

function sideChanged() {
  sideText = document.getElementById('sideInput').value;
  try { localStorage.setItem('ddl-side', sideText); } catch (e) {}
  clearTimeout(sideTimer);
  sideTimer = setTimeout(() => { const o = document.getElementById('coverOut'); if (o) o.innerHTML = coverageHTML(); }, 350);
}
function addToSideboard(name) {
  // With an empty box we are scoring the consensus sideboard, so "add" has to
  // mean "add to that" — otherwise the first click silently swaps 8 cards for 1
  // and coverage falls.
  const { list } = currentSideboard();
  const counts = {};
  list.forEach(c => counts[c.name] = c.count);
  counts[name] = (counts[name] || 0) + 1;
  sideText = Object.entries(counts).map(([n, c]) => c + ' ' + n).join('\n');
  try { localStorage.setItem('ddl-side', sideText); } catch (e) {}
  const ta = document.getElementById('sideInput'); if (ta) ta.value = sideText;
  const o = document.getElementById('coverOut'); if (o) o.innerHTML = coverageHTML();
  toast('Added ' + name + ' to your sideboard');
}

function coverageHTML() {
  const { list, source, mine } = currentSideboard();
  const tw = threatWeights({ includeMirror: true });
  if (!list.length) return '<div class="summary-box">No sideboard to score.</div>';

  const rows = tw.rows.map(w => {
    const p = archProfile(w.slug);
    return { ...w, p, cov: coverageOf(list, p) };
  });
  const wSum = rows.reduce((a, r) => a + r.weight, 0) || 1;
  const overall = rows.reduce((a, r) => a + r.weight * r.cov.coverage, 0) / wSum;
  const gaps = [...rows].filter(r => r.cov.coverage < 0.5).slice(0, 5);

  const sideNames = new Set(list.map(c => c.name));
  const pool = Object.keys((window.CARDS) || {}).filter(n => !sideNames.has(n) && techTags(n).length);
  const nCards = list.reduce((a, c) => a + c.count, 0);
  const haveLog = loadMatches().length > 0;

  let html = '<div class="summary-box"><strong>' + (mine ? 'Your' : 'The consensus') + ' ' + nCards + '-card sideboard holds <em>some</em> answer to ' +
    pct(overall) + ' of what the field plays.</strong> ' +
    'For a card drawn at random from an opponent\'s main deck, that is the chance your rules text addresses it — averaged across archetypes weighted by ' +
    'how much of the top-cut field each one is <em>and</em> how well it converts into Day 2, so a rare deck that wins counts for more than a popular deck that folds. ' +
    (tw.modelOn ? '<strong>Field model: ' + escHtml(fieldModelLabel()) + '</strong> — effective sample ' + tw.effN.toFixed(1) + ' of ' + tw.rawN + ' lists. ' : '') +
    'The mirror is in the table too: other Diana players are part of your expected field.<br><br>' +
    '<strong>This is breadth, not sufficiency.</strong> It asks whether you hold <em>any</em> answer to each of their cards — never whether you hold <em>enough</em> of them, ' +
    'drew one in time, or could afford to cast it. A single counterspell "covers" all ' + Math.round(rows[0].p.spells) + ' spells ' + escHtml(FIELD.archetypes[rows[0].slug].name) +
    ' runs. Read the <em>Answers</em> column for how many relevant cards you actually have, ' +
    'and the Consistency section on the Build view for whether you will see them. It is not, and cannot be, a win rate: no per-match data is published for these events.</div>';

  html += '<div class="panel-wrap"><table class="incl"><thead><tr><th>Archetype</th><th class="num">Field</th><th class="num">Conv.</th>' +
    '<th>Their 40</th><th>Your best answer</th><th>Breadth</th><th class="num">Answers</th>' +
    (haveLog ? '<th class="num" title="Your logged record vs this archetype (Log view)">You</th>' : '') + '</tr></thead><tbody>';
  rows.slice(0, 13).forEach(r => {
    const a = FIELD.archetypes[r.slug];
    const board = r.p.units.toFixed(1) + ' units / ' + r.p.spells.toFixed(1) + ' spells / ' + r.p.gear.toFixed(1) + ' gear · avg cost ' + r.p.avgCost.toFixed(2);
    const ans = r.cov.name
      ? cardImg(r.cov.name, 'tiny') + '<span data-card="' + attr(r.cov.name) + '">' + escHtml(shortName(r.cov.name)) + '</span>' +
        '<span class="ci">' + escHtml(answerWhy(r.cov.name, r.cov.tag, r.p)) + '</span>'
      : '<span style="color:var(--danger)">nothing</span>';
    const c = r.cov.coverage;
    const rec = haveLog ? matchRecord(r.slug) : null;
    html += '<tr' + (r.mirror ? ' style="font-weight:600"' : '') + '><td><span class="deck-link" onclick="openArch(\'' + r.slug + '\')">' +
      escHtml(r.mirror ? 'Diana — the mirror ★' : a.name) + '</span></td>' +
      '<td class="num">' + pct(r.share) + '</td>' +
      '<td class="num" style="color:' + (r.conv && r.conv.index >= 1 ? 'var(--lock)' : 'var(--muted)') + '">' + (r.conv ? r.conv.index.toFixed(2) + '×' : '—') + '</td>' +
      '<td style="color:var(--muted);font-size:12px;">' + escHtml(board) + '</td>' +
      '<td>' + ans + '</td>' +
      '<td title="' + attr((c * r.p.mainCopies).toFixed(0) + ' of their ' + r.p.mainCopies.toFixed(0) + ' main-deck cards, quality-weighted') + '">' +
      '<span class="incl-bar" style="width:' + Math.round(90 * c) + 'px;background:' + pctColor(c) + '"></span>' + pct(c) + '</td>' +
      '<td class="num" title="' + attr('Cards in this sideboard that interact with them at all. Breadth says you hold an answer; this says how many.') + '" ' +
      'style="color:' + (r.cov.depth >= 3 ? 'var(--muted)' : 'var(--flex)') + '">' + r.cov.depth + '</td>' +
      (haveLog ? '<td class="num" style="color:' + (rec.n ? (rec.w / rec.n >= 0.5 ? 'var(--lock)' : 'var(--danger)') : 'var(--muted)') + '">' +
        (rec.n ? rec.w + '–' + rec.l : '—') + '</td>' : '') + '</tr>';
  });
  html += '</tbody></table></div>';

  if (gaps.length) {
    html += '<h2>Coverage gaps</h2><p class="sub">The decks you are least equipped for, worst-weighted first. Each suggestion shows the coverage it would <em>add</em> against that archetype, and comes only from cards some winning Diana list has already played, main or side — nothing invented.</p>';
    gaps.forEach(r => {
      const a = FIELD.archetypes[r.slug];
      const best = pool.map(n => ({ n, gain: marginalGain(n, list, r.p, r.cov.coverage) }))
        .filter(x => x.gain > 0.02).sort((x, y) => y.gain - x.gain).slice(0, 3);
      html += '<div class="pkg-box"><strong>' + escHtml(a.name) + '</strong> — answers to ' + pct(r.cov.coverage) + ' of their 40 (' +
        r.cov.depth + ' relevant card' + (r.cov.depth === 1 ? '' : 's') + '), ' +
        pct(r.share) + ' of the field' + (r.conv ? ' at ' + r.conv.index.toFixed(2) + '× conversion' : '') + '.<br>' +
        '<span style="color:var(--muted);font-size:12.5px;">' + escHtml(r.cov.name
          ? 'Best you have is ' + r.cov.name + ' — ' + answerWhy(r.cov.name, r.cov.tag, r.p) + '.'
          : 'Nothing in this sideboard interacts with them at all.') + '</span><br>';
      if (!best.length) html += '<span style="color:var(--muted);font-size:12.5px;">No card in the Diana pool would add meaningful coverage.</span>';
      best.forEach(x => {
        const t = dominantTag(techTags(x.n), r.p);
        html += '<span class="pkg-chip" title="' + attr(answerWhy(x.n, t, r.p)) + '">' + cardImg(x.n) +
          '<span data-card="' + attr(x.n) + '">' + escHtml(x.n) + '</span>' +
          '<span style="color:var(--lock);font-size:11px;">+' + pct(x.gain) + '</span>' +
          '<button class="mini" style="margin-left:4px" onclick="addToSideboard(\'' + x.n.replace(/'/g, "\\'") + '\')">+</button></span>';
      });
      html += '</div>';
    });
  } else {
    html += '<div class="summary-box">Every archetype in the field sits at 50% coverage or better with this sideboard.</div>';
  }

  html += '<details class="howto"><summary>How coverage is computed</summary>' +
    '<p>Each card\'s printed rules text is matched against a small set of patterns — counter a spell, unconditional kill, deal <em>N</em>, ' +
    'kill/return up to <em>N</em> Might, −<em>N</em> Might (a floor of "to a minimum of 1 Might" means it can never kill, so it scores as a combat trick), ' +
    'sweeper, bounce, gear removal, stun. Where a size is printed it is extracted, because size is what decides whether an answer lines up.</p>' +
    '<p>Then, for every card copy in the opposing archetype\'s averaged main deck, we ask whether anything in your sideboard handles <em>that specific card</em>: ' +
    'a unit of 4 Might needs something that deals 4, kills outright, or shrinks it by 4; a Gear needs gear removal; a Spell needs a counter. ' +
    'Clean answers count 1, bounce 0.6, stun 0.35, a non-lethal combat trick 0.25. Coverage is the quality-weighted share of their 40 cards you can touch.</p>' +
    '<p>There are no tuning constants beyond those four discounts: the denominator is literally their decklist. The headline number is the per-archetype breadths ' +
    'averaged with weights of field share × Day 1→Day 2 conversion index.</p>' +
    '<p><strong>The metric saturates by design.</strong> Because it asks "do you hold <em>any</em> answer to this card", one counterspell covers every spell they run and one ' +
    'six-damage spell covers nearly every unit. A sideboard with one of each type will score very high on breadth while being far too thin to actually play — which is why the ' +
    '<em>Answers</em> column reports how many relevant cards you hold, and why it is worth reading the two together. Breadth is good at finding holes; it is bad at telling you that you have none.</p>' +
    '<p><strong>What this is not:</strong> a win rate. It cannot see sequencing, board state, tempo, or whether you drew the card. It answers one narrow, checkable ' +
    'question — do you own a card whose text addresses what they play? — and nothing else. Per-match results are not published for any of these events.</p></details>';
  return html;
}

/* ---------------- Shared context ---------------- */
function computeContext() {
  const N = globalDecks.length;
  if (N < 2) return { N, distances: [], avgDistances: [] };
  const distances = distanceMatrix(globalDecks);
  const avgDistances = distances.map(row => row.reduce((a, b) => a + b, 0) / (N - 1));
  return { N, distances, avgDistances };
}

/* ---------------- BUILD ---------------- */
/* ---------------- Deck builder ----------------
   A hands-on, Summoner's-Base-style builder. It edits the SAME "your deck"
   list every analysis on this page already reads (coachText = main, sideText =
   sideboard), so building live-drives the consistency odds, rune math, coverage
   and coach feedback below. */
let builderPoolCache = null;
let builderRunes = null;     // {Chaos:7, Mind:5, …}, persisted 'ddl-runes'
let builderBf = null;        // chosen battlefield names, persisted 'ddl-bf'
let builderPreview = null;   // card name shown large in the left pane
let builderSearch = { name: '', text: '', type: '', color: '', emin: '', emax: '', mmin: '', mmax: '', sort: 'cost', page: 0 };
const BUILDER_PAGE = 18;   // keep the DOM light: 18 card images, not 296
// Coarse pointer = no right-click, no shift-click, no hover: builder taps
// open an action sheet instead. `let` so tests can force it on.
let IS_TOUCH = !!(window.matchMedia && matchMedia('(pointer: coarse)').matches);
const DOMAINS = ['Fury', 'Calm', 'Mind', 'Body', 'Chaos', 'Order'];

function saveRunes() { try { localStorage.setItem('ddl-runes', JSON.stringify(builderRunes)); } catch (e) {} }
function saveBf() { try { localStorage.setItem('ddl-bf', JSON.stringify(builderBf)); } catch (e) {} }

// Runes/battlefields aren't part of coachText, so seed them from the consensus
// the first time (or if a saved value is unusable).
function ensureBuilderDefaults() {
  const ex = consensusExtras(globalDecks);
  if (!builderRunes || Object.values(builderRunes).reduce((a, b) => a + b, 0) !== 12) {
    builderRunes = {};
    ex.runes.forEach(r => { const d = shortName(r.name).replace(' Rune', ''); if (r.count > 0) builderRunes[d] = r.count; });
    if (!Object.keys(builderRunes).length) builderRunes = { Chaos: 7, Mind: 5 };
  }
  if (!Array.isArray(builderBf)) builderBf = ex.bfs.slice(0, 3).map(b => b.name);
  else builderBf = builderBf.filter(x => typeof x === 'string').slice(0, 3);
}

function builderPool() {
  if (builderPoolCache) return builderPoolCache;
  const names = new Set([...Object.keys(window.CARDS || {}), ...(window.FIELD ? Object.keys(FIELD.cards) : [])]);
  const out = [];
  names.forEach(name => {
    const info = cardInfo(name) || {};
    if (!['Unit', 'Spell', 'Gear'].includes(info.type)) return;   // runes/battlefields have their own zones
    out.push({ name, cost: info.cost, type: info.type, color: info.color || [], might: info.might, effect: info.effect || '', img: imageMap[name] || null });
  });
  builderPoolCache = out;
  return out;
}

function bMain() { return parseDeckText(coachText).counts; }
function bSide() { return parseDeckText(sideText).counts; }
function bTotal(counts) { return Object.values(counts).reduce((a, b) => a + b, 0); }
function writeMain(counts) { coachText = normalizeCoach(counts); saveCoach(); }
function writeSide(counts) { sideText = Object.entries(counts).map(([n, c]) => c + ' ' + n).join('\n'); try { localStorage.setItem('ddl-side', sideText); } catch (e) {} }

function bAdd(name, sec) {
  const counts = sec === 'side' ? bSide() : bMain();
  if ((counts[name] || 0) >= 3) { toast(shortName(name) + ' is already at 3 copies'); return; }
  if (sec !== 'side' && bTotal(bMain()) >= 40) { toast('Main deck is full (40)'); return; }
  if (sec === 'side' && bTotal(bSide()) >= 8) { toast('Sideboard is full (8)'); return; }
  counts[name] = (counts[name] || 0) + 1;
  sec === 'side' ? writeSide(counts) : writeMain(counts);
  refreshBuilder();
}

function bAddPackage(name) {
  const pkg = packageOf(name);
  if (!pkg) return;
  const counts = bMain();
  let added = 0;
  pkg.cards.forEach(c => {
    if ((counts[c] || 0) < 3 && bTotal(counts) < 40) {
      counts[c] = (counts[c] || 0) + 1;
      added++;
    }
  });
  if (added > 0) {
    writeMain(counts);
    toast('Added ' + added + ' package cards to main deck');
    refreshBuilder();
  } else {
    toast('Package already fully included or main deck full');
  }
}
function bRemove(name, sec) {
  const counts = sec === 'side' ? bSide() : bMain();
  if (!counts[name]) return;
  if (--counts[name] <= 0) delete counts[name];
  sec === 'side' ? writeSide(counts) : writeMain(counts);
  refreshBuilder();
}

// Monte-Carlo goldfish over the built deck. Models Riftbound's real economy:
// runes ARE the energy — you channel 2 per turn from the 12-rune deck and they
// ready each turn, so on turn T (on the play) you have min(12, 2T) energy, of
// which each colored pip must be paid by a rune of that domain. Standardised on
// the play (no turn-1 draw bonus) to match the Rune-math panel's baseline.
const RUNES_PER_TURN = 2;
function shuffleInPlace(a) { for (let j = a.length - 1; j > 0; j--) { const k = Math.floor(Math.random() * (j + 1)); [a[j], a[k]] = [a[k], a[j]]; } return a; }

function simulateGoldfish(iterations = 10000) {
  const main = Object.entries(bMain()).flatMap(([n, c]) => Array(c).fill(n));
  if (main.length !== 40) return { error: 'Main deck must be 40 cards' };
  const rDeck = Object.entries(builderRunes).flatMap(([n, c]) => Array(c).fill(n));   // domain names, e.g. "Chaos"
  if (rDeck.length !== 12) return { error: 'Must have exactly 12 runes' };
  const doms = n => ((cardInfo(n) || {}).color || []).filter(c => c && c !== 'Colorless');

  let totalT4Might = 0, colorMissHands = 0, totalUnspent = 0;

  for (let i = 0; i < iterations; i++) {
    const m = shuffleInPlace([...main]);
    const r = shuffleInPlace([...rDeck]);

    // Mulligan (Riftbound: set aside up to 2, draw replacements, then recycle
    // the set-aside to the bottom — no reshuffle). Heuristic: bottom the two
    // priciest cards when the opener can't curve out (fewer than 2 cards ≤2).
    let hand = m.slice(0, 7), deckIdx = 7;
    const cheap = hand.filter(n => ((cardInfo(n) || {}).cost ?? 99) <= 2).length;
    if (cheap < 2) {
      const aside = hand.map((n, idx) => [idx, (cardInfo(n) || {}).cost ?? 0])
        .filter(([, c]) => c >= 4).sort((a, b) => b[1] - a[1]).slice(0, 2).map(([idx]) => idx);
      if (aside.length) {
        const set = new Set(aside);
        const bottomed = hand.filter((_, idx) => set.has(idx));
        hand = hand.filter((_, idx) => !set.has(idx));
        for (let k = 0; k < bottomed.length; k++) hand.push(m[deckIdx++]);
        m.push(...bottomed);   // recycle to the bottom, no reshuffle
      }
    }

    let boardMight = 0, colorMissThisHand = false, t4Unspent = 0;
    const channeled = {};   // domain -> total runes channeled so far (they ready every turn)
    let runeIdx = 0;

    for (let turn = 1; turn <= 4; turn++) {
      hand.push(m[deckIdx++]);                                   // draw step: 1 main card
      for (let c = 0; c < RUNES_PER_TURN && runeIdx < r.length; c++) channeled[r[runeIdx]] = (channeled[r[runeIdx++]] || 0) + 1;
      const avail = { ...channeled };                            // readied pool for this turn
      let energy = Object.values(avail).reduce((a, b) => a + b, 0);

      let played = true;
      const colorOKFor = hi => { const need = {}; doms(hand[hi]).forEach(d => need[d] = (need[d] || 0) + 1); return Object.keys(need).every(d => (avail[d] || 0) >= need[d]); };
      while (played) {
        played = false;
        let bestIdx = -1, bestMight = -1;
        for (let hi = 0; hi < hand.length; hi++) {
          const info = cardInfo(hand[hi]);
          if (!info || info.type !== 'Unit' || (info.cost || 0) > energy || !colorOKFor(hi)) continue;
          if ((info.might || 0) > bestMight) { bestMight = info.might || 0; bestIdx = hi; }
        }
        if (bestIdx === -1) break;
        // Pay the colour pips from their domains, the rest from any rune.
        const info = cardInfo(hand[bestIdx]);
        let toPay = info.cost || 0;
        doms(hand[bestIdx]).forEach(d => { if (avail[d] > 0) { avail[d]--; toPay--; } });
        for (const d of Object.keys(avail)) { while (toPay > 0 && avail[d] > 0) { avail[d]--; toPay--; } }
        energy -= info.cost || 0;
        boardMight += info.might || 0;
        hand.splice(bestIdx, 1);
        played = true;
      }
      // A colour miss is when energy is still left AND the only units you could
      // otherwise afford are stranded on colour — i.e. colour cost you tempo,
      // not just "you spent your last rune of a domain".
      if (energy > 0) {
        for (let hi = 0; hi < hand.length; hi++) {
          const info = cardInfo(hand[hi]);
          if (info && info.type === 'Unit' && (info.cost || 0) <= energy && !colorOKFor(hi)) { colorMissThisHand = true; break; }
        }
      }
      if (turn === 4) t4Unspent = energy;
    }
    totalT4Might += boardMight;
    if (colorMissThisHand) colorMissHands++;
    totalUnspent += t4Unspent;
  }
  return {
    avgMight: (totalT4Might / iterations).toFixed(2),
    colorMiss: (colorMissHands / iterations * 100).toFixed(1) + '%',
    unspent: (totalUnspent / iterations).toFixed(2)
  };
}

function bSimulate() {
  const res = document.getElementById('bSimResults');
  if (!res) return;
  res.innerHTML = 'Simulating...';
  setTimeout(() => {
    const data = simulateGoldfish();
    if (data.error) { res.innerHTML = '<span style="color:var(--danger)">' + data.error + '</span>'; return; }
    res.innerHTML = `
      <div style="display:flex; justify-content:space-between"><span>Avg T4 Might:</span><span style="color:var(--text); font-weight:bold">${data.avgMight}</span></div>
      <div style="display:flex; justify-content:space-between"><span>Color Miss Rate:</span><span style="color:var(--text); font-weight:bold">${data.colorMiss}</span></div>
      <div style="display:flex; justify-content:space-between"><span>T4 Unspent Energy:</span><span style="color:var(--text); font-weight:bold">${data.unspent}</span></div>
    `;
  }, 10);
}
function bMove(name, from) {
  const src = from === 'side' ? bSide() : bMain();
  const dst = from === 'side' ? bMain() : bSide();
  if (!src[name]) return;
  if (from === 'side' && bTotal(bMain()) >= 40) { toast('Main deck is full (40)'); return; }
  if (from === 'main' && bTotal(bSide()) >= 8) { toast('Sideboard is full (8)'); return; }
  if (--src[name] <= 0) delete src[name];
  dst[name] = (dst[name] || 0) + 1;
  if (from === 'side') { writeSide(src); writeMain(dst); } else { writeMain(src); writeSide(dst); }
  refreshBuilder();
}
function bRuneXfer(into) {   // pull 1 from the other domain into `into`
  const other = Object.keys(builderRunes).find(k => k !== into && builderRunes[k] > 0);
  if (!other) return;
  builderRunes[other]--; builderRunes[into] = (builderRunes[into] || 0) + 1;
  saveRunes(); refreshBuilder();
}
function bRuneOut(from) {    // push 1 from `from` into the other domain
  const other = Object.keys(builderRunes).find(k => k !== from);
  if (!other || (builderRunes[from] || 0) <= 0) return;
  builderRunes[from]--; builderRunes[other]++;
  saveRunes(); refreshBuilder();
}
function bToggleBf(name) {
  const i = builderBf.indexOf(name);
  if (i >= 0) builderBf.splice(i, 1);
  else if (builderBf.length >= 3) { toast('Pick at most 3 battlefields'); return; }
  else builderBf.push(name);
  saveBf(); refreshBuilder();
}
function bLoadConsensus() {
  const sel = document.getElementById('bConsensusSelect');
  const variantIndex = sel ? parseInt(sel.value, 10) : 0;
  const v = consensusVariants[variantIndex] || consensusVariants[0];
  const ex = v.ex;
  writeMain(Object.fromEntries(v.proto.map(c => [c.name, c.copies])));
  writeSide(Object.fromEntries(ex.side.map(c => [c.name, c.copies])));
  builderRunes = {}; ex.runes.forEach(r => { if (r.count > 0) builderRunes[shortName(r.name).replace(' Rune', '')] = r.count; });
  builderBf = ex.bfs.slice(0, 3).map(b => b.name);
  saveRunes(); saveBf();
  toast('Loaded ' + v.label + ' into the builder');
  refreshBuilder();
}
function bClear() {
  if (!coachText.trim() && !sideText.trim()) return;
  coachText = ''; sideText = ''; saveCoach();
  try { localStorage.setItem('ddl-side', ''); } catch (e) {}
  toast('Deck cleared');
  refreshBuilder();
}
function bSetSort(v) { builderSearch.sort = v; renderBuilderResults(); }

/* search */
function builderFiltered() {
  const s = builderSearch, q = x => (x || '').toLowerCase();
  const list = builderPool().filter(c => {
    if (s.name && !q(c.name).includes(q(s.name))) return false;
    if (s.text && !q(c.effect).includes(q(s.text))) return false;
    if (s.type && c.type !== s.type) return false;
    if (s.color && !(c.color || []).includes(s.color)) return false;
    if (s.emin !== '' && (c.cost == null || c.cost < +s.emin)) return false;
    if (s.emax !== '' && (c.cost == null || c.cost > +s.emax)) return false;
    if (s.mmin !== '' && (c.might == null || c.might < +s.mmin)) return false;
    if (s.mmax !== '' && (c.might == null || c.might > +s.mmax)) return false;
    return true;
  });
  const k = s.sort;
  list.sort((a, b) => k === 'name' ? a.name.localeCompare(b.name)
    : k === 'might' ? ((b.might ?? -1) - (a.might ?? -1)) || a.name.localeCompare(b.name)
    : ((a.cost ?? 99) - (b.cost ?? 99)) || a.name.localeCompare(b.name));
  return list;
}
function bReadSearch() {
  const g = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  builderSearch.name = g('bsName'); builderSearch.text = g('bsText');
  builderSearch.type = g('bsType'); builderSearch.color = g('bsColor');
  builderSearch.emin = g('bsEmin'); builderSearch.emax = g('bsEmax');
  builderSearch.mmin = g('bsMmin'); builderSearch.mmax = g('bsMmax');
  builderSearch.page = 0;
  renderBuilderResults();
}
function bResetSearch() { builderSearch = { name: '', text: '', type: '', color: '', emin: '', emax: '', mmin: '', mmax: '', sort: builderSearch.sort, page: 0 }; refreshBuilder(); }
function bPage(delta) {
  const pages = Math.max(1, Math.ceil(builderFiltered().length / BUILDER_PAGE));
  builderSearch.page = Math.max(0, Math.min(pages - 1, builderSearch.page + delta));
  renderBuilderResults();
}

/* HTML */
function bTile(name, count, sec) {
  const img = imageMap[name], cost = (cardMeta[name] || {}).cost;
  return '<div class="bslot' + (count >= 3 ? ' maxed' : '') + '" data-bname="' + attr(name) + '" data-bsec="' + sec + '" ' +
    'title="' + attr(name + ' — click +1, right-click −1, shift-click → ' + (sec === 'side' ? 'main' : 'sideboard')) + '">' +
    (img ? '<img src="' + attr(img) + '" decoding="async" alt="">' : '<div class="bnoimg">' + escHtml(name) + '</div>') +
    (cost != null ? '<span class="bcost">' + cost + '</span>' : '') +
    '<span class="bqty">' + count + '</span></div>';
}
function bSortedEntries(counts) {
  return Object.entries(counts).sort((a, b) => ((cardMeta[a[0]] || {}).cost ?? 99) - ((cardMeta[b[0]] || {}).cost ?? 99) || a[0].localeCompare(b[0]));
}
function bPreviewHTML() {
  const name = builderPreview;
  if (!name || !cardInfo(name)) return '<div class="bprev-img bprev-empty">' +
    (IS_TOUCH ? 'Tap any card for options and details.' : 'Hover any card to preview it here.') + '</div>';
  const info = cardInfo(name), img = imageMap[name];
  let h = img ? '<img class="bprev-img" src="' + attr(img) + '" alt="">' : '<div class="bprev-img bprev-empty">' + escHtml(name) + '</div>';
  h += '<div class="bprev-name">' + escHtml(name) + '</div>';
  h += '<div class="bprev-meta">' + gemsFor(name) + '<span>' + escHtml([info.type, info.rarity].filter(Boolean).join(' · ')) + '</span></div>';
  if (info.effect) h += '<div class="bprev-eff">' + escHtml(info.effect).replace(/:rb_might:/g, '⚔').replace(/:rb_energy:/g, '◆') + '</div>';
  const pkg = packageOf(name);
  if (pkg && pkg.cards.length > 1) {
    h += '<button style="margin-top:8px; width:100%" onclick="bAddPackage(\'' + attr(name).replace(/'/g, "\\'") + '\')" title="Add 1 copy of each card in this package to the main deck">Add full package (' + pkg.cards.length + ' cards)</button>';
  }
  return h;
}
function renderBuilderResults() {
  const wrap = document.getElementById('bResults'); if (!wrap) return;
  const list = builderFiltered();
  const pages = Math.max(1, Math.ceil(list.length / BUILDER_PAGE));
  builderSearch.page = Math.max(0, Math.min(pages - 1, builderSearch.page));
  const main = bMain(), side = bSide();
  const slice = list.slice(builderSearch.page * BUILDER_PAGE, (builderSearch.page + 1) * BUILDER_PAGE);
  let h = slice.map(c => {
    const inDeck = (main[c.name] || 0) + (side[c.name] || 0);
    return '<div class="bresult" data-bname="' + attr(c.name) + '" data-bsec="result" ' +
      'title="' + attr(c.name + ' — click → main, right-click → sideboard') + '">' +
      (c.img ? '<img src="' + attr(c.img) + '" decoding="async" alt="">' : '<div class="bnoimg">' + escHtml(c.name) + '</div>') +
      (inDeck ? '<span class="rin">' + inDeck + '</span>' : '') + '</div>';
  }).join('');
  if (!list.length) h = '<div class="bresult-empty">No cards match those filters.</div>';
  wrap.innerHTML = h;
  const cnt = document.getElementById('bResCount');
  if (cnt) cnt.innerHTML = '<button ' + (builderSearch.page <= 0 ? 'disabled' : '') + ' onclick="bPage(-1)">‹</button>' +
    '<span>' + list.length + ' card' + (list.length === 1 ? '' : 's') + ' · ' + (builderSearch.page + 1) + '/' + pages + '</span>' +
    '<button ' + (builderSearch.page >= pages - 1 ? 'disabled' : '') + ' onclick="bPage(1)">›</button>';
}
function builderSearchHTML() {
  const s = builderSearch;
  const opt = (v, cur, label) => '<option value="' + attr(v) + '"' + (v === cur ? ' selected' : '') + '>' + escHtml(label || v || 'All') + '</option>';
  return '<div class="bsearch">' +
    '<div class="bs-label">Card name</div><input id="bsName" value="' + attr(s.name) + '" placeholder="Search by name…" oninput="bReadSearch()">' +
    '<div class="bs-label">Card text</div><input id="bsText" value="' + attr(s.text) + '" placeholder="Search in rules text…" oninput="bReadSearch()">' +
    '<div class="bs-label">Type</div><select id="bsType" onchange="bReadSearch()">' + ['', 'Unit', 'Spell', 'Gear'].map(t => opt(t, s.type, t || 'All types')).join('') + '</select>' +
    '<div class="bs-label">Domain</div><select id="bsColor" onchange="bReadSearch()">' + ['', ...DOMAINS, 'Colorless'].map(t => opt(t, s.color, t || 'All domains')).join('') + '</select>' +
    '<div class="bs-label">Energy</div><div class="bs-range"><input id="bsEmin" type="number" min="0" max="12" value="' + attr(s.emin) + '" placeholder="min" oninput="bReadSearch()"><span>to</span><input id="bsEmax" type="number" min="0" max="12" value="' + attr(s.emax) + '" placeholder="max" oninput="bReadSearch()"></div>' +
    '<div class="bs-label">Might</div><div class="bs-range"><input id="bsMmin" type="number" min="0" max="12" value="' + attr(s.mmin) + '" placeholder="min" oninput="bReadSearch()"><span>to</span><input id="bsMmax" type="number" min="0" max="12" value="' + attr(s.mmax) + '" placeholder="max" oninput="bReadSearch()"></div>' +
    '<div class="bs-actions"><button class="bs-reset" onclick="bResetSearch()">Reset</button></div>' +
    '<div class="bs-count" id="bResCount"></div>' +
    '<div class="bresults" id="bResults"></div>' +
    '<p class="bhint">' + (IS_TOUCH
      ? 'Tap a card for options. Use ‹ › to page.'
      : 'Click a card to add it to the main deck; right-click to send it to the sideboard. Use ‹ › to page.') + '</p>' +
    '</div>';
}
function builderHTML(N) {
  ensureBuilderDefaults();
  const main = bMain(), side = bSide();
  const mainTotal = bTotal(main), sideTotal = bTotal(side);
  const valid = mainTotal === 40 && sideTotal <= 8;
  const runeTotal = Object.values(builderRunes).reduce((a, b) => a + b, 0);
  const price = priceTag(Object.entries(main).map(([name, count]) => ({ name, count })));

  // LEFT — preview + deck management
  const optHTML = consensusVariants.map((v, i) => `<option value="${i}">${escHtml(v.label)}</option>`).join('');
  let left = '<div class="bpane left bcol"><div class="bprev" id="bPreview">' + bPreviewHTML() + '</div>' +
    '<div class="bmanage">' +
    '<div style="display:flex; gap:4px; margin-bottom:4px;">' +
    '<select id="bConsensusSelect" style="flex:1" title="Select which consensus sub-archetype to load">' + optHTML + '</select>' +
    '<button onclick="bLoadConsensus()" title="Fill the builder with the selected consensus 40, runes, battlefields and sideboard">Load</button>' +
    '</div>' +
    '<button onclick="copyDecklist()" title="Copy the full registrable deck">Copy deck</button>' +
    '<button onclick="exportMyDeckImage()" title="Save a shareable PNG">Export PNG</button>' +
    '<button onclick="shareDeckLink()" title="Copy a URL with your list encoded">Share link</button>' +
    '<button onclick="bImport()" title="Paste a decklist to import">Import list</button>' +
    '<button onclick="submitToMeta()" title="Share this 40-card deck to the public community pool (anonymous). Community decks show up for everyone via the filter bar chip">Share to community</button>' +
    '<button class="ghost" onclick="bHelp()">Shortcuts</button>' +
    '<button class="ghost" onclick="bClear()" title="Empty the main deck and sideboard">Clear</button>' +
    '</div>' +
    '<div class="bsim-panel" style="margin-top:10px; padding:10px; background:var(--panel2); border-radius:8px; border:1px solid var(--border)">' +
    '<div style="font-weight:bold; margin-bottom:6px; color:var(--gold)">Goldfish Simulator (T4)</div>' +
    '<button onclick="bSimulate()" style="width:100%">Run 10,000 Hands</button>' +
    '<div id="bSimResults" style="margin-top:8px; font-size:12px; color:var(--muted)"></div>' +
    '<div style="margin-top:6px; font-size:10.5px; color:var(--muted); line-height:1.4">Units only, on the play (2 runes/turn). A rough curve-out proxy — the Consistency and Rune-math sections below give the exact odds.</div>' +
    '</div></div>';

  // CENTER — the deck itself
  let center = '<div class="bpane center">';
  center += '<div class="bhead"><span class="btitle">Main Deck</span> <span class="bcount">' + mainTotal + '/40</span>' +
    '<span class="bvalid ' + (valid ? 'ok' : 'bad') + '">' + (valid ? '✓ Valid' : mainTotal + '/40') + '</span>' +
    (price ? '<span class="card-meta">' + price + '</span>' : '') +
    '<span class="bctl"><select onchange="bSetSort(this.value)" title="Sort the search results"><option value="cost"' + (builderSearch.sort === 'cost' ? ' selected' : '') + '>Sort: energy</option><option value="name"' + (builderSearch.sort === 'name' ? ' selected' : '') + '>Sort: name</option><option value="might"' + (builderSearch.sort === 'might' ? ' selected' : '') + '>Sort: might</option></select>' +
    '<button class="ghost" onclick="bHelp()">?</button></span></div>';
  center += mainTotal
    ? '<div class="bgrid">' + bSortedEntries(main).map(([n, c]) => bTile(n, c, 'main')).join('') + '</div>'
    : '<div class="bempty-note">Your main deck is empty. Use the card search to add cards, or <span class="deck-link" onclick="bLoadConsensus()">load a consensus build</span> to start from the field average.</div>';

  // zones: legend / runes+battlefields
  center += '<div class="bzones">';
  center += '<div class="bzone"><div class="bzone-h">Legend</div><div class="blegend"><div class="bnoimg" style="height:175px;display:flex;align-items:center;justify-content:center;text-align:center;border-radius:6px;box-shadow:var(--shadow)">Diana, Scorn of the Moon</div></div></div>';
  center += '<div class="bzone"><div class="bzone-h">Runes <span class="z-count">' + runeTotal + '/12</span></div><div class="brunes">';
  const rd = Object.keys(builderRunes);
  rd.forEach((d, i) => {
    const rn = d + ' Rune', img = imageMap[rn];
    center += '<div class="brune" data-rune="' + attr(d) + '" title="' + attr(d + ' — click +1 (from the other), right-click −1') + '">' +
      (img ? '<img src="' + attr(img) + '" alt="">' : '<div class="bnoimg" style="height:100px">' + escHtml(d) + '</div>') +
      '<span class="rq">' + builderRunes[d] + '</span></div>';
    if (i < rd.length - 1) center += '<span class="brune-sep">/</span>';
  });
  center += '</div>';
  const ex = consensusExtras(globalDecks);
  const bfOpts = [...new Set([...builderBf, ...ex.bfs.map(b => b.name)])];
  center += '<div class="bzone-h" style="margin-top:12px">Battlefields <span class="z-count">' + builderBf.length + '/3</span></div><div class="bbf">';
  bfOpts.slice(0, 6).forEach(name => {
    const on = builderBf.includes(name), img = imageMap[name];
    center += '<div class="bslot' + (on ? '' : ' off') + '" data-bf="' + attr(name) + '" title="' + attr(name + (on ? ' — click to remove' : ' — click to add')) + '">' +
      (img ? '<img src="' + attr(img) + '" decoding="async" alt="">' : '<div class="bnoimg">' + escHtml(name) + '</div>') + '</div>';
  });
  center += '</div></div></div>';   // close .bbf, the rune .bzone, and .bzones

  // sideboard
  center += '<div class="bzone-h" style="margin-top:16px">Side Deck <span class="z-count">' + sideTotal + '/8</span></div>';
  center += sideTotal
    ? '<div class="bgrid">' + bSortedEntries(side).map(([n, c]) => bTile(n, c, 'side')).join('') + '</div>'
    : '<div class="bempty-note">' + (IS_TOUCH
        ? 'No sideboard cards. Tap a search result and choose "+1 Sideboard".'
        : 'No sideboard cards. Right-click a search result to add one, or shift-click a main-deck card to move it here.') + '</div>';
  center += '</div>';

  // RIGHT — search
  const right = '<div class="bpane right bcol">' + builderSearchHTML() + '</div>';
  return '<div class="builder">' + left + center + right + '</div>';
}

function bImportApply() {
  const t = document.getElementById('bImportText');
  if (t) {
    let raw = t.value;
    if (/(^|\n)(MainDeck|Legend|Champion|Runes|Battlefields|Sideboard):/i.test(raw)) {
      let mainLines = [], sideLines = [];
      let newRunes = {}, newBf = [];
      let currentSection = 'maindeck';
      raw.split(/\r?\n/).forEach(line => {
        let trimmed = line.trim();
        if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('//')) return;
        let m = trimmed.match(/^(MainDeck|Legend|Champion|Runes|Battlefields|Sideboard):/i);
        if (m) { currentSection = m[1].toLowerCase(); return; }
        
        let count = 1, name = trimmed, cm;
        if ((cm = trimmed.match(/^(\d{1,2})\s*[xX]?\s+(.+)$/))) { count = parseInt(cm[1], 10); name = cm[2]; }
        else if ((cm = trimmed.match(/^(.+?)\s*[xX]\s*(\d{1,2})$/))) { name = cm[1]; count = parseInt(cm[2], 10); }
        name = name.trim();
        let canon = nameLookup[normName(name)] || name;
        
        if (currentSection === 'maindeck' || currentSection === 'champion') {
          mainLines.push(count + ' ' + canon);
        } else if (currentSection === 'sideboard') {
          sideLines.push(count + ' ' + canon);
        } else if (currentSection === 'runes') {
          let domain = canon.replace(/Rune/i, '').trim();
          if (count > 0) newRunes[domain] = count;
        } else if (currentSection === 'battlefields') {
          newBf.push(canon);
        }
      });
      coachText = mainLines.join('\n'); saveCoach();
      sideText = sideLines.join('\n'); try { localStorage.setItem('ddl-side', sideText); } catch (e) {}
      if (Object.keys(newRunes).length > 0) { builderRunes = newRunes; saveRunes(); }
      if (newBf.length > 0) { builderBf = newBf.slice(0, 3); saveBf(); }
      
      const { counts, unknown } = parseDeckText(coachText);
      const total = Object.values(counts).reduce((a, b) => a + b, 0);
      toast('Imported: ' + total + ' main, ' + sideLines.length + ' side, ' + Object.keys(newRunes).length + ' runes, ' + newBf.length + ' fields' +
        (unknown.length ? ' (' + unknown.length + ' unknown main)' : ''));
    } else {
      coachText = raw; saveCoach();
      const { counts, unknown } = parseDeckText(coachText);
      const total = Object.values(counts).reduce((a, b) => a + b, 0);
      toast('Imported ' + total + ' card' + (total === 1 ? '' : 's') +
        (unknown.length ? ' — ' + unknown.length + ' unrecognized name' + (unknown.length === 1 ? '' : 's') + ' kept as written' : ''));
    }
  }
  closeModal(); render();
}

   Phones have no right-click, shift-click or hover, so on coarse pointers a
   tap opens this sheet instead of mutating the deck directly. */
let bSheetState = null;
function openBSheet(kind, name, sec) {
  bSheetState = { kind, name, sec };
  renderBSheet();
  document.getElementById('bSheet').classList.add('show');
}
function closeBSheet() { bSheetState = null; document.getElementById('bSheet').classList.remove('show'); }
function renderBSheet() {
  if (!bSheetState) return;
  const { kind, name, sec } = bSheetState;
  const info = cardInfo(name) || {};
  const img = imageMap[name];
  const inMain = bMain()[name] || 0, inSide = bSide()[name] || 0;
  let sub, actions;
  if (kind === 'rune') {
    const other = Object.keys(builderRunes).find(k => k !== sec) || '';
    sub = 'Split: ' + sec + ' ' + (builderRunes[sec] || 0) + ' / ' + other + ' ' + (builderRunes[other] || 0);
    actions = '<button onclick="bSheetAct(\'runeIn\')">+1 (take from ' + escHtml(other) + ')</button>' +
      '<button onclick="bSheetAct(\'runeOut\')">−1 (give to ' + escHtml(other) + ')</button>' +
      '<button class="ghost wide" onclick="closeBSheet()">Done</button>';
  } else {
    sub = [info.type, info.cost != null ? 'cost ' + info.cost : null].filter(Boolean).join(' · ') +
      ' — main ×' + inMain + ' · side ×' + inSide;
    if (kind === 'result') {
      actions = '<button onclick="bSheetAct(\'addMain\')">+1 Main deck</button>' +
        '<button onclick="bSheetAct(\'addSide\')">+1 Sideboard</button>' +
        '<button class="ghost" onclick="bSheetAct(\'details\')">Card details</button>' +
        '<button class="ghost" onclick="closeBSheet()">Done</button>';
    } else {
      actions = '<button onclick="bSheetAct(\'plus\')">+1 copy</button>' +
        '<button onclick="bSheetAct(\'minus\')">−1 copy</button>' +
        '<button onclick="bSheetAct(\'move\')">Move to ' + (sec === 'side' ? 'main deck' : 'sideboard') + '</button>' +
        '<button class="ghost" onclick="bSheetAct(\'details\')">Card details</button>' +
        '<button class="ghost wide" onclick="closeBSheet()">Done</button>';
    }
  }
  document.querySelector('#bSheet .sheet').innerHTML =
    '<div class="sheet-head">' + (img ? '<img src="' + attr(img) + '" alt="">' : '') +
    '<div><div class="sheet-name">' + escHtml(name) + '</div><div class="sheet-sub">' + escHtml(sub) + '</div></div></div>' +
    '<div class="sheet-actions">' + actions + '</div>';
}
function bSheetAct(act) {
  if (!bSheetState) return;
  const { name, sec } = bSheetState;
  if (act === 'details') { closeBSheet(); openCardModal(name); return; }
  if (act === 'runeIn') bRuneXfer(sec);
  else if (act === 'runeOut') bRuneOut(sec);
  else if (act === 'addMain') bAdd(name, 'main');
  else if (act === 'addSide') bAdd(name, 'side');
  else if (act === 'plus') bAdd(name, sec);
  else if (act === 'minus') bRemove(name, sec);
  else if (act === 'move') { bMove(name, sec); closeBSheet(); return; }
  renderBSheet();   // counts changed — keep the sheet open for repeated taps
}
