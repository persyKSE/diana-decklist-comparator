/* ---------------- ANALYZE ---------------- */
function fieldBadge(name) {
  if (!window.META || !META.otherDecks) return '—';
  const pct = Math.round(100 * (META.cardBase[name] || 0) / META.otherDecks);
  if (pct >= 25) return '<span class="dist-badge" style="color:var(--accent)" title="Played across the wider field — a format staple, not a Diana choice">' + pct + '% · staple</span>';
  if (pct <= 5) return '<span class="dist-badge" style="color:var(--flex)" title="Barely played outside Diana — an archetype-defining choice">' + pct + '% · Diana tech</span>';
  return '<span class="dist-badge">' + pct + '%</span>';
}

function prettyArchetype(slug) {
  return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

function renderAnalyze(ctx) {
  const N = ctx.N;
  let html = renderChangelog();

  // ---- Meta context (whole scraped field, unaffected by filters) ----
  if (window.META && META.otherDecks > 0) {
    const totalAll = META.otherDecks + (META.archetypes[META.diana] || 0);
    html += '<h2>Meta context</h2><p class="sub">The whole scraped top-cut field (' + totalAll + ' decks, all archetypes) — how big a slice Diana is, per event and overall. This section ignores the filters above.</p>';
    const topArch = Object.entries(META.archetypes).sort((a, b) => b[1] - a[1]).slice(0, 10);
    const maxN = topArch[0][1];
    html += '<div class="panel-wrap"><table class="incl"><thead><tr><th>Archetype</th><th>Top-cut decks</th></tr></thead><tbody>';
    topArch.forEach(([arch, n]) => {
      const isDiana = arch === META.diana;
      html += '<tr' + (isDiana ? ' style="font-weight:700"' : '') + '><td>' + escHtml(prettyArchetype(arch)) + (isDiana ? ' ★' : '') + '</td>' +
        '<td><span class="incl-bar" style="width:' + Math.round(140 * n / maxN) + 'px;' + (isDiana ? '' : 'background:var(--muted);opacity:0.55;') + '"></span>' + n + ' (' + Math.round(100 * n / totalAll) + '%)</td></tr>';
    });
    html += '</tbody></table></div>';
    const evRows = META.events.filter(e => Object.values(e.counts).reduce((a, b) => a + b, 0) >= 3);
    if (evRows.length) {
      html += '<div class="panel-wrap" style="margin-top:12px;"><table class="incl"><thead><tr><th>Event</th><th>Date</th><th>Diana share of top cut</th></tr></thead><tbody>';
      evRows.forEach(e => {
        const total = Object.values(e.counts).reduce((a, b) => a + b, 0);
        const dn = e.counts[META.diana] || 0;
        html += '<tr><td>' + escHtml(e.name) + '</td><td>' + (e.date || '—') + '</td>' +
          '<td><span class="incl-bar" style="width:' + Math.round(120 * dn / total) + 'px"></span>' + dn + '/' + total + ' (' + Math.round(100 * dn / total) + '%)</td></tr>';
      });
      html += '</tbody></table></div>';
    }
  }

  // ---- Deck performance: the only published results data ----
  if (window.META && META.performance && META.performance.fieldDay1) {
    const P = META.performance;
    const diana = P.archetypes.find(a => a.slug === P.dianaLegendSlug);
    const fieldPct = 100 * P.fieldConversion;
    html += '<h2>Deck performance (Day 1 → Day 2)</h2>';
    html += '<p class="sub">Events publish no per-player match records, but they do publish how many decks of each archetype started Day 1 and how many survived into Day 2. That <strong>conversion rate</strong> is a real performance measure across <strong>' + P.fieldDay1.toLocaleString() + '</strong> recorded decks — far more data than the ' + allDecks.length + ' top-cut lists everything else here is built on. It is archetype-level, so it cannot rank individual Diana lists.</p>';
    if (diana) {
      const idx = diana.conversion / P.fieldConversion;
      const rank = P.archetypes.indexOf(diana) + 1;
      html += '<div class="summary-box"><strong>Diana converts ' + (100 * diana.conversion).toFixed(1) + '%</strong> of its Day 1 decks into Day 2 (' + diana.day2 + '/' + diana.day1 + '), against a field average of ' + fieldPct.toFixed(1) + '%. ' +
        'That is <strong>' + idx.toFixed(2) + '×</strong> the field — <strong>' + rank + (rank === 1 ? 'st' : rank === 2 ? 'nd' : rank === 3 ? 'rd' : 'th') + ' best</strong> of ' + P.archetypes.length + ' archetypes. The deck is genuinely strong, not just popular.</div>';
    }
    // Diana conversion per event, over time
    const evs = META.events.filter(e => e.dianaDay1 && e.day1);
    if (evs.length >= 2) {
      const W = 660, H = 200, mL = 40, mB = 30, mT = 12, mR = 16;
      const pw = W - mL - mR, ph = H - mT - mB;
      const ymax = Math.max(...evs.map(e => 100 * e.dianaDay2 / e.dianaDay1), fieldPct) * 1.25;
      const x = i => mL + (evs.length === 1 ? pw / 2 : i / (evs.length - 1) * pw);
      const y = v => mT + ph - v / ymax * ph;
      let p = [];
      [0, 10, 20, 30].filter(v => v <= ymax).forEach(v => {
        p.push('<line class="grid" x1="' + mL + '" y1="' + y(v) + '" x2="' + (W - mR) + '" y2="' + y(v) + '"/>');
        p.push('<text class="axis" x="' + (mL - 6) + '" y="' + (y(v) + 4) + '" font-size="10" text-anchor="end">' + v + '%</text>');
      });
      p.push('<polyline points="' + evs.map((e, i) => x(i) + ',' + y(100 * e.day2 / e.day1)).join(' ') + '" fill="none" stroke="var(--muted)" stroke-width="2" stroke-dasharray="4 3"/>');
      const dpts = evs.map((e, i) => ({ x: x(i), y: y(100 * e.dianaDay2 / e.dianaDay1), e }));
      p.push('<polyline points="' + dpts.map(q => q.x + ',' + q.y).join(' ') + '" fill="none" stroke="var(--accent)" stroke-width="3"/>');
      dpts.forEach(q => p.push('<circle class="pt" data-tip="' + attr(q.e.name + ': Diana ' + q.e.dianaDay2 + '/' + q.e.dianaDay1 + ' = ' + (100 * q.e.dianaDay2 / q.e.dianaDay1).toFixed(1) + '% vs field ' + (100 * q.e.day2 / q.e.day1).toFixed(1) + '%' + (q.e.attendance ? ' · ' + q.e.attendance + ' players' : '')) + '" cx="' + q.x + '" cy="' + q.y + '" r="4" fill="var(--accent)"/>'));
      evs.forEach((e, i) => p.push('<text class="axis" x="' + x(i) + '" y="' + (H - 10) + '" font-size="10" text-anchor="middle">' + escHtml(e.name.split(' ')[0]) + '</text>'));
      html += '<svg class="viz" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' + p.join('') + '</svg>';
      html += '<div class="legend"><span class="legend-chip"><span class="legend-swatch" style="background:var(--accent)"></span>Diana conversion</span>' +
        '<span class="legend-chip"><span class="legend-swatch" style="background:var(--muted)"></span>Whole-field average</span></div>';
    }
    // Archetype leaderboard — who you actually have to beat
    const top = P.archetypes.slice(0, 8), bottom = P.archetypes.slice(-3);
    html += '<h2>What you have to beat</h2><p class="sub">Archetypes ranked by conversion rate (min. 20 Day 1 decks). The ones above Diana are the decks that most often survive to Day 2 — target your sideboard at these, not at whatever is merely popular.</p>';
    html += '<div class="panel-wrap"><table class="incl"><thead><tr><th>Archetype</th><th class="num">Day 1</th><th class="num">Day 2</th><th>Conversion</th><th class="num">vs field</th></tr></thead><tbody>';
    const maxConv = P.archetypes[0].conversion;
    [...top, null, ...bottom].forEach(a => {
      if (!a) { html += '<tr><td colspan="5" style="text-align:center;color:var(--muted)">… ' + (P.archetypes.length - top.length - bottom.length) + ' more …</td></tr>'; return; }
      const isD = a.slug === P.dianaLegendSlug;
      const idx = a.conversion / P.fieldConversion;
      html += '<tr' + (isD ? ' style="font-weight:700"' : '') + '><td>' + escHtml(a.legend) + (isD ? ' ★' : '') + '</td>' +
        '<td class="num">' + a.day1 + '</td><td class="num">' + a.day2 + '</td>' +
        '<td><span class="incl-bar" style="width:' + Math.round(120 * a.conversion / maxConv) + 'px;' + (isD ? '' : 'background:var(--muted);opacity:0.55;') + '"></span>' + (100 * a.conversion).toFixed(1) + '%</td>' +
        '<td class="num" style="color:' + (idx >= 1 ? 'var(--lock)' : 'var(--danger)') + '">' + idx.toFixed(2) + '×</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  html += '<h2>Card inclusion across winning decks</h2><p class="sub">Every card seen in the Diana field: how many decks run it, at what counts. The small grey range under each percentage is the <strong>Wilson 95% interval</strong> — on ' + N + ' decks, 12/13 really means "somewhere around 65–99%", so don\'t over-read a single point estimate. The Field column is the card\'s play rate across all other archetypes — high means format staple, low means Diana-specific tech.</p>';
  html += '<div class="panel-wrap"><table class="incl"><thead><tr><th>Card</th><th>Cost/Domain</th><th>Type</th><th>Inclusion</th><th class="num">Avg copies</th><th>Copy counts</th><th>Field</th></tr></thead><tbody>';
  [...rankedCards].sort((a, b) => b.decksIn - a.decksIn || b.score - a.score).forEach(c => {
    const meta = cardMeta[c.name] || {};
    const pct = Math.round(100 * c.decksIn / N);
    const distBadges = Object.entries(c.dist).sort((a, b) => b[0] - a[0]).map(([copies, nD]) => '<span class="dist-badge">x' + copies + ' in ' + nD + (nD > 1 ? ' decks' : ' deck') + '</span>').join('');
    const [lo, hi] = wilson(c.decksIn, N);
    const ciTip = 'Wilson 95% interval on ' + c.decksIn + '/' + N + ': ' + lo.toFixed(0) + '–' + hi.toFixed(0) + '%. With this few decks the point estimate is noisy.';
    html += '<tr data-card="' + attr(c.name) + '" data-cardopen="' + attr(c.name) + '" style="cursor:pointer;"><td>' + cardImg(c.name) + escHtml(c.name) + '</td><td>' + gemsFor(c.name) + '</td><td>' + (meta.type || '—') +
      '</td><td title="' + attr(ciTip) + '"><span class="incl-bar" style="width:' + Math.round(pct * 0.6) + 'px"></span>' + c.decksIn + '/' + N + ' (' + pct + '%)' +
      '<span class="ci">' + lo.toFixed(0) + '–' + hi.toFixed(0) + '%</span></td><td class="num">' + c.avgCopies.toFixed(1) + '</td><td>' + distBadges + '</td><td>' + fieldBadge(c.name) + '</td></tr>';
  });
  html += '</tbody></table></div>';

  // ---- Podium vs rest ----
  {
    const podium = globalDecks.filter(d => ['1st', '2nd'].includes(d.placement));
    const rest = globalDecks.filter(d => !['1st', '2nd'].includes(d.placement));
    if (podium.length >= 3 && rest.length >= 3) {
      const names = [...new Set(globalDecks.flatMap(d => d.cards.map(c => c.name)))];
      const rows = names.map(name => {
        const inPod = podium.filter(d => d.cards.some(c => c.name === name)).length;
        const inRest = rest.filter(d => d.cards.some(c => c.name === name)).length;
        return { name, inPod, inRest, pPod: inPod / podium.length, pRest: inRest / rest.length, delta: inPod / podium.length - inRest / rest.length };
      }).filter(r => r.inPod + r.inRest >= 2 && Math.abs(r.delta) >= 0.2)
        .sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta)).slice(0, 10);
      if (rows.length) {
        html += '<h2>Podium vs rest</h2><p class="sub">No win data is published for these events, but placement <em>within</em> the top cut is a usable signal: cards that finals lists (' + podium.length + ' decks at 1st/2nd) run at different rates than the rest of the top cut (' + rest.length + ' decks). Tiny samples — read as hints, not conclusions.</p>';
        html += '<div class="panel-wrap"><table class="incl"><thead><tr><th>Card</th><th>Finals lists</th><th>Rest of top cut</th><th>Lean</th></tr></thead><tbody>';
        rows.forEach(r => {
          const lean = r.delta > 0
            ? '<span class="dist-badge" style="color:var(--lock)">podium +' + Math.round(r.delta * 100) + '%</span>'
            : '<span class="dist-badge" style="color:var(--danger)">field ' + Math.round(r.delta * 100) + '%</span>';
          html += '<tr data-card="' + attr(r.name) + '" data-cardopen="' + attr(r.name) + '" style="cursor:pointer;"><td>' + cardImg(r.name) + escHtml(r.name) + '</td>' +
            '<td>' + r.inPod + '/' + podium.length + ' (' + Math.round(r.pPod * 100) + '%)</td>' +
            '<td>' + r.inRest + '/' + rest.length + ' (' + Math.round(r.pRest * 100) + '%)</td><td>' + lean + '</td></tr>';
        });
        html += '</tbody></table></div>';
      }
    }
  }

  // ---- Sideboard patterns ----
  const sideDecks = globalDecks.filter(d => d.sideboard && d.sideboard.length);
  if (sideDecks.length) {
    const sideStats = {};
    sideDecks.forEach(d => d.sideboard.forEach(c => {
      if (!sideStats[c.name]) sideStats[c.name] = { decksIn: 0, total: 0 };
      sideStats[c.name].decksIn += 1; sideStats[c.name].total += c.count;
    }));
    const mainNames = new Set(rankedCards.map(c => c.name));
    const rows = Object.entries(sideStats).sort((a, b) => b[1].decksIn - a[1].decksIn).slice(0, 14);
    html += '<h2>Sideboard patterns</h2><p class="sub">What the winning decks board (' + sideDecks.length + ' decks with sideboards). "Swing card" = also main-decked by part of the field — a flex slot living between main and side.</p>';
    html += '<div class="panel-wrap"><table class="incl"><thead><tr><th>Card</th><th>In sideboards</th><th class="num">Avg copies</th><th></th></tr></thead><tbody>';
    rows.forEach(([name, s]) => {
      const swing = mainNames.has(name) ? '<span class="dist-badge" style="color:var(--flex)">swing card</span>' : '';
      html += '<tr data-card="' + attr(name) + '" data-cardopen="' + attr(name) + '" style="cursor:pointer;"><td>' + cardImg(name) + escHtml(name) + '</td>' +
        '<td><span class="incl-bar" style="width:' + Math.round(100 * s.decksIn / sideDecks.length * 0.6) + 'px"></span>' + s.decksIn + '/' + sideDecks.length + '</td>' +
        '<td class="num">' + (s.total / s.decksIn).toFixed(1) + '</td><td>' + swing + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  const { packages, eitherOr } = packagesCache;
  html += '<h2>Card packages</h2><p class="sub">Flex cards that travel together across the winning lists — the real deck-building choice is usually between packages, not single cards.</p>';
  if (!packages.length) html += '<div class="pkg-box">No strong packages detected yet — add more decks (or loosen the filters) to sharpen the signal.</div>';
  packages.forEach(p => {
    html += '<div class="pkg-box">' + p.cards.map(n => '<span class="pkg-chip" data-card="' + attr(n) + '">' + cardImg(n) + escHtml(n) + '</span>').join('') + '<span style="color:var(--muted); margin-left:6px;">together in ' + p.decks + '/' + N + ' decks</span></div>';
  });
  if (eitherOr.length) html += '<div class="pkg-box"><strong>Either/or slots</strong> (both played, never together):<br>' + eitherOr.map(p => escHtml(p.a) + ' (' + p.na + ') vs ' + escHtml(p.b) + ' (' + p.nb + ')').join('<br>') + '</div>';

  // Energy curve
  html += '<h2>Energy curve</h2><p class="sub">Main-deck cards per energy cost. Thin lines are individual decks (hover a point for the value, or a legend entry to isolate); the bold line is the placement-weighted field average.</p>';
  const maxCost = 8;
  const curves = globalDecks.map(d => {
    const h = Array(maxCost + 1).fill(0);
    d.cards.forEach(c => { const cost = cardMeta[c.name] && cardMeta[c.name].cost != null ? Math.min(cardMeta[c.name].cost, maxCost) : null; if (cost !== null) h[cost] += c.count; });
    return h;
  });
  const totalW = globalDecks.reduce((a, d) => a + effWeight(d), 0);
  const avgCurve = Array(maxCost + 1).fill(0);
  globalDecks.forEach((d, i) => curves[i].forEach((v, c) => avgCurve[c] += v * effWeight(d) / totalW));
  const costMax = Math.max(1, ...curves.flat(), ...avgCurve);
  {
    const W = 660, H = 220, mL = 34, mB = 26, mT = 12, mR = 12;
    const pw = W - mL - mR, ph = H - mT - mB;
    const x = c => mL + c / maxCost * pw, y = v => mT + ph - v / costMax * ph;
    let parts = [];
    for (let v = 0; v <= costMax; v += Math.max(1, Math.ceil(costMax / 4))) {
      parts.push('<line class="grid" x1="' + mL + '" y1="' + y(v) + '" x2="' + (W - mR) + '" y2="' + y(v) + '"/>');
      parts.push('<text class="axis" x="' + (mL - 6) + '" y="' + (y(v) + 4) + '" font-size="10" text-anchor="end">' + v + '</text>');
    }
    for (let c = 0; c <= maxCost; c++) parts.push('<text class="axis" x="' + x(c) + '" y="' + (H - 8) + '" font-size="11" text-anchor="middle">' + (c === maxCost ? c + '+' : c) + '</text>');
    curves.forEach((h, i) => {
      parts.push('<polyline class="series" data-series="' + i + '" points="' + h.map((v, c) => x(c) + ',' + y(v)).join(' ') + '" fill="none" stroke="' + PALETTE[i % PALETTE.length] + '" stroke-width="1.5" opacity="0.5"/>');
      h.forEach((v, c) => parts.push('<circle class="series pt" data-series="' + i + '" data-tip="' + attr(globalDecks[i].label + ' — cost ' + (c === maxCost ? c + '+' : c) + ': ' + v + ' cards') + '" cx="' + x(c) + '" cy="' + y(v) + '" r="3" fill="' + PALETTE[i % PALETTE.length] + '" opacity="0.6"/>'));
    });
    // Area fill under the weighted field average, then the line on top.
    const areaPts = avgCurve.map((v, c) => x(c) + ',' + y(v)).join(' ');
    parts.push('<polygon class="avg-area" points="' + x(0) + ',' + y(0) + ' ' + areaPts + ' ' + x(maxCost) + ',' + y(0) + '"/>');
    parts.push('<polyline class="avg" points="' + areaPts + '" fill="none" stroke-width="3"/>');
    html += '<svg id="curveSvg" class="viz" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' + parts.join('') + '</svg>';
    html += '<div class="legend">' + globalDecks.map((d, i) => '<span class="legend-chip" data-deck="' + i + '" data-hl="#curveSvg|' + i + '"><span class="legend-swatch" style="background:' + PALETTE[i % PALETTE.length] + '"></span>#' + (i + 1) + ' ' + escHtml(d.label) + '</span>').join('') + '</div>';
  }

  // ---- Small multiples: one curve per sub-archetype ----
  if (clusterOptions.length > 1 && !filters.cluster.size) {
    html += '<h2>Curves by sub-archetype</h2><p class="sub">The same data split by cluster instead of stacked into one chart — where the builds actually diverge in shape. Each panel is that cluster\'s placement-weighted average, with the whole-field average behind it in grey.</p>';
    html += '<div class="smalls">';
    clusterOptions.forEach(co => {
      const sub = globalDecks.filter(d => d._cluster === co.gi);
      if (!sub.length) return;
      const c2 = targetCurveOf(sub);
      const localMax = Math.max(1, ...c2, ...avgCurve);
      const W2 = 240, H2 = 130, mL2 = 22, mB2 = 18, mT2 = 8, mR2 = 8;
      const pw2 = W2 - mL2 - mR2, ph2 = H2 - mT2 - mB2;
      const x2 = c => mL2 + c / maxCost * pw2, y2 = v => mT2 + ph2 - v / localMax * ph2;
      let p2 = ['<line class="grid" x1="' + mL2 + '" y1="' + y2(0) + '" x2="' + (W2 - mR2) + '" y2="' + y2(0) + '"/>'];
      p2.push('<polyline points="' + avgCurve.map((v, c) => x2(c) + ',' + y2(v)).join(' ') + '" fill="none" stroke="var(--muted)" stroke-width="1.5" opacity="0.45" stroke-dasharray="3 3"/>');
      const pts2 = c2.map((v, c) => x2(c) + ',' + y2(v)).join(' ');
      p2.push('<polygon points="' + x2(0) + ',' + y2(0) + ' ' + pts2 + ' ' + x2(maxCost) + ',' + y2(0) + '" fill="' + PALETTE[co.gi % PALETTE.length] + '" opacity="0.16"/>');
      p2.push('<polyline points="' + pts2 + '" fill="none" stroke="' + PALETTE[co.gi % PALETTE.length] + '" stroke-width="2.5"/>');
      c2.forEach((v, c) => p2.push('<circle class="pt" data-tip="' + attr(co.name + ' — cost ' + (c === maxCost ? c + '+' : c) + ': ' + v.toFixed(1) + ' cards avg') + '" cx="' + x2(c) + '" cy="' + y2(v) + '" r="2.6" fill="' + PALETTE[co.gi % PALETTE.length] + '"/>'));
      for (let c = 0; c <= maxCost; c += 2) p2.push('<text class="axis" x="' + x2(c) + '" y="' + (H2 - 5) + '" font-size="9" text-anchor="middle">' + c + '</text>');
      const avgCost = c2.reduce((a, v, c) => a + v * c, 0) / (c2.reduce((a, v) => a + v, 0) || 1);
      html += '<div class="small-card"><div class="sm-title" style="color:' + PALETTE[co.gi % PALETTE.length] + '">' + escHtml(co.name) + ' · ' + sub.length + ' deck' + (sub.length === 1 ? '' : 's') + '</div>' +
        '<svg class="viz" viewBox="0 0 ' + W2 + ' ' + H2 + '" xmlns="http://www.w3.org/2000/svg">' + p2.join('') + '</svg>' +
        '<div class="sm-foot">avg cost ' + avgCost.toFixed(2) + '</div></div>';
    });
    html += '</div>';
  }
  // Type ratios
  html += '<div class="panel-wrap" style="margin-top:12px;"><table class="incl"><thead><tr><th>Deck</th><th class="num">Units</th><th class="num">Spells</th><th class="num">Gear</th><th class="num">Avg cost</th></tr></thead><tbody>';
  globalDecks.forEach((d, i) => {
    const t = { Unit: 0, Spell: 0, Gear: 0 }; let costSum = 0, costN = 0;
    d.cards.forEach(c => { const m = cardMeta[c.name] || {}; if (t[m.type] !== undefined) t[m.type] += c.count; if (m.cost != null) { costSum += m.cost * c.count; costN += c.count; } });
    html += '<tr><td>' + deckRef(i, d.label) + '</td><td class="num">' + t.Unit + '</td><td class="num">' + t.Spell + '</td><td class="num">' + t.Gear + '</td><td class="num">' + (costN ? (costSum / costN).toFixed(2) : '—') + '</td></tr>';
  });
  html += '</tbody></table></div>';

  // Clustering
  html += '<h2>Sub-archetype clustering</h2><p class="sub">Hierarchical clustering of the swap-distance matrix (average linkage). A late merge marks a genuine split in how the archetype is built. Hover a deck name to isolate its curve above; click it to open its list.</p>';
  if (N < 2) { html += '<div class="summary-box">Need at least two decks in the filter to cluster.</div>'; }
  else {
    const root = buildDendrogram(ctx.distances);
    const groups = cutClusters(root);
    const clusterOf = {};
    groups.forEach((g, gi) => g.forEach(i => clusterOf[i] = gi));
    if (groups.length > 1) {
      html += '<div class="summary-box"><strong>' + groups.length + ' sub-archetypes in this set:</strong> ' +
        groups.map((g, gi) => '<span style="color:' + PALETTE[gi % PALETTE.length] + '">' + g.map(i => deckRef(i, globalDecks[i].label)).join(', ') + '</span>').join(' &nbsp;|&nbsp; ') + '.</div>';
    } else html += '<div class="summary-box">One coherent archetype — no meaningful split in this set.</div>';
    html += renderDendrogramSVG(root, globalDecks.map(d => d.label), clusterOf);
  }

  // Timeline
  html += '<h2>Card inclusion over time</h2><p class="sub">Inclusion rate of the top contested cards by event date. Hover a point to see which decks ran it.</p>';
  {
    const byDate = {};
    globalDecks.forEach((d, i) => { if (d.event_date) (byDate[d.event_date] = byDate[d.event_date] || []).push(i); });
    const dates = Object.keys(byDate).sort();
    if (dates.length < 2) html += '<div class="summary-box">Not enough distinct event dates in this set — the timeline needs at least two.</div>';
    else {
      const topFlex = rankedCards.filter(c => c.decksIn < N).slice(0, 8);
      const t0 = new Date(dates[0]).getTime(), t1 = new Date(dates[dates.length - 1]).getTime();
      const W = 660, H = 240, mL = 40, mB = 30, mT = 12, mR = 16;
      const pw = W - mL - mR, ph = H - mT - mB;
      const x = ds => mL + (t1 === t0 ? pw / 2 : (new Date(ds).getTime() - t0) / (t1 - t0) * pw), y = pct => mT + ph - pct / 100 * ph;
      let parts = [];
      [0, 50, 100].forEach(v => { parts.push('<line class="grid" x1="' + mL + '" y1="' + y(v) + '" x2="' + (W - mR) + '" y2="' + y(v) + '"/>'); parts.push('<text class="axis" x="' + (mL - 6) + '" y="' + (y(v) + 4) + '" font-size="10" text-anchor="end">' + v + '%</text>'); });
      dates.forEach(ds => parts.push('<text class="axis" x="' + x(ds) + '" y="' + (H - 10) + '" font-size="11" text-anchor="middle">' + new Date(ds).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + '</text>'));
      topFlex.forEach((c, ci) => {
        const color = PALETTE[ci % PALETTE.length];
        const pts = dates.map(ds => {
          const idxs = byDate[ds];
          const runners = idxs.filter(i => globalDecks[i].cards.some(x => x.name === c.name));
          const pct = Math.round(100 * runners.length / idxs.length);
          return { x: x(ds), y: y(pct), pct, ds, runners: runners.map(i => globalDecks[i].label) };
        });
        parts.push('<polyline class="series" data-series="' + ci + '" points="' + pts.map(p => p.x + ',' + p.y).join(' ') + '" fill="none" stroke="' + color + '" stroke-width="2" opacity="0.85"/>');
        pts.forEach(p => parts.push('<circle class="series pt" data-series="' + ci + '" data-tip="' + attr(c.name + ' — ' + p.ds + ': ' + p.pct + '% (' + (p.runners.join(', ') || 'none') + ')') + '" cx="' + p.x + '" cy="' + p.y + '" r="3.5" fill="' + color + '"/>'));
      });
      html += '<svg id="timeSvg" class="viz" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' + parts.join('') + '</svg>';
      html += '<div class="legend">' + topFlex.map((c, ci) => '<span class="legend-chip" data-card="' + attr(c.name) + '" data-hl="#timeSvg|' + ci + '"><span class="legend-swatch" style="background:' + PALETTE[ci % PALETTE.length] + '"></span>' + escHtml(c.name) + '</span>').join('') + '</div>';
    }
  }
  return html;
}

/* ---------------- Match log ----------------
   The permanent ceiling on everything else here is that no per-match results
   exist anywhere. So manufacture your own: one tap per game, stored locally,
   exportable. After ~50 games this is the only matchup table for your list in
   existence — data no opponent has. */

function loadMatches() { try { return JSON.parse(localStorage.getItem('ddl-matches') || '[]'); } catch (e) { return []; } }
function writeMatches(m) { try { localStorage.setItem('ddl-matches', JSON.stringify(m)); } catch (e) {} }

function matchRecord(slug) {
  const games = loadMatches().filter(x => x.arch === slug);
  const w = games.filter(x => x.result === 'W').length;
  return { n: games.length, w, l: games.length - w };
}

function logMatch(result) {
  const arch = document.getElementById('logArch').value;
  if (!arch) { toast('Pick the opponent\'s archetype first'); return; }
  const m = loadMatches();
  m.push({
    id: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
    date: new Date().toISOString().slice(0, 10),
    arch, result,
    play: document.getElementById('logPlay').value || null,
    mull: document.getElementById('logMull').value === '' ? null : +document.getElementById('logMull').value,
    deck: document.getElementById('logDeck').value || null,
    notes: (document.getElementById('logNotes').value || '').trim() || null,
  });
  writeMatches(m);
  toast((result === 'W' ? 'Win' : 'Loss') + ' vs ' + (FIELD.archetypes[arch] ? FIELD.archetypes[arch].name : arch) + ' logged');
  render();
}

function logDelete(id) {
  writeMatches(loadMatches().filter(x => x.id !== id));
  render();
}

function exportMatches() {
  const blob = new Blob([JSON.stringify(loadMatches(), null, 1)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'diana-match-log-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  toast('Match log exported');
}

function importMatches(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const incoming = JSON.parse(reader.result);
      if (!Array.isArray(incoming)) throw new Error();
      const have = new Set(loadMatches().map(x => x.id));
      const fresh = incoming.filter(x => x && x.id && x.arch && x.result && !have.has(x.id));
      writeMatches(loadMatches().concat(fresh));
      toast('Imported ' + fresh.length + ' game' + (fresh.length === 1 ? '' : 's') + (incoming.length - fresh.length ? ' (' + (incoming.length - fresh.length) + ' already known)' : ''));
      render();
    } catch (e) { toast('Not a valid match-log file'); }
  };
  reader.readAsText(file);
}

function renderLog() {
  const matches = loadMatches();
  const haveField = fieldReady();
  const archName = slug => (haveField && FIELD.archetypes[slug]) ? FIELD.archetypes[slug].name : slug;

  // Quick-add: one tap per game.
  const archOpts = haveField
    ? threatWeights({ includeMirror: true }).rows.map(r =>
        '<option value="' + attr(r.slug) + '">' + attr(r.mirror ? 'Diana (mirror)' : FIELD.archetypes[r.slug].name) + '</option>').join('')
    : '';
  const saveOpts = Object.keys(loadSaves()).sort().map(n => '<option value="' + attr(n) + '">' + attr(n) + '</option>').join('');
  let html = '<h2>Log a game</h2>';
  html += '<div class="logform">' +
    '<select id="logArch"><option value="">opponent…</option>' + archOpts + '</select>' +
    '<select id="logPlay"><option value="">play/draw?</option><option value="play">on the play</option><option value="draw">on the draw</option></select>' +
    '<select id="logMull"><option value="">mulligan?</option><option value="0">kept 4</option><option value="1">set aside 1</option><option value="2">set aside 2</option></select>' +
    '<select id="logDeck"><option value="">list: current</option>' + saveOpts + '</select>' +
    '<input id="logNotes" placeholder="notes (what decided it?)">' +
    '<button class="winbtn" onclick="logMatch(\'W\')">Won</button>' +
    '<button class="lossbtn" onclick="logMatch(\'L\')">Lost</button></div>';

  if (!matches.length) {
    html += '<div class="summary-box">No games logged yet. Every other number on this site is inferred from decklists because <strong>no event publishes match results</strong> — ' +
      'this page is where you fix that for yourself. Log practice and tournament games with one tap; at ~10 games per matchup the intervals start meaning something, ' +
      'and the Meta view\'s coverage table grows a <strong>You</strong> column showing your record next to each archetype\'s threat.</div>';
    return html;
  }

  // Overall + recent form.
  const w = matches.filter(x => x.result === 'W').length;
  const [lo, hi] = wilson(w, matches.length);
  const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
  const recent = matches.filter(x => x.date >= weekAgo);
  html += '<div class="summary-box"><strong>' + w + '–' + (matches.length - w) + '</strong> overall (' +
    Math.round(100 * w / matches.length) + '%, 95% CI ' + lo.toFixed(0) + '–' + hi.toFixed(0) + '%) across ' + matches.length + ' games · ' +
    recent.length + ' this week.</div>';

  // Per-archetype table, ordered by threat so practice priorities jump out.
  const bySlug = {};
  matches.forEach(x => (bySlug[x.arch] = bySlug[x.arch] || []).push(x));
  const threatRank = {};
  if (haveField) threatWeights({ includeMirror: true }).rows.forEach((r, i) => threatRank[r.slug] = { rank: i + 1, weight: r.weight });
  const rows = Object.entries(bySlug).map(([slug, games]) => {
    const gw = games.filter(x => x.result === 'W').length;
    const onPlay = games.filter(x => x.play === 'play');
    const onDraw = games.filter(x => x.play === 'draw');
    return {
      slug, n: games.length, w: gw, wr: gw / games.length,
      ci: wilson(gw, games.length),
      playStr: onPlay.length ? onPlay.filter(x => x.result === 'W').length + '–' + onPlay.filter(x => x.result === 'L').length : '—',
      drawStr: onDraw.length ? onDraw.filter(x => x.result === 'W').length + '–' + onDraw.filter(x => x.result === 'L').length : '—',
      threat: threatRank[slug] || null,
    };
  }).sort((a, b) => (a.threat && b.threat) ? a.threat.rank - b.threat.rank : b.n - a.n);

  html += '<h2>By matchup</h2><p class="sub">Ordered by the archetype\'s threat rank in the expected field, so the top rows are the matchups that matter most. "Drill this" = losing record against a top-8 threat with 4+ games — the highest-value practice you can schedule.</p>';
  html += '<div class="panel-wrap"><table class="incl"><thead><tr><th>Opponent</th><th class="num">Threat #</th><th class="num">Games</th><th>Record</th>' +
    '<th class="num">On play</th><th class="num">On draw</th><th></th></tr></thead><tbody>';
  rows.forEach(r => {
    const drill = r.threat && r.threat.rank <= 8 && r.n >= 4 && r.wr < 0.5;
    const strong = r.n >= 4 && r.ci[0] > 50;
    html += '<tr><td>' + (haveField && FIELD.archetypes[r.slug]
        ? '<span class="deck-link" onclick="openArch(\'' + r.slug + '\')">' + escHtml(archName(r.slug)) + '</span>' : escHtml(r.slug)) + '</td>' +
      '<td class="num">' + (r.threat ? '#' + r.threat.rank : '—') + '</td>' +
      '<td class="num">' + r.n + '</td>' +
      '<td><span class="incl-bar" style="width:' + Math.round(60 * r.wr) + 'px;background:' + (r.wr >= 0.5 ? 'var(--lock)' : 'var(--danger)') + '"></span>' +
      r.w + '–' + (r.n - r.w) + '<span class="ci">' + r.ci[0].toFixed(0) + '–' + r.ci[1].toFixed(0) + '%</span></td>' +
      '<td class="num">' + r.playStr + '</td><td class="num">' + r.drawStr + '</td>' +
      '<td>' + (drill ? '<span class="dist-badge" style="color:var(--danger)">drill this</span>'
              : strong ? '<span class="dist-badge" style="color:var(--lock)">solid</span>' : '') + '</td></tr>';
  });
  html += '</tbody></table></div>';
  html += '<p class="sub">Intervals are Wilson 95% — at 5 games a 3–2 honestly means "somewhere between 23% and 88%", so log more before believing a number.</p>';

  // Recent games.
  html += '<div class="action-bar"><h2>Games (' + matches.length + ')</h2>' +
    '<span><button class="mini" onclick="exportMatches()">Export</button> ' +
    '<label class="mini theme-btn" style="cursor:pointer;display:inline-block;">Import<input type="file" accept=".json" style="display:none" onchange="importMatches(this)"></label></span></div>';
  [...matches].reverse().slice(0, 30).forEach(x => {
    html += '<div class="card-row"><span class="count-badge" style="min-width:20px;color:' + (x.result === 'W' ? 'var(--lock)' : 'var(--danger)') + '">' + x.result + '</span>' +
      '<span class="card-name">' + escHtml(archName(x.arch)) +
      '<span class="card-meta"> · ' + x.date + (x.play ? ' · ' + x.play : '') + (x.mull != null ? ' · mull ' + x.mull : '') + (x.deck ? ' · ' + escHtml(x.deck) : '') + '</span>' +
      (x.notes ? '<div class="card-meta">' + escHtml(x.notes) + '</div>' : '') + '</span>' +
      '<button class="mini" style="background:var(--danger)" onclick="logDelete(\'' + x.id + '\')">×</button></div>';
  });
  if (matches.length > 30) html += '<p class="sub">Showing the latest 30 — export holds everything.</p>';
  html += '<p class="sub">Stored in this browser (localStorage). Export regularly if you care about it; import merges by game id, so phone and laptop logs combine cleanly.</p>';
  return html;
}

/* ---------------- META ---------------- */
function openArch(slug) {
  metaArch = slug;
  if (currentView !== 'meta') { location.hash = '#meta'; return; }   // hashchange re-renders
  render();
  window.scrollTo(0, 0);
}
function closeArch() { metaArch = null; render(); }

// Share of the top cut in the most recent events vs the earlier ones.
function archTrend(slug) {
  const evs = (window.META && META.events || []).filter(e => Object.values(e.counts || {}).reduce((a, b) => a + b, 0) >= 3);
  if (evs.length < 4) return null;
  const cut = evs.length - 3;
  const share = arr => {
    let n = 0, t = 0;
    arr.forEach(e => { n += (e.counts[slug] || 0); t += Object.values(e.counts).reduce((a, b) => a + b, 0); });
    return t ? n / t : 0;
  };
  const early = share(evs.slice(0, cut)), late = share(evs.slice(cut));
  return { early, late, delta: late - early };
}

// Small standalone curve chart, used by the archetype detail panels.
function curveSVG(curve, color, maxCost) {
  const W = 640, H = 170, mL = 32, mB = 24, mT = 10, mR = 10;
  const pw = W - mL - mR, ph = H - mT - mB;
  const mx = Math.max(1, ...curve);
  const x = c => mL + c / maxCost * pw, y = v => mT + ph - v / mx * ph;
  const parts = [];
  for (let v = 0; v <= mx; v += Math.max(1, Math.ceil(mx / 4))) {
    parts.push('<line class="grid" x1="' + mL + '" y1="' + y(v) + '" x2="' + (W - mR) + '" y2="' + y(v) + '"/>');
    parts.push('<text class="axis" x="' + (mL - 6) + '" y="' + (y(v) + 4) + '" font-size="10" text-anchor="end">' + v + '</text>');
  }
  for (let c = 0; c <= maxCost; c++) parts.push('<text class="axis" x="' + x(c) + '" y="' + (H - 7) + '" font-size="10" text-anchor="middle">' + (c === maxCost ? c + '+' : c) + '</text>');
  const pts = curve.map((v, c) => x(c) + ',' + y(v)).join(' ');
  parts.push('<polygon points="' + x(0) + ',' + y(0) + ' ' + pts + ' ' + x(maxCost) + ',' + y(0) + '" fill="' + color + '" opacity="0.16"/>');
  parts.push('<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="2.5"/>');
  curve.forEach((v, c) => parts.push('<circle class="pt" data-tip="' + attr('Cost ' + (c === maxCost ? c + '+' : c) + ': ' + v.toFixed(1) + ' cards on average') + '" cx="' + x(c) + '" cy="' + y(v) + '" r="3" fill="' + color + '"/>'));
  return '<svg class="viz" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' + parts.join('') + '</svg>';
}

/* ---- Mirror prep ----
   The better the consensus gets, the more other Diana players converge on it —
   which makes the mirror the most predictable matchup in the tournament. Prep
   against the consensus build itself. */
function renderMirrorPrep() {
  if (!FIELD.archetypes[FIELD.diana]) return '';
  const p = archProfile(FIELD.diana);
  const tw = threatWeights({ includeMirror: true });
  const row = tw.rows.find(r => r.mirror);
  const { list, source } = currentSideboard();
  const cov = coverageOf(list, p);

  let html = '<h2>Mirror prep</h2>';
  html += '<p class="sub">Everyone netdecking the same results converges on the same 40 — so the mirror is the matchup you can prepare for with the most certainty. This section runs the coverage engine against the Diana field itself.</p>';

  const rank = row ? tw.rows.indexOf(row) + 1 : null;
  html += '<div class="summary-box">The mirror is <strong>' + (row ? pct(row.share) : '—') + '</strong> of the expected field' +
    (row && row.conv ? ' at <strong>' + row.conv.index.toFixed(2) + '×</strong> conversion' : '') +
    (rank ? ' — threat rank <strong>#' + rank + '</strong> of ' + tw.rows.length : '') +
    '. Their board: ' + p.units.toFixed(1) + ' units / ' + p.spells.toFixed(1) + ' spells / ' + p.gear.toFixed(1) + ' gear per deck. ' +
    'Against it, ' + escHtml(source) + ' holds answers to <strong style="color:' + pctColor(cov.coverage) + '">' + pct(cov.coverage) + '</strong> of the 40' +
    (cov.name ? ' — best is <strong>' + escHtml(cov.name) + '</strong> (' + escHtml(answerWhy(cov.name, cov.tag, p)) + ')' : '') + '.</div>';

  // What removal size actually lines up in the mirror.
  const sizes = [2, 3, 4, 5, 6].map(s => ({ s, f: p.unitFracAtMost(s) }));
  const enough = sizes.find(x => x.f >= 0.8);
  html += '<p class="sub">Removal sizing: ' + sizes.map(x => '≤' + x.s + ' hits ' + pct(x.f)).join(' · ') +
    (enough ? ' — <strong>deal ' + enough.s + '</strong> is the cheapest size that answers 80%+ of mirror units.' : '.') + '</p>';

  // Best mirror tech from the Diana pool, by marginal breadth added.
  const sideNames = new Set(list.map(c => c.name));
  const pool = Object.keys(window.CARDS || {}).filter(n => !sideNames.has(n) && techTags(n).length);
  const sugg = pool.map(n => ({ n, gain: marginalGain(n, list, p, cov.coverage) }))
    .filter(x => x.gain > 0.02).sort((a, b) => b.gain - a.gain).slice(0, 5);
  if (sugg.length) {
    html += '<div class="pkg-box"><strong>Best mirror tech you are not holding</strong> (marginal breadth added, from cards winning Diana lists already play):<br>';
    sugg.forEach(x => {
      const t = dominantTag(techTags(x.n), p);
      html += '<span class="pkg-chip" title="' + attr(answerWhy(x.n, t, p)) + '">' + cardImg(x.n) +
        '<span data-card="' + attr(x.n) + '">' + escHtml(x.n) + '</span>' +
        '<span style="color:var(--lock);font-size:11px;">+' + pct(x.gain) + '</span>' +
        '<button class="mini" style="margin-left:4px" onclick="addToSideboard(\'' + x.n.replace(/'/g, "\\'") + '\')">+</button></span>';
    });
    html += '</div>';
  } else {
    html += '<div class="summary-box">Nothing in the Diana pool would add meaningful breadth against the mirror beyond what this sideboard already holds.</div>';
  }
  html += '<p class="sub"><span class="deck-link" onclick="openArch(\'' + FIELD.diana + '\')">Open the full Diana field page →</span></p>';
  return html;
}

function renderArchDetail(slug) {
  const a = FIELD.archetypes[slug];

  const conv = archConversion(slug);

  let html = '<div class="crumb"><span class="deck-link" onclick="closeArch()">← All archetypes</span></div>';
  html += '<h2 style="margin-top:8px;">' + escHtml(a.name) + (isDiana ? ' ★' : '') + '</h2>';

  const facts = [N + ' top-cut list' + (N === 1 ? '' : 's')];
  if (conv) facts.push((100 * conv.conversion).toFixed(1) + '% Day 1→Day 2 (' + conv.index.toFixed(2) + '× the field, ' + conv.day1.toLocaleString() + ' decks recorded)');
  facts.push(p.units.toFixed(1) + ' units / ' + p.spells.toFixed(1) + ' spells / ' + p.gear.toFixed(1) + ' gear per deck');
  facts.push('avg cost ' + p.avgCost.toFixed(2));
  const rec = matchRecord(slug);
  if (rec.n) facts.push('your logged record: ' + rec.w + '–' + rec.l);
  html += '<div class="summary-box">' + escHtml(facts.join(' · ')) + '</div>';

  // What answers them — the mirror of the coverage table, for one archetype.
  if (!isDiana) {
    const { list, source } = currentSideboard();
    const cov = coverageOf(list, p);
    html += '<div class="summary-box">Against them, ' + escHtml(source) + ' holds some answer to <strong style="color:' + pctColor(cov.coverage) + '">' + pct(cov.coverage) + '</strong> of their 40, ' +
      'across <strong>' + cov.depth + '</strong> relevant card' + (cov.depth === 1 ? '' : 's') + '. ' +
      (cov.name ? 'The best is <strong>' + escHtml(cov.name) + '</strong> — ' + escHtml(answerWhy(cov.name, cov.tag, p)) + '.' : 'Nothing in it interacts with them.') +
      ' <span style="color:var(--muted)">Breadth from rules text vs their board, not a win rate — see the Meta index for how.</span></div>';
  }

  // Unit sizes: the single most actionable thing about an opposing deck.
  const mights = Object.entries(p.mightCounts).map(([m, c]) => [+m, c]).sort((x, y) => x[0] - y[0]);
  if (mights.length) {
    const maxC = Math.max(...mights.map(m => m[1]));
    html += '<h2>Unit sizes</h2><p class="sub">Every unit copy across their ' + N + ' list' + (N === 1 ? '' : 's') + ', by Might. This is what your removal has to line up against — a card that deals 3 answers everything left of the 4.</p>';
    html += '<div class="panel-wrap"><table class="incl"><thead><tr><th>Might</th><th>Unit copies</th><th class="num">Cumulative</th></tr></thead><tbody>';
    let cum = 0;
    mights.forEach(([m, c]) => {
      cum += c;
      html += '<tr><td>⚔' + m + '</td><td><span class="incl-bar" style="width:' + Math.round(140 * c / maxC) + 'px"></span>' + c + '</td>' +
        '<td class="num" title="An answer sized ' + m + ' hits this much of their unit count">' + pct(cum / p.knownUnits) + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  html += '<h2>Consensus list</h2><p class="sub">Weighted like the Build view but over their own ' + N + ' list' + (N === 1 ? '' : 's') + ' — no placement weighting exists for the scraped field, so each list counts once.</p>';
  const proto = computeProto(decks, ranked);
  html += '<div class="col2"><div>';
  proto.forEach(c => {

    html += '<div class="card-row ' + (c.locked ? 'locked' : 'flex') + '" data-card="' + attr(c.name) + '" data-cardopen="' + attr(c.name) + '" style="cursor:pointer">' + cardImg(c.name) +
      '<span class="card-name">' + gemsFor(c.name) + ' ' + escHtml(c.name) + '</span><span class="card-meta">' + pctIn + '%</span><span class="count-badge">x' + c.copies + '</span></div>';
  });
  html += '</div><div>';
  const bfFreq = {}, runeFreq = {};
  a.decks.forEach(d => {
    (d.battlefields || []).forEach(b => bfFreq[b] = (bfFreq[b] || 0) + 1);
    Object.entries(d.runes || {}).forEach(([n, c]) => runeFreq[n] = (runeFreq[n] || 0) + c / a.decks.length);
  });
  const runes = Object.entries(runeFreq).sort((x, y) => y[1] - x[1]);
  if (runes.length) {
    html += '<div class="cost-head">Rune split (avg of 12)</div>';
    runes.forEach(([n, avg]) => html += '<div class="card-row" data-card="' + attr(n) + '">' + cardImg(n) + '<span class="card-name">' + escHtml(n) + '</span><span class="count-badge">' + avg.toFixed(1) + '</span></div>');
  }
  const bfs = Object.entries(bfFreq).sort((x, y) => y[1] - x[1]).slice(0, 6);
  if (bfs.length) {
    html += '<div class="cost-head">Battlefields</div>';
    bfs.forEach(([n, c]) => html += '<div class="card-row" data-card="' + attr(n) + '">' + cardImg(n) + '<span class="card-name">' + escHtml(n) + '</span><span class="card-meta">' + c + '/' + N + '</span></div>');
  }
  html += '</div></div>';

  const maxCost = MAX_COST_BUCKET;
  html += '<h2>Energy curve</h2>';
  html += curveSVG(targetCurveOf(decks), PALETTE[Math.abs(hashStr(slug)) % PALETTE.length], maxCost);

  html += '<h2>Staples</h2><p class="sub">Inclusion across their lists, with Wilson 95% intervals — the same caveat as everywhere else: ' + N + ' decks is a small sample.</p>';
  html += '<div class="panel-wrap"><table class="incl"><thead><tr><th>Card</th><th>Cost/Domain</th><th>Type</th><th>Inclusion</th><th class="num">Avg copies</th></tr></thead><tbody>';
  [...ranked].sort((x, y) => y.decksIn - x.decksIn || y.score - x.score).slice(0, 25).forEach(c => {
    const info = cardInfo(c.name) || {};
    const [lo, hi] = wilson(c.decksIn, N);
    html += '<tr data-card="' + attr(c.name) + '" data-cardopen="' + attr(c.name) + '" style="cursor:pointer;"><td>' + cardImg(c.name) + escHtml(c.name) + '</td>' +
      '<td>' + gemsFor(c.name) + '</td><td>' + (info.type || '—') + '</td>' +
      '<td><span class="incl-bar" style="width:' + Math.round(60 * c.decksIn / N) + 'px"></span>' + c.decksIn + '/' + N + ' (' + Math.round(100 * c.decksIn / N) + '%)' +
      '<span class="ci">' + lo.toFixed(0) + '–' + hi.toFixed(0) + '%</span></td>' +
      '<td class="num">' + c.avgCopies.toFixed(1) + '</td></tr>';
  });
  html += '</tbody></table></div>';

  html += '<h2>Their lists (' + N + ')</h2>';
  a.decks.forEach((d, j) => {
    html += '<div class="deck-tile" onclick="openFieldDeckModal(\'' + slug + '\',' + j + ')"><div class="dt-main">' +
      '<div class="dt-title"><span class="badge">' + attr(d.placement || '—') + '</span> ' + escHtml(d.label) + '</div>' +
      '<div class="dt-sub">' + escHtml([d.event, d.date].filter(Boolean).join(' · ')) + '</div></div><div class="dt-open">›</div></div>';
  });
  return html;
}

function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0; return h; }

/* ---------------- COMPARE ---------------- */
function renderCompare(ctx) {
  const N = ctx.N;
  if (N < 2) return '<div class="summary-box">Need at least two decks in the filter to compare. <span class="deck-link" onclick="clearFilters()">Reset filters</span>.</div>';
  const distances = ctx.distances, avgDistances = ctx.avgDistances;
  let html = '<h2>Deck diff</h2><p class="sub">Git-style comparison of any two lists: red cards leave deck A, green cards come in for deck B.</p>';
  html += '<div class="diff-controls"><select id="diffA" onchange="setDiff()">';
  globalDecks.forEach((d, i) => { html += '<option value="' + i + '"' + (i === diffA ? ' selected' : '') + '>' + attr(d.label) + '</option>'; });
  html += '</select><span style="color:var(--muted)">vs</span><select id="diffB" onchange="setDiff()">';
  globalDecks.forEach((d, i) => { html += '<option value="' + i + '"' + (i === diffB ? ' selected' : '') + '>' + attr(d.label) + '</option>'; });
  html += '</select></div>' + renderDiff(globalDecks[diffA], globalDecks[diffB]);

  html += '<h2>Swap-distance analysis</h2><p class="sub">"Swap distance" is the number of cards you need to change to turn one deck into another. Lower average means closer to the consensus. Hover a matrix cell for the pair.</p>';
  const rankedDecks = globalDecks.map((d, i) => ({ i, label: d.label, avgDist: avgDistances[i] })).sort((a, b) => a.avgDist - b.avgDist);
  html += '<div class="summary-box"><strong>Closest to the field (most representative):</strong><ol style="margin:8px 0 0 20px; padding:0;">';
  rankedDecks.forEach(d => { html += '<li>' + deckRef(d.i, d.label) + ' (avg ' + d.avgDist.toFixed(1) + ' swaps)</li>'; });
  html += '</ol></div>';

  html += '<div class="panel-wrap"><table class="matrix"><thead><tr><td class="label" style="font-weight:bold;">Deck</td>';
  globalDecks.forEach((d, i) => { html += '<td title="' + attr(d.label) + '">#' + (i + 1) + '</td>'; });
  html += '</tr></thead><tbody>';
  globalDecks.forEach((d, i) => {
    html += '<tr><td class="label"><strong>#' + (i + 1) + '</strong> ' + deckRef(i, d.label) + '</td>';
    for (let j = 0; j < N; j++) {
      if (i === j) { html += '<td style="color:var(--muted);">-</td>'; }
      else {
        const dVal = distances[i][j];
        let color = 'var(--text)';
        if (dVal <= 3) color = 'var(--lock)'; else if (dVal >= 10) color = 'var(--danger)';
        html += '<td data-tip="' + attr(globalDecks[i].label + ' vs ' + globalDecks[j].label + ': ' + dVal + ' swaps') + '" style="color:' + color + '; font-weight:' + (dVal <= 3 ? 'bold' : 'normal') + '">' + dVal + '</td>';
      }
    }
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

/* ---------------- Command palette ---------------- */
function paletteItems() {
  const items = [];
  Object.keys(cardMeta).sort().forEach(n => items.push({ kind: 'card', name: n, label: n }));
  globalDecks.forEach((d, i) => items.push({ kind: 'deck', idx: i, label: d.label, extra: (d.player || '') + ' ' + (d.event || '') }));
  return items;
}

// Subsequence match, so "khaz" and "kzmh" both find Kha'Zix, Mutating Horror.
function fuzzyScore(hay, needle) {
  if (!needle) return 0;
  const h = hay.toLowerCase(), q = needle.toLowerCase();
  const direct = h.indexOf(q);
  if (direct === 0) return 1000;
  if (direct > 0) return 500 - direct;
  let hi = 0, score = 0;
  for (const ch of q) {
    const found = h.indexOf(ch, hi);
    if (found === -1) return -1;
    score += (found === hi ? 3 : 1);
    hi = found + 1;
  }
  return score;
}

function renderPalette() {
  const q = document.getElementById('palInput').value.trim();
  const scored = paletteItems()
    .map(it => ({ it, s: Math.max(fuzzyScore(it.label, q), it.extra ? fuzzyScore(it.extra, q) - 200 : -1) }))
    .filter(x => q ? x.s > 0 : true)
    .sort((a, b) => b.s - a.s)
    .slice(0, 40);
  if (paletteIndex >= scored.length) paletteIndex = Math.max(0, scored.length - 1);
  const list = document.getElementById('palList');
  if (!scored.length) { list.innerHTML = '<div class="pal-empty">No matches.</div>'; return; }
  list.innerHTML = scored.map((x, i) => {
    const it = x.it;
    const thumb = it.kind === 'card' && imageMap[it.name] ? '<img src="' + attr(imageMap[it.name]) + '" alt="">' : '';
    return '<div class="pal-row' + (i === paletteIndex ? ' sel' : '') + '" data-pal="' + i + '">' + thumb +
      '<span>' + escHtml(it.label) + '</span><span class="pal-kind">' + it.kind + '</span></div>';
  }).join('');
  list.querySelectorAll('.pal-row').forEach(r => {
    r.onclick = () => { paletteIndex = +r.getAttribute('data-pal'); choosePalette(scored); };
  });
  const sel = list.querySelector('.pal-row.sel');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
  list._scored = scored;
}

function choosePalette(scored) {
  const x = scored[paletteIndex];
  if (!x) return;
  closePalette();
  if (x.it.kind === 'card') openCardModal(x.it.name); else openDeckModal(x.it.idx);
}

function openPalette() {
  paletteIndex = 0;
  const p = document.getElementById('palette');
  p.classList.add('show');
  const inp = document.getElementById('palInput');
  inp.value = ''; renderPalette(); inp.focus();
}

/* ---------------- Shareable deck image ---------------- */
// Only same-origin images can be drawn without tainting the canvas, so
// cross-origin (dotgg-hosted) art is skipped and the row renders text-only.
function localImage(name) {
  const src = imageMap[name];
  return src && !/^https?:\/\//i.test(src) ? src : null;
}
function loadImg(src) {
  return new Promise(res => { const i = new Image(); i.onload = () => res(i); i.onerror = () => res(null); i.src = src; });
}

async function exportDeckImage(title, list, subtitle) {
  if (!list.length) { toast('Nothing to export'); return; }
  toast('Rendering image…');
  const sorted = [...list].sort((a, b) => (costBucket(a.name) - costBucket(b.name)) || a.name.localeCompare(b.name));
  const imgs = {};
  await Promise.all(sorted.map(async c => { const s = localImage(c.name); if (s) imgs[c.name] = await loadImg(s); }));

  const COLS = 2, ROW_H = 62, PAD = 34, W = 900;
  const rows = Math.ceil(sorted.length / COLS);
  const HEAD = 120, FOOT = 46;
  const H = HEAD + rows * ROW_H + FOOT;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const g = cv.getContext('2d');

  const grad = g.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, '#10141d'); grad.addColorStop(1, '#06090f');
  g.fillStyle = grad; g.fillRect(0, 0, W, H);
  g.fillStyle = 'rgba(200,170,110,0.08)'; g.beginPath(); g.arc(W - 90, -30, 190, 0, 7); g.fill();
  g.strokeStyle = 'rgba(200,170,110,0.45)'; g.lineWidth = 1.5;
  g.strokeRect(9, 9, W - 18, H - 18);

  g.fillStyle = '#e8d5a6'; g.font = '600 27px Palatino, Georgia, serif';
  g.fillText(title.toUpperCase(), PAD, 54);
  g.fillStyle = '#8b94a6'; g.font = '400 15px -apple-system, "Segoe UI", sans-serif';
  g.fillText(subtitle, PAD, 82);

  const total = sorted.reduce((a, c) => a + c.count, 0);
  g.fillStyle = '#c8aa6e'; g.font = '700 15px -apple-system, "Segoe UI", sans-serif';
  g.textAlign = 'right'; g.fillText(total + ' cards', W - PAD, 54); g.textAlign = 'left';

  const colW = (W - PAD * 2) / COLS;
  sorted.forEach((c, i) => {
    const col = Math.floor(i / rows), row = i % rows;
    const x = PAD + col * colW, y = HEAD + row * ROW_H;
    g.fillStyle = row % 2 ? 'rgba(255,255,255,0.02)' : 'transparent';
    g.fillRect(x - 6, y - 12, colW - 10, ROW_H - 6);
    const im = imgs[c.name];
    if (im) { g.save(); g.beginPath(); g.rect(x, y - 8, 36, 46); g.clip(); g.drawImage(im, x, y - 10, 36, 50); g.restore(); }
    g.fillStyle = '#ece7dc'; g.font = '600 17px -apple-system, "Segoe UI", sans-serif';
    g.fillText(c.count + '×', x + 46, y + 20);
    g.font = '400 16px -apple-system, "Segoe UI", sans-serif';
    let nm = c.name;
    while (g.measureText(nm).width > colW - 130 && nm.length > 4) nm = nm.slice(0, -2);
    if (nm !== c.name) nm += '…';
    g.fillText(nm, x + 82, y + 20);
    const cost = cardMeta[c.name] && cardMeta[c.name].cost;
    if (cost != null) {
      g.fillStyle = '#8b96b2'; g.font = '600 13px -apple-system, "Segoe UI", sans-serif';
      g.textAlign = 'right'; g.fillText('◆' + cost, x + colW - 24, y + 20); g.textAlign = 'left';
    }
  });

  g.fillStyle = '#c8aa6e'; g.font = '600 12px Palatino, Georgia, serif';
  g.fillText('DIANA DECK LAB · persykse.github.io/diana-decklist-comparator', PAD, H - 18);

  cv.toBlob(blob => {
    if (!blob) { toast('Image export failed'); return; }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = title.replace(/[^a-z0-9]+/gi, '_').replace(/^_|_$/g, '') + '.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    toast('Saved ' + a.download);
  }, 'image/png');
}

  const view = VIEWS[currentView] || VIEWS.build;
  let html = '<div class="view-head"><img class="hero-art" src="cache/images/Diana_Lunari.webp" alt=""><h1>' + escHtml(view.title) + '</h1><p>' + escHtml(view.desc) + '</p></div>';
  // Meta reads the whole scraped field and Log is personal data, so the Diana
  // filter bar would only mislead on either — the one thing it touches is the
  // fallback consensus sideboard, and that is labelled where it is used.
  if (currentView !== 'meta' && currentView !== 'log') {
    html += renderFilterBar();
    if (!globalDecks.length) html += '<div class="empty">No decks match the current filters. <span class="deck-link" onclick="clearFilters()">Reset filters</span>.</div>';
    else html += view.render(computeContext());
  } else {
    html += view.render(computeContext());
  }
  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('#nav a').forEach(a => a.classList.toggle('active', a.dataset.view === currentView));
  document.getElementById('deckCount').textContent = allDecks.length + ' decks loaded';
  renderLastUpdated();
  if (document.getElementById('bResults')) renderBuilderResults();   // fill the builder's search grid
}
function relativeTime(iso) {
  const days = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
  if (days < 0) return 'just now';
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 14) return days + ' days ago';
  if (days < 60) return Math.floor(days / 7) + ' weeks ago';
  return Math.floor(days / 30) + ' months ago';
}

// The scraper reruns weekly but the workflow only commits when the data
// actually changed, so this stamp means "data last changed", not "last run".
function renderLastUpdated() {
  const el = document.getElementById('lastUpdated');
  if (!el) return;
  const gen = window.META && META.generated;
  if (!gen) { el.textContent = ''; return; }
  const days = Math.floor((Date.now() - new Date(gen).getTime()) / 86400000);
  const stale = days > 14;
  const when = new Date(gen).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
  const through = META.latestEvent ? ', newest event ' + META.latestEvent : '';
  el.innerHTML = '<span class="dot-live' + (stale ? ' dot-stale' : '') + '"></span>Data updated ' + escHtml(relativeTime(gen));
  el.title = 'Deck data last changed ' + when + through +
    '. The scraper reruns weekly; this stamp only moves when the data itself changes.';
}

function router() {
  const v = (location.hash || '#build').slice(1);
  currentView = VIEWS[v] ? v : 'build';
  render();
}

document.addEventListener('mouseover', e => {
  const pv = document.getElementById('cardPreview');

  if (cardEl) { const img = imageMap[cardEl.getAttribute('data-card')]; if (img) { pv.querySelector('img').src = img; pv.classList.add('show'); } else pv.classList.remove('show'); }
  else pv.classList.remove('show');

  const hl = e.target.closest('[data-hl]');

  // Builder: hovering any card/rune/battlefield fills the large left preview.

    if (name && name !== builderPreview) updateBuilderPreview(name);
  }
});
// Update the left preview in place (reuse the <img>, one paint per frame) so
// dragging the cursor across the grid — or scrolling under it — never rebuilds
// the pane or refetches art.
let _bPrevRaf = 0;
function updateBuilderPreview(name) {
  builderPreview = name;
  if (_bPrevRaf) return;
  _bPrevRaf = requestAnimationFrame(() => {
    _bPrevRaf = 0;
    const p = document.getElementById('bPreview'); if (!p) return;
    const info = cardInfo(builderPreview);
    if (!info) { p.innerHTML = bPreviewHTML(); return; }
    let img = p.querySelector('img.bprev-img');
    if (!img) { p.innerHTML = bPreviewHTML(); img = p.querySelector('img.bprev-img'); if (!img) return; }
    const src = imageMap[builderPreview];
    if (src && img.getAttribute('src') !== src) img.setAttribute('src', src);
    const nameEl = p.querySelector('.bprev-name'); if (nameEl) nameEl.textContent = builderPreview;
    const metaEl = p.querySelector('.bprev-meta');
    if (metaEl) metaEl.innerHTML = gemsFor(builderPreview) + '<span>' + escHtml([info.type, info.rarity].filter(Boolean).join(' · ')) + '</span>';
    let effEl = p.querySelector('.bprev-eff');
    const effHtml = info.effect ? escHtml(info.effect).replace(/:rb_might:/g, '⚔').replace(/:rb_energy:/g, '◆') : '';
    if (effEl && !effHtml) effEl.remove();
    else if (effHtml && !effEl) { effEl = document.createElement('div'); effEl.className = 'bprev-eff'; p.appendChild(effEl); effEl.textContent = info.effect.replace(/:rb_might:/g, '⚔').replace(/:rb_energy:/g, '◆'); }
    else if (effEl) effEl.textContent = info.effect.replace(/:rb_might:/g, '⚔').replace(/:rb_energy:/g, '◆');
  });
}
document.addEventListener('mouseout', e => {
  const hl = e.target.closest('[data-hl]');
  if (hl) { const [sel] = hl.getAttribute('data-hl').split('|'); const svg = document.querySelector(sel); if (svg) { svg.classList.remove('focus'); svg.querySelectorAll('.on').forEach(el => el.classList.remove('on')); } }
});
document.addEventListener('mousemove', e => {
  const pv = document.getElementById('cardPreview');
  if (pv.classList.contains('show')) {
    const w = 200, h = 280; let x = e.clientX + 18, y = e.clientY + 18;

    if (y + h > window.innerHeight) y = window.innerHeight - h - 10;

    tip.style.left = x + 'px'; tip.style.top = y + 'px';
  }
});
document.addEventListener('click', e => {
  // Builder interactions come first — a card tile is an action surface, not a
  // link. On touch, a tap opens the action sheet instead of mutating directly.
  const bSlot = e.target.closest('[data-bname]');
  if (bSlot) {
    const name = bSlot.getAttribute('data-bname'), sec = bSlot.getAttribute('data-bsec');
    if (IS_TOUCH) openBSheet(sec === 'result' ? 'result' : 'slot', name, sec);
    else if (sec === 'result') bAdd(name, 'main');
    else if (e.shiftKey) bMove(name, sec);
    else bAdd(name, sec);
    return;
  }
  const bBf = e.target.closest('[data-bf]');
  if (bBf) { bToggleBf(bBf.getAttribute('data-bf')); return; }
  const bRune = e.target.closest('[data-rune]');
  if (bRune) {
    const d = bRune.getAttribute('data-rune');
    IS_TOUCH ? openBSheet('rune', d + ' Rune', d) : bRuneXfer(d);
    return;
  }

  const ap = e.target.closest('[data-apply]');
  if (ap) { applyCoachSwap(ap.getAttribute('data-apply'), parseInt(ap.getAttribute('data-delta'), 10)); return; }
  // Clicking a card image opens the card detail modal — except in rows whose
  // whole surface already adds/removes cards.
  if ((e.target.classList.contains('cimg') || e.target.classList.contains('scard') || e.target.classList.contains('noimg')) &&
      !e.target.closest('.interactive-flex')) {
    const n = e.target.getAttribute('data-card');
    if (n) { openCardModal(n); return; }
  }
  const co = e.target.closest('[data-cardopen]');
  if (co) { openCardModal(co.getAttribute('data-cardopen')); return; }
  const dl = e.target.closest('[data-deck]');
  if (dl) { openDeckModal(parseInt(dl.getAttribute('data-deck'), 10)); return; }
  if (e.target.id === 'modal') closeModal();
});
// Right-click in the builder removes / sideboards / transfers, matching the
// reference tool's model. Only preventDefault when we actually handle it.
// On touch, a long-press (where it fires contextmenu at all) opens the same
// action sheet as a tap — never a surprise removal.
document.addEventListener('contextmenu', e => {
  const bSlot = e.target.closest('[data-bname]');
  if (bSlot) {
    e.preventDefault();
    const name = bSlot.getAttribute('data-bname'), sec = bSlot.getAttribute('data-bsec');
    if (IS_TOUCH) openBSheet(sec === 'result' ? 'result' : 'slot', name, sec);
    else sec === 'result' ? bAdd(name, 'side') : bRemove(name, sec);
    return;
  }
  const bRune = e.target.closest('[data-rune]');
  if (bRune) {
    e.preventDefault();
    const d = bRune.getAttribute('data-rune');
    IS_TOUCH ? openBSheet('rune', d + ' Rune', d) : bRuneOut(d);
    return;
  }
  const bBf = e.target.closest('[data-bf]');
  if (bBf) { e.preventDefault(); bToggleBf(bBf.getAttribute('data-bf')); }
});
document.addEventListener('keydown', e => {
  const palOpen = document.getElementById('palette').classList.contains('show');
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); palOpen ? closePalette() : openPalette(); return; }
  if (palOpen) {
    const list = document.getElementById('palList');
    const scored = list._scored || [];
    if (e.key === 'Escape') { e.preventDefault(); closePalette(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); paletteIndex = Math.min(paletteIndex + 1, scored.length - 1); renderPalette(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); paletteIndex = Math.max(paletteIndex - 1, 0); renderPalette(); }
    else if (e.key === 'Enter') { e.preventDefault(); choosePalette(scored); }
    return;
  }
  if (e.key === 'Escape') { if (bSheetState) closeBSheet(); else closeModal(); }
});
document.getElementById('palInput').addEventListener('input', () => { paletteIndex = 0; renderPalette(); });
document.getElementById('palette').addEventListener('click', e => { if (e.target.id === 'palette') closePalette(); });

// If card art fails to load (offline, or a CDN image goes away), show a named
// placeholder instead of the browser's broken-image glyph. Error events don't
// bubble, so listen in the capture phase.
document.addEventListener('error', e => {
  const img = e.target;
  if (!(img && img.tagName === 'IMG')) return;
  const holder = img.closest('.bslot, .bresult');
  if (holder) {
    const d = document.createElement('div');
    d.className = 'bnoimg';
    d.textContent = holder.getAttribute('data-bname') || holder.getAttribute('data-bf') || img.alt || 'no art';
    img.replaceWith(d);
  } else if (img.classList.contains('cimg') || img.classList.contains('scard')) {
    const d = document.createElement('div');
    d.className = 'noimg';
    const n = img.getAttribute('data-card'); if (n) d.setAttribute('data-card', n);
    img.replaceWith(d);
  }
}, true);

/* ---------------- Load ---------------- */
async function load() {
  try {
    if (localStorage.getItem('ddl-theme') === 'light') { document.body.classList.add('light'); document.querySelector('meta[name=theme-color]').setAttribute('content', '#f5f2ea'); }
    coachText = localStorage.getItem('ddl-coach') || '';
    sideText = localStorage.getItem('ddl-side') || '';
    // One corrupted key must not take the others down with it.
    const safeJSON = k => { try { return JSON.parse(localStorage.getItem(k) || 'null'); } catch (e) { return null; } };
    builderRunes = safeJSON('ddl-runes');
    builderBf = safeJSON('ddl-bf');
    const fm = safeJSON('ddl-fieldmodel');
    if (fm && typeof fm === 'object') fieldModel = { recency: !!fm.recency, region: fm.region || null };
  } catch (e) {}
  const el = document.getElementById('content');
  if (window.DECKS) allDecks = window.DECKS;
  else {
    try { const res = await fetch('decks.json'); if (!res.ok) throw new Error(); allDecks = await res.json(); }
    catch (e) { el.innerHTML = '<div class="empty">No deck data found. Run <code>python3 fetch_decks.py</code>, then reopen this page.</div>'; return; }
  }
  if (!allDecks || allDecks.length === 0) { el.innerHTML = '<div class="empty">decks.json is empty — the scraper reached no pages.</div>'; return; }
  // Visitor-submitted decks live only on the Cloudflare copy; on GitHub Pages
  // or file:// this 404s (or throws) and the site carries on without them.
  if (location.protocol.indexOf('http') === 0) {
    try {
      const r = await fetch('/api/submissions');
      if (r.ok && (r.headers.get('content-type') || '').includes('json')) {
        const subs = await r.json();
        if (Array.isArray(subs)) communityDecks = subs.map(tagCommunityDeck).filter(Boolean);
      }
    } catch (e) {}
  }
  indexCards(allDecks);
  computeFullClusters();
  // A shared list (?d=…) overrides whatever was last in this browser.
  const shared = new URLSearchParams(location.search).get('d');
  if (shared) {
    const text = decodeDeck(shared);
    if (text) { coachText = text; saveCoach(); toast('Loaded a shared decklist'); }
  }
  const v = (location.hash || '#build').slice(1);
  currentView = VIEWS[v] ? v : 'build';
  applyFilters();
}

/* Community submissions. A visitor's builder deck can be shared into a
   pool everyone sees (Cloudflare D1 behind /api/submissions). The server
   rebuilds the deck object from whitelisted fields and validates every
   name against the card catalogue, so what comes back down is safe to
   render; tagCommunityDeck still checks the shape so one bad row can't
   take the site down. */
function tagCommunityDeck(d) {
  if (!d || !Array.isArray(d.cards) || !d.cards.length) return null;
  d.source = 'user';
  d.weight = 1.0;
  d._region = regionOf(d.event);
  d._cluster = -1;                 // never joins the tournament clustering
  d._clusterName = 'Community';
  return d;
}

async function submitToMeta() {
  const main = bMain(), side = bSide();
  const mainN = bTotal(main);
  if (mainN !== 40) { toast('Main deck must be exactly 40 cards to submit (currently ' + mainN + ')'); return; }
  const unknown = parseDeckText(coachText).unknown.concat(parseDeckText(sideText).unknown);
  if (unknown.length) { toast('Unrecognized card' + (unknown.length > 1 ? 's' : '') + ': ' + unknown.slice(0, 3).join(', ')); return; }
  if (!confirm('Share this deck to the public community pool? It will be visible to everyone (anonymously).')) return;
  ensureBuilderDefaults();
  // Names + counts only: the server rebuilds every row (cost/type/image/…)
  // from its own card catalogue, so nothing client-supplied gets stored.
  const payload = {
    cards: Object.entries(main).map(([n, c]) => ({ name: n, count: c })),
    sideboard: Object.entries(side).map(([n, c]) => ({ name: n, count: c })),
    runes: Object.entries(builderRunes).filter(([n, c]) => c > 0).map(([n, c]) => ({ name: n + ' Rune', count: c })),
    battlefields: builderBf.map(n => ({ name: n, count: 1 }))
  };
  const btn = document.querySelector('button[onclick="submitToMeta()"]');
  const oldText = btn ? btn.textContent : '';
  if (btn) { btn.textContent = 'Submitting…'; btn.disabled = true; }
  try {
    const res = await fetch('/api/submissions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    let body = null;
    try { body = await res.json(); } catch (e) {}
    if (!res.ok) throw new Error((body && body.error) || ('HTTP ' + res.status));
    if (body && body.duplicate) { toast('That exact deck is already in the community pool'); return; }
    const mine = tagCommunityDeck(body && body.deck);
    if (mine) communityDecks.push(mine);
    filters.community = true;      // show them what they just joined
    toast('Deck shared — it now shows under "community decks"');
    applyFilters();
  } catch (e) {
    toast('Submit failed: ' + e.message);
  } finally {
    if (btn) { btn.textContent = oldText; btn.disabled = false; }
  }
}

/* In-page smoke test: navigates every view, exercises the builder, and checks
   the probability engine against a hand-computed value. Engine-agnostic on
   purpose — app.py drives it through WKWebView (Safari's engine), and any
   browser console can run `await __smoke()`. */
window.__smoke = async function () {
  const out = { errors: [], checks: {} };
  const onerr = e => out.errors.push(String((e && e.message) || e));
  window.addEventListener('error', onerr);
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  try {
    for (const v of ['build', 'analyze', 'meta', 'log', 'compare', 'decks']) {
      location.hash = '#' + v; await sleep(150);
      out.checks[v] = document.getElementById('content').innerText.length > 200;
    }
    location.hash = '#build'; await sleep(200);
    out.checks.builderPanes = document.querySelectorAll('.bpane').length === 3;
    out.checks.results = document.querySelectorAll('.bresult').length > 0;
    const first = document.querySelector('.bresult');
    const name = first && first.getAttribute('data-bname');
    const before = bTotal(bMain());
    bAdd(name, 'main');
    out.checks.addCard = bTotal(bMain()) === before + 1;
    bRemove(name, 'main');
    out.checks.removeCard = bTotal(bMain()) === before;
    const savedType = builderSearch.type;
    builderSearch.type = 'Gear';
    out.checks.searchFilter = builderFiltered().length > 10 && builderFiltered().every(c => c.type === 'Gear');
    builderSearch.type = savedType;
    out.checks.probabilityEngine = Math.abs(hyperAtLeast(1, 3, 40, 4) - 0.2773279352226734) < 1e-9;
    out.checks.runeSum = Object.values(builderRunes).reduce((a, b) => a + b, 0) === 12;
  } catch (e) { out.errors.push(String(e)); }
  window.removeEventListener('error', onerr);
  out.pass = out.errors.length === 0 && Object.values(out.checks).every(Boolean);
  return out;
};

/* Service worker + update flow. The SW takes over immediately (skipWaiting),
   so when a new version installs under an open tab, the page's HTML is stale
   against the new cache — the classic "it looks broken for me". Offer a
   one-tap reload instead of leaving the mismatch silent. */
function showUpdateBar() {
  if (document.getElementById('updateBar')) return;
  const bar = document.createElement('div');
  bar.id = 'updateBar';
  bar.innerHTML = '<span>A new version of the site is ready.</span><button onclick="location.reload()">Reload</button>' +
    '<button class="ghost" onclick="this.parentNode.remove()">Later</button>';
  document.body.appendChild(bar);
}
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const w = reg.installing;
      if (w) w.addEventListener('statechange', () => {
        if (w.state === 'installed' && navigator.serviceWorker.controller) showUpdateBar();
      });
    });
  }).catch(() => {}));
}
load();
